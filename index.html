<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance App 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 select-none">

    <div class="max-w-md mx-auto min-h-screen flex flex-col p-4 pb-24">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-slate-400">GEMINI<span class="text-blue-600">FINANCE</span></h1>
                <div id="currentDate" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">14 ФЕВРАЛЯ 2026</div>
            </div>
            <div class="flex flex-col items-end">
                <input type="number" id="customRate" value="51.55" step="0.01" class="w-20 bg-blue-50 text-blue-600 font-black text-right rounded-lg px-2 outline-none">
                <span class="text-[8px] font-bold text-slate-300 uppercase mt-1">Курс EUR/UAH</span>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="openExpense()" class="bg-slate-900 text-white p-6 rounded-[35px] shadow-xl active:scale-95 transition-all text-left relative overflow-hidden h-32">
                <span class="relative z-10 font-black italic text-xl uppercase">Расход</span>
                <div class="absolute -right-4 -bottom-4 text-white/10 text-7xl font-black italic">−</div>
            </button>
            <button onclick="openTransfer()" class="bg-blue-600 text-white p-6 rounded-[35px] shadow-xl active:scale-95 transition-all text-left relative overflow-hidden h-32">
                <span class="relative z-10 font-black italic text-xl uppercase text-blue-200">Перевод</span>
                <div class="absolute -right-4 -bottom-4 text-white/10 text-7xl font-black italic">⇄</div>
            </button>
        </div>

        <div class="flex-1">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-2">Последние действия</h2>
            <div id="recentHistory" class="space-y-3">
                </div>
        </div>
    </div>

    <div id="expenseModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] w-full max-w-sm p-8 shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-center italic uppercase">Новый расход</h3>
            <div class="space-y-4">
                <select id="expCategory" class="w-full bg-gray-100 p-5 rounded-3xl font-bold outline-none appearance-none border-2 border-transparent focus:border-black"></select>
                <select id="expAccount" class="w-full bg-gray-100 p-5 rounded-3xl font-bold outline-none appearance-none border-2 border-transparent focus:border-black"></select>
                <input type="text" id="expMerchant" placeholder="Магазин / Описание" class="w-full bg-gray-100 p-5 rounded-3xl font-bold outline-none">
                
                <div class="bg-slate-50 p-6 rounded-[35px] border border-slate-100">
                    <span class="text-[10px] text-slate-400 font-bold uppercase block text-center mb-2">Сумма в Евро</span>
                    <input type="number" id="expTotal" placeholder="0.00 €" step="0.01" class="w-full bg-transparent text-center text-4xl font-black italic outline-none">
                </div>

                <button onclick="saveExpense()" class="w-full bg-black text-white py-6 rounded-3xl font-black text-lg active:scale-95 transition-all uppercase italic">Записать</button>
                <button onclick="closeModal('expenseModal')" class="w-full text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="transferModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] w-full max-w-sm p-8 shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-center italic text-blue-600 uppercase">Перевод</h3>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="text-center">
                        <span class="text-[8px] font-bold text-slate-400 uppercase">Откуда</span>
                        <select id="fromAcc" class="w-full bg-gray-100 p-4 rounded-2xl font-bold text-xs mt-1 outline-none"></select>
                    </div>
                    <div class="text-center">
                        <span class="text-[8px] font-bold text-slate-400 uppercase">Куда</span>
                        <select id="toAcc" class="w-full bg-gray-100 p-4 rounded-2xl font-bold text-xs mt-1 outline-none"></select>
                    </div>
                </div>

                <div class="bg-blue-50 p-6 rounded-[35px] border border-blue-100 space-y-4">
                    <div class="text-center">
                        <span class="text-[10px] text-blue-400 font-bold uppercase">Сумма Евро</span>
                        <input type="number" id="trEur" placeholder="0.00 €" step="0.01" 
                               oninput="document.getElementById('trUah').value = (this.value * (document.getElementById('customRate').value || 51.55)).toFixed(2)"
                               class="w-full bg-transparent text-center text-3xl font-black italic outline-none">
                    </div>
                    <div class="border-t border-blue-100 pt-4 text-center">
                        <span class="text-[10px] text-blue-400 font-bold uppercase">В гривнах (авто)</span>
                        <input type="number" id="trUah" placeholder="0.00 ₴" step="0.01" 
                               class="w-full bg-transparent text-center text-xl font-black italic outline-none text-blue-600">
                    </div>
                </div>

                <button onclick="saveTransfer()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-lg active:scale-95 transition-all uppercase italic shadow-lg shadow-blue-200">Записать перевод</button>
                <button onclick="closeModal('transferModal')" class="w-full text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2 text-center">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyo-7ijLB_ICWfPKwkuksxSljZ9-K8KL23dECyyWi9ETv_rKnNo8MR-_tDe6-AWGnsD/exec';

        const CONFIG = {
            categories: ["🍎 Продукты / Быт", "🏠 Жилье / Связь", "🚬 Табак", "🍷 Алкоголь", "☕️ Кафе / Отдых", "💊 Здоровье / Красота", "🚗 Транспорт", "🏦 Банк / Комиссии", "🙇‍♀️ Учеба", "🛍 Остальное / Шопинг", "🏖️ Развлечения", "💰 КОПИЛКА", "💎 Доход"],
            accounts: ["ПРИВАТ", "ВАЛЕРА", "КРЕДИТКА", "СВИНКА", "КОНВЕРТ", "НАЛИЧНЫЕ"]
        };

        // Инициализация списков
        function initSelects() {
            const cats = document.getElementById('expCategory');
            const accs = [document.getElementById('expAccount'), document.getElementById('fromAcc'), document.getElementById('toAcc')];
            
            CONFIG.categories.forEach(c => cats.innerHTML += `<option value="${c}">${c}</option>`);
            accs.forEach(sel => {
                CONFIG.accounts.forEach(a => sel.innerHTML += `<option value="${a}">${a}</option>`);
            });
        }

        function openExpense() { document.getElementById('expenseModal').classList.remove('hidden'); }
        function openTransfer() { document.getElementById('transferModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function saveExpense() {
            const data = {
                date: new Date().toISOString(),
                category: document.getElementById('expCategory').value,
                account: document.getElementById('expAccount').value,
                merchant: document.getElementById('expMerchant').value,
                rate: document.getElementById('customRate').value,
                items: [{
                    nameRU: document.getElementById('expMerchant').value || "Расход",
                    qty: 1,
                    priceUnit: document.getElementById('expTotal').value,
                    totalEur: document.getElementById('expTotal').value,
                    totalUah: document.getElementById('expTotal').value * document.getElementById('customRate').value
                }]
            };
            sendData(data, 'expenseModal');
        }

        async function saveTransfer() {
            const data = {
                action: 'transfer',
                date: new Date().toISOString(),
                from: document.getElementById('fromAcc').value,
                to: document.getElementById('toAcc').value,
                eur: document.getElementById('trEur').value,
                uah: document.getElementById('trUah').value,
                rate: document.getElementById('customRate').value,
                merchant: "Перевод средств"
            };
            sendData(data, 'transferModal');
        }

        async function sendData(data, modalId) {
            try {
                const btn = event.target;
                btn.innerText = "СОХРАНЯЮ...";
                btn.disabled = true;

                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(data)
                });

                closeModal(modalId);
                alert("Успешно записано!");
                location.reload();
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        }

        window.onload = initSelects;
    </script>
</body>
</html>
