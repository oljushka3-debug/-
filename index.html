<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Wallet</title>
    <style>
        /* Базовые стили, чтобы программа выглядела как раньше */
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; flex-direction: column; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-expense { background: #e53935; } /* Красная - Расход */
        .btn-income { background: #43a047; }  /* Зеленая - Доход */
        .btn-transfer { background: #fb8c00; } /* Оранжевая - Перевод */
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Smart Wallet 💸</h2>
    
    <label>Категория</label>
    <select id="category">
        <option value="🍎 Продукты / Быт">🍎 Продукты</option>
        <option value="🏠 Жилье / Счета">🏠 Жилье / Счета</option>
        <option value="🚗 Транспорт">🚗 Транспорт</option>
        <option value="🚬 Табак / Алкоголь">🚬 Табак / Алкоголь</option>
        <option value="💊 Здоровье / Красота">💊 Здоровье</option>
        <option value="🙇‍♀️ Учеба">🙇‍♀️ Учеба</option>
        <option value="💰 КОПИЛКА">💰 КОПИЛКА</option>
        <option value="🛍 Остальное">🛍 Остальное</option>
    </select>

    <label>Сумма EUR</label>
    <input type="number" id="amount" step="0.01" placeholder="0.00">

    <label>Описание</label>
    <input type="text" id="description" placeholder="На что именно?">

    <div class="btn-group">
        <button class="btn-expense" onclick="sendData('Расход')">ОТПРАВИТЬ РАСХОД</button>
        <button class="btn-transfer" onclick="sendData('Перевод')">ОТПРАВИТЬ ПЕРЕВОД</button>
        <button class="btn-income" onclick="sendData('Доход')">ОТПРАВИТЬ ДОХОД</button>
    </div>

    <div id="status"></div>
</div>

<script>
    // ТВОЯ НОВАЯ ССЫЛКА (Уже вставлена правильно)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyNk5UhTyWX1aq10aLtANPdZl8m0ofnQ0nurpbzE-VXg_M6IpYkCWyyroF1iU1R5eUm/exec';

    function sendData(type) {
        const btn = event.target;
        const status = document.getElementById('status');
        const category = document.getElementById('category').value;
        const amount = document.getElementById('amount').value;
        const description = document.getElementById('description').value;

        if (!amount) {
            alert("Пожалуйста, введите сумму");
            return;
        }

        // Если это доход или перевод, помечаем в описании для таблицы
        let finalDesc = description;
        if (type !== 'Расход') {
            finalDesc = "[" + type + "] " + description;
        }

        status.innerHTML = "⌛ Отправка...";
        status.style.color = "orange";
        btn.disabled = true;

        // Формируем данные для отправки в Google Таблицу
        const formData = new FormData();
        formData.append('cat', category);
        formData.append('amt', amount);
        formData.append('desc', finalDesc);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                status.innerHTML = "✅ Успешно сохранено!";
                status.style.color = "green";
                document.getElementById('amount').value = "";
                document.getElementById('description').value = "";
                btn.disabled = false;
                setTimeout(() => status.innerHTML = "", 3000);
            })
            .catch(error => {
                status.innerHTML = "❌ Ошибка связи!";
                status.style.color = "red";
                btn.disabled = false;
                console.error('Error!', error.message);
            });
    }
</script>

</body>
</html>
