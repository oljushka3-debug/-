<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet Pro v30.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-4 pb-10 italic">

<button onclick="location.reload()" class="fixed top-6 right-6 z-50 bg-white w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center shadow-lg active:scale-90 transition-all">
    <i class="fa-solid fa-rotate text-blue-500"></i>
</button>

<div class="bg-white p-6 rounded-[35px] border border-slate-100 mb-4 shadow-xl text-center">
    <div class="flex justify-between items-center mb-4 text-[10px] font-black opacity-40 uppercase">
        <span>Курс: <input type="number" id="baseRate" value="51.55" step="0.01" oninput="drawBalance()" class="w-14 bg-slate-50 rounded px-1 text-blue-600 outline-none font-bold italic"></span>
        <span>ФЕВРАЛЬ 2026</span>
    </div>
    <h1 id="mainBalance" class="text-4xl font-black italic mb-6 tracking-tighter text-slate-800">€ 0.00</h1>
    <div id="walletsGrid" class="grid grid-cols-2 gap-3 text-[9px] font-bold uppercase italic text-center"></div>
</div>

<div class="flex gap-2 mb-8 font-black italic">
    <button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-rose-700 shadow-lg active:translate-y-1 italic">Расход</button>
    <button onclick="openModal('transfer')" class="flex-1 bg-slate-200 py-5 rounded-3xl text-[10px] text-slate-700 uppercase border-b-4 border-slate-400 shadow-md active:translate-y-1 italic">Перевод</button>
    <button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-emerald-700 shadow-lg active:translate-y-1 italic">Доход</button>
</div>

<div id="history" class="space-y-2"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-sm rounded-[45px] p-6 shadow-2xl border border-white overflow-y-auto max-h-[95vh]">
        <h2 id="modalTitle" class="text-xl font-black text-slate-800 mb-6 italic uppercase text-center underline decoration-blue-500 decoration-4 underline-offset-8 italic">ЗАПИСЬ</h2>
        <form onsubmit="save(event)" class="space-y-4">
            <input type="hidden" id="txType">
            <input type="hidden" id="editRowId">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="date" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 font-bold text-xs outline-none">
                <input type="number" id="customRate" step="0.01" placeholder="Курс" oninput="updateAllItems()" class="bg-blue-50 p-3 rounded-2xl border border-blue-100 font-bold text-xs text-blue-600 outline-none italic">
            </div>
            <input type="text" id="merchant" placeholder="Описание / Магазин" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 font-bold outline-none italic">

            <div id="expenseSection" class="hidden space-y-3">
                <div id="itemsList" class="space-y-4"></div>
                <button type="button" id="addItemBtn" onclick="addItemRow()" class="w-full py-2 border-2 border-dashed border-rose-200 rounded-xl text-rose-400 text-[10px] font-black uppercase italic">+ Добавить строку</button>
            </div>

            <div id="incomeSection" class="hidden bg-emerald-50 p-4 rounded-3xl border border-emerald-100 space-y-3 text-center italic">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[7px] text-emerald-600 font-black uppercase block italic">Гривны (₴)</label><input type="number" id="valUah" step="0.01" oninput="calcSimple('UAH')" class="w-full bg-transparent text-xl font-black outline-none text-emerald-600 text-center italic"></div>
                    <div><label class="text-[7px] text-slate-400 font-black uppercase block italic">Евро (€)</label><input type="number" id="valEur" step="0.01" oninput="calcSimple('EUR')" class="w-full bg-transparent text-xl font-black outline-none text-center italic"></div>
                </div>
            </div>

            <div id="transferSection" class="hidden space-y-4 font-black italic">
                <div class="grid grid-cols-2 gap-2 text-[10px]">
                    <select id="tFrom" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 uppercase italic">
                        <option value="ПРИВАТ">ИЗ ПРИВАТ</option><option value="ВАЛЕРА">ИЗ ВАЛЕРА</option><option value="НАЛИЧНЫЕ">ИЗ НАЛИЧНЫХ</option><option value="Sparkasse">ИЗ Sparkasse</option>
                    </select>
                    <select id="tTo" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 uppercase text-blue-600 italic">
                        <option value="НАЛИЧНЫЕ">В НАЛИЧНЫЕ</option><option value="КОПИЛКА">В КОПИЛКУ</option><option value="СВИНКА">В СВИНКУ</option><option value="КОНВЕРТ">В КОНВЕРТ</option><option value="ПРИВАТ">В ПРИВАТ</option>
                    </select>
                </div>
                <div class="bg-blue-50 p-4 rounded-3xl border border-blue-100 grid grid-cols-2 gap-2 text-center">
                    <input type="number" id="trEur" placeholder="€ Евро" step="0.01" class="bg-transparent outline-none italic font-black">
                    <input type="number" id="trUah" placeholder="₴ Гривны" step="0.01" class="bg-transparent outline-none text-blue-600 italic font-black">
                </div>
            </div>

            <div id="accCatGroup" class="grid grid-cols-2 gap-2 font-black italic">
                <select id="acc" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] uppercase outline-none italic">
                    <option value="Sparkasse">Sparkasse</option><option value="ПРИВАТ">ПРИВАТ</option><option value="ВАЛЕРА">ВАЛЕРА</option><option value="НАЛИЧНЫЕ">НАЛИЧНЫЕ</option><option value="СВИНКА">СВИНКА</option><option value="КОПИЛКА">КОПИЛКА</option><option value="КОНВЕРТ">КОНВЕРТ</option><option value="КРЕДИТКА">КРЕДИТКА</option>
                </select>
                <select id="cat" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] uppercase outline-none italic"><option>🍎 Продукты</option><option>🏠 Жилье</option><option>🚗 Транспорт</option><option>🛍 Остальное</option></select>
            </div>
            <div class="flex gap-2 pt-4"><button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-black uppercase text-[10px] text-slate-400 italic">Отмена</button><button id="saveBtn" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg italic">Записать</button></div>
        </form>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyo-7ijLB_ICWfPKwkuksxSljZ9-K8KL23dECyyWi9ETv_rKnNo8MR-_tDe6-AWGnsD/exec";
let walletData = {}; let allRows = [];

const MARKERS = {
    UAH: ['ПРИВАТ', 'ВАЛЕРА', 'КРЕДИТКА', 'ПОГАСИТЬ', 'СВИНКА', 'КОНВЕРТ'],
    OPERATIVE: ['ПРИВАТ', 'ВАЛЕРА', 'SPARKASSE', 'НАЛИЧНЫЕ']
};

function getMarker(name) {
    if(!name) return "ОСТАЛЬНОЕ";
    const n = name.toUpperCase();
    if(n.indexOf('ПОГАСИТЬ') !== -1) return 'ПОГАСИТЬ КРЕДИТ';
    if(n.indexOf('ПРИВАТ') !== -1) return 'ПРИВАТ';
    if(n.indexOf('ВАЛЕРА') !== -1) return 'ВАЛЕРА';
    if(n.indexOf('SPARKASSE') !== -1) return 'SPARKASSE';
    if(n.indexOf('НАЛИЧНЫЕ') !== -1 || n.indexOf('НАЛ') !== -1) return 'НАЛИЧНЫЕ';
    if(n.indexOf('КОПИЛКА') !== -1) return 'КОПИЛКА';
    if(n.indexOf('СВИНКА') !== -1) return 'СВИНКА';
    if(n.indexOf('КОНВЕРТ') !== -1) return 'КОНВЕРТ';
    if(n.indexOf('КРЕДИТКА') !== -1) return 'КРЕДИТКА';
    if(n.indexOf('ПЛАНАХ') !== -1) return 'В ПЛАНАХ';
    return n;
}

function isUahMarker(marker) { return MARKERS.UAH.some(m => marker.toUpperCase().indexOf(m) !== -1); }

function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55;
    let totalOpEur = 0; const grid = document.getElementById('walletsGrid'); grid.innerHTML = "";
    Object.keys(walletData).sort().forEach(marker => {
        const uah = walletData[marker].uah, eur = walletData[marker].eur;
        const isKopilka = marker === 'КОПИЛКА', isUah = isUahMarker(marker);
        const eqEur = isKopilka ? eur : (isUah ? (uah / r) : eur);
        if (MARKERS.OPERATIVE.includes(marker)) totalOpEur += eqEur;
        let content = isKopilka ? `<span class="text-slate-800 text-[10px] font-black italic">€ ${eur.toLocaleString('de-DE', {minimumFractionDigits: 2})}</span>` :
                      isUah ? `<span class="text-slate-800 text-[10px] font-black italic">₴ ${uah.toLocaleString('de-DE', {minimumFractionDigits: 2})}</span><br><span class="text-[7px] text-blue-500 font-normal">€ ${eqEur.toLocaleString('de-DE', {minimumFractionDigits: 2})}</span>` :
                      `<span class="text-slate-800 text-[10px] font-black italic">€ ${eur.toLocaleString('de-DE', {minimumFractionDigits: 2})}</span>`;
        grid.innerHTML += `<div class="bg-white p-3 rounded-2xl border border-slate-50 shadow-sm transition-all active:scale-95"><span class="text-slate-400 block text-[8px] uppercase font-black tracking-tighter italic">${marker}</span>${content}</div>`;
    });
    document.getElementById('mainBalance').innerText = '€ ' + totalOpEur.toLocaleString('de-DE', {minimumFractionDigits: 2});
}

function draw(data) {
    if (!data || !data.rows) return;
    allRows = data.rows;
    const hist = document.getElementById('history'); hist.innerHTML = ""; walletData = {};
    data.rows.forEach((r, i) => { 
        if (i === 0 || !r[5]) return; 
        const marker = getMarker(r[5]);
        if (!walletData[marker]) walletData[marker] = { uah: 0, eur: 0 };
        walletData[marker].eur += (parseFloat(r[8]) || 0);
        walletData[marker].uah += (parseFloat(r[10]) || 0);
    });
    data.rows.slice(1, 25).forEach(r => { 
        const marker = getMarker(r[5]), valU = parseFloat(r[10]) || 0, valE = parseFloat(r[8]) || 0, id = r[r.length-1];
        const isKopilka = marker === 'КОПИЛКА', isU = isUahMarker(marker);
        const displayAmt = (isKopilka || !isU) ? valE : valU, displayUnit = (isKopilka || !isU) ? '€' : '₴', isInc = displayAmt > 0;
        hist.innerHTML += `<div class="bg-white p-4 rounded-[25px] flex justify-between items-center border border-slate-100 mb-2 shadow-sm italic text-[10px] font-bold"><div class="flex items-center gap-2 truncate"><button onclick="deleteRow(${id})" class="text-slate-200"><i class="fa-solid fa-trash-can"></i></button><button onclick="editRow(${id})" class="text-blue-200 ml-1"><i class="fa-solid fa-pen"></i></button><div><p class="text-[7px] text-slate-300 uppercase">${marker}</p><p class="truncate uppercase">${r[4]||r[3]||r[2]}</p></div></div><div class="${isInc?'text-emerald-500':'text-rose-500'} font-black italic">${isInc?'+':''}${Math.abs(displayAmt).toLocaleString('de-DE',{minimumFractionDigits:2})} ${displayUnit}</div></div>`; 
    });
    drawBalance();
}

function addItemRow() {
    const id = Date.now();
    const html = `<div id="item-${id}" class="item-row bg-slate-50 p-3 rounded-2xl border border-slate-200 relative mb-2 italic">
        <button type="button" onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white text-rose-500 shadow-sm border border-rose-100 w-5 h-5 rounded-full flex items-center justify-center text-[8px]"><i class="fa-solid fa-x"></i></button>
        <div class="grid grid-cols-2 gap-2 mb-1"><input type="text" placeholder="RU / DE" class="nameRU bg-white p-2 rounded-xl text-[10px] font-bold outline-none italic"><input type="number" step="1" value="1" class="qty bg-white p-2 rounded-xl text-[10px] font-black outline-none text-center italic" oninput="calcRow(this, 'eur')"></div>
        <div class="grid grid-cols-2 gap-2">
            <div class="relative"><span class="absolute left-2 top-2 text-[8px] text-slate-400 font-black">€</span><input type="number" step="0.01" placeholder="Цена €" class="priceUnit bg-white p-2 pl-5 rounded-xl text-[10px] font-black outline-none italic w-full" oninput="calcRow(this, 'eur')"></div>
            <div class="relative"><span class="absolute left-2 top-2 text-[8px] text-blue-400 font-black">₴</span><input type="number" step="0.01" placeholder="Итого ₴" class="totalUah bg-blue-50 p-2 pl-5 rounded-xl text-[10px] font-black outline-none italic w-full text-blue-600" oninput="calcRow(this, 'uah')"></div>
        </div>
    </div>`;
    document.getElementById('itemsList').insertAdjacentHTML('beforeend', html);
}

function calcRow(el, source) {
    const row = el.closest('.item-row'), r = parseFloat(document.getElementById('customRate').value) || 51.55;
    const qty = parseFloat(row.querySelector('.qty').value) || 1;
    const pUnit = row.querySelector('.priceUnit');
    const tUah = row.querySelector('.totalUah');
    
    if (source === 'eur') {
        const eurTotal = (parseFloat(pUnit.value) || 0) * qty;
        tUah.value = (eurTotal * r).toFixed(2);
    } else {
        const eurTotal = (parseFloat(tUah.value) || 0) / r;
        pUnit.value = (eurTotal / qty).toFixed(4); // Точная цена за единицу
    }
}

function editRow(id) {
    const row = allRows.find(r => r[r.length-1] == id);
    if (!row) return;
    const category = row[1];
    let type = 'expense';
    if (category.includes('Доход')) type = 'income';
    if (category.includes('Перевод')) type = 'transfer';
    openModal(type);
    document.getElementById('editRowId').value = id;
    document.getElementById('date').value = new Date(row[0]).toISOString().split('T')[0];
    document.getElementById('merchant').value = row[2];
    document.getElementById('customRate').value = row[12];
    document.getElementById('acc').value = row[5];
    document.getElementById('cat').value = row[1];
    if (type === 'income') {
        document.getElementById('valEur').value = Math.abs(row[8]);
        document.getElementById('valUah').value = Math.abs(row[10]);
    } else if (type === 'expense') {
        document.getElementById('itemsList').innerHTML = "";
        addItemRow();
        const firstItem = document.querySelector('.item-row');
        firstItem.querySelector('.nameRU').value = row[4] || row[3];
        firstItem.querySelector('.priceUnit').value = Math.abs(row[7]);
        firstItem.querySelector('.qty').value = row[6];
        firstItem.querySelector('.totalUah').value = Math.abs(row[10]);
        document.getElementById('addItemBtn').classList.add('hidden');
    }
}

function calcSimple(source) {
    const rate = parseFloat(document.getElementById('customRate').value) || 51.55;
    if(source === 'UAH') document.getElementById('valEur').value = (document.getElementById('valUah').value / rate).toFixed(2);
    else document.getElementById('valUah').value = (document.getElementById('valEur').value * rate).toFixed(2);
}

function updateAllItems() { document.querySelectorAll('.item-row').forEach(r => calcRow(r.querySelector('.priceUnit'), 'eur')); }

async function save(e) {
    e.preventDefault(); document.getElementById('saveBtn').disabled = true;
    const type = document.getElementById('txType').value, rate = parseFloat(document.getElementById('customRate').value), rowId = document.getElementById('editRowId').value;
    let p = { date: document.getElementById('date').value, rate: rate, merchant: document.getElementById('merchant').value, rowId: rowId };
    if(type === 'expense') {
        p.account = document.getElementById('acc').value; p.category = document.getElementById('cat').value;
        p.items = Array.from(document.querySelectorAll('.item-row')).map(row => {
            const qty = parseFloat(row.querySelector('.qty').value)||1;
            const pUnit = parseFloat(row.querySelector('.priceUnit').value)||0;
            return { nameRU: row.querySelector('.nameRU').value, qty: qty, priceUnit: pUnit, totalEur: (qty * pUnit), totalUah: parseFloat(row.querySelector('.totalUah').value)||0 };
        });
    } else if (type === 'transfer') {
        p.action = 'transfer'; p.from = document.getElementById('tFrom').value; p.to = document.getElementById('tTo').value; p.eur = parseFloat(document.getElementById('trEur').value)||0; p.uah = parseFloat(document.getElementById('trUah').value)||0;
    } else {
        p.account = document.getElementById('acc').value; p.category = "💎 Доход"; p.totalEur = parseFloat(document.getElementById('valEur').value)||0; p.totalUah = parseFloat(document.getElementById('valUah').value)||0;
    }
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) }); location.reload();
}

function openModal(t) {
    document.getElementById('txType').value = t; document.getElementById('editRowId').value = "";
    document.getElementById('modal').classList.remove('hidden'); document.getElementById('addItemBtn').classList.remove('hidden');
    ['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id => document.getElementById(id).classList.add('hidden'));
    if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); document.getElementById('itemsList').innerHTML = ""; addItemRow(); }
    else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); }
    else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
    document.getElementById('customRate').value = document.getElementById('baseRate').value; document.getElementById('date').valueAsDate = new Date();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('Удалить?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }
window.onload = () => { const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + Date.now(); document.body.appendChild(s); };
</script>
</body>
</html>
