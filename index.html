<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyZBLdrbTdPZg6r4fPwqXxXdo1rJUTG0cWaZuv0SK_71J5pG7JlnyivTWdN9V8Foggl/exec";
const ORDER = ['πüèΠ SPARKASSE', 'πüèΠπüëΛ SPARKASSE –£–ê–¦–ï–†–ê', 'πü£Β –ù–ê–¦–‰–ß–ù–Ϊ–ï', 'πü΅Κπü΅Ππü£É –ü–†–‰–£–ê–Δ –û–¦–·', 'πüëΛ –£–ê–¦–ï–†–ê', 'πüç· –ö–û–ü–‰–¦–ö–ê', 'πü£≥πüéÄ –ö–†–ï–î–‰–Δ–ö–ê –û–¦–·', 'πü£≥πüëΛ –ö–†–ï–î–‰–Δ–ö–ê –£–ê–¦–ï–†–ê', 'πüêΖ –Γ–£–‰–ù–ö–ê', 'β€âοΗè –ö–û–ù–£–ï–†–Δ'];
const UAH_WALLETS = ['–ü–†–‰–£–ê–Δ', 'πüëΛ –£–ê–¦–ï–†–ê', '–ö–†–ï–î–‰–Δ–ö–ê', '–Γ–£–‰–ù–ö–ê', '–ö–û–ù–£–ï–†–Δ'];

let walletData = {};

function syncRate(v) { if(!v) return; localStorage.setItem('wallet_base_rate', v); document.getElementById('baseRate').value = v; drawBalance(); }

function getWalletCurrency(m) {
if (m.includes('–£–ê–¦–ï–†–ê') && !m.includes('SPARKASSE')) return 'UAH';
return UAH_WALLETS.some(k => m.includes(k)) ? 'UAH' : 'EUR';
}

function getDept(name) {
  const n = name.toLowerCase();
  if (/fΟΦllungen|–Ω–Μ–Ψ–Φ–±―΄|itzehoer|union|vitamin|–≤–Η―²–Α–Φ–Η–Ϋ/.test(n)) return "πü£ä –û―²–¥–Β–Μ–½–¥–Ψ―Ä–Ψ–≤―¨–Β";
  if (/internet|funk|brif|apple|–Ω–Η―¹―¨–Φ–Ψ|spiel|–Η–≥―Ä–Α|icloud|scribd|mobile|abonnement|–Ω–Ψ–¥–Ω–Η―¹–Κ–Α/.test(n)) return "πü¨ê –Γ–≤―è–Ζ―¨ –Η IT";
  if (/schlaufentrageta|―¹―É–Φ–Κ–Α|–Κ–Μ―É–±|kopfhΟΕrer|–Ϋ–Α―É―à–Ϋ–Η–Κ–Η|haken|–Κ―Ä―é―΅–Κ–Η/.test(n)) return "πü¦ç –†–Α–Ζ–Ϋ–Ψ–Β";
  if (/lΟΕffel|teller|–Μ–Ψ–Ε–Κ–Η|―²–Α―Ä–Β–Μ–Κ–Η|trennwand|―Ä–Α―¹―¹–Β–Κ–Α―²–Β–Μ―¨|mΟΦllsΟΛcke|–Ω–Α–Κ–Β―²―΄ –¥–Μ―è –Φ―É―¹–Ψ―Ä–Α|tul–Ω–Β–Ϋ|―Ü–≤–Β―²―΄|aufbewahrungs/.test(n)) return "πüè† –î–Ψ–Φ –Η –ë―΄―²";
  if (/schoko|―à–Ψ–Κ–Ψ–Μ–Α–¥|riegel|–±–Α―²–Ψ–Ϋ―΅–Η–Κ|savoiardi|–Ω–Β―΅–Β–Ϋ―¨–Β|pflaumenm|–Φ―É―¹―¹|edelzartbitter|–±–Β–Μ―΄–Ι|–Κ–Β–Κ―¹|gugel|frΟΦchte|―³―Ä―É–Κ―²―΄|kokos|–Ω–Η―Ä–Ψ–Ε|–Κ–Ψ–Ϋ―³–Β―²|―¹–Μ–Α–¥–Ψ―¹―²–Η/.test(n)) return "πüçΪ –Γ–Μ–Α–¥–Ψ―¹―²–Η";
  if (/mandel|–Φ–Η–Ϋ–¥–Α–Μ―¨|erdnue|–Α―Ä–Α―Ö–Η―¹|kraut|–Κ–Α–Ω―É―¹―²–Α|cornichon|–Κ–Ψ―Ä–Ϋ–Η―à–Ψ–Ϋ|kartoffelsalat|―¹–Α–Μ–Α―²|linsen|―΅–Β―΅–Β–≤–Η―Ü–Α|sell|―¹–Β–Μ―¨–¥–Β―Ä–Β–Ι|schaeltomate|―²–Ψ–Φ–Α―²|saft|―¹–Ψ–Κ|senf|–≥–Ψ―Ä―΅–Η―Ü–Α|sauce|―¹–Ψ―É―¹|zitron|–Μ–Η–Φ–Ψ–Ϋ|wuerze|–Ω―Ä–Η–Ω―Ä–Α–≤–Α|zwiebel|–Μ―É–Κ|zucker|―¹–Α―Ö–Α―Ä|paprika|–Ω–Α–Ω―Ä–Η–Κ–Α|kurkuma|–Κ―É―Ä–Κ―É–Φ–Α|gurken|–Ψ–≥―É―Ä―Ü―΄|prodomo|–Κ–Ψ―³–Β/.test(n)) return "πüΞΪ –ë–Α–Κ–Α–Μ–Β―è –Η –ö–Ψ–Ϋ―¹–Β―Ä–≤―΄";
  if (/pizza|–Ω–Η―Ü―Ü–Α|piccolinis|pfannengemuese|frikadellen|―³―Ä–Η–Κ–Α–¥–Β–Μ–Η|asia|iglo|filet|―³–Η–Μ–Β|italien/.test(n)) return "πüßä –½–Α–Φ–Ψ―Ä–Ψ–Ζ–Κ–Α";
  if (/butter|–Φ–Α―¹–Μ–Ψ|edamer|―¹―΄―Ä|joghurt|–Ι–Ψ–≥―É―Ä―²|skyr|―¹–Κ–Η―Ä|quark|―²–≤–Ψ―Ä–Ψ–≥|brie|–±―Ä–Η|fraiche|―³―Ä–Β―à|eier|―è–Ι―Ü–Α|philadelphia|ΟΕl|milch|–Φ–Ψ–Μ–Ψ–Κ–Ψ|chedd|―΅–Β–¥–¥–Β―Ä|gouda|–≥–Α―É–¥–Α/.test(n)) return "πüßÄ –€–Ψ–Μ–Ψ―΅–Κ–Α –Η –Γ―΄―Ä―΄";
  if (/pfand|–Ζ–Α–Μ–Ψ–≥|leergut|―²–Α―Ä–Α|–¥–Β–Ω–Ψ–Ζ–Η―²/.test(n)) return "βôΜοΗè –½–Α–Μ–Ψ–≥ (Pfand)";
  if (/toilettenpapier|–±―É–Φ–Α–≥–Α|tatΟΦ|―¹–Α–Μ―³–Β―²–Κ–Η|elvital|maske|deo|mint|dontodent|watte|–¥–Η―¹–Κ–Η|urea|fussba|–Ω–Α–Μ–Ψ―΅–Κ–Η|handtuch|–Ω–Ψ–Μ–Ψ―²–Β–Ϋ―Ü–Β|–Κ―Ä–Α―¹–Κ–Α/.test(n)) return "πü¦Ä –™–Η–≥–Η–Β–Ϋ–Α";
  if (/brot|―Ö–Μ–Β–±|kruste|–±―É–Μ–Ψ―΅–Κ–Η|weizen|roggen|–Κ–Α―Ä―²–Ψ―³–Β–Μ―¨|kartoffel|bauern/.test(n)) return "πüΞ• –Ξ–Μ–Β–±–Ψ–±―É–Μ–Ψ―΅–Ϋ―΄–Β";
  if (/vorteil|rabatt|―¹–Κ–Η–¥–Κ–Α|card|rΟΦckgeld|–≤–Ψ–Ζ–≤―Ä–Α―²/.test(n)) return "πüèΖοΗè –Γ–Κ–Η–¥–Κ–Α";
  if (/bensin|–±–Β–Ϋ–Ζ–Η–Ϋ|lastschrift|―¹–Ω–Η―¹–Α–Ϋ–Η–Β|parken|–Ω–Α―Ä–Κ–Ψ–≤–Κ–Α|parkzeit/.test(n)) return "πüö½ –ê–≤―²–Ψ";
  if (/wein|–≤–Η–Ϋ–Ψ|bier|–Ω–Η–≤–Ψ|spritz|export|wodka|–≤–Ψ–¥–Κ–Α|zweigelt|grigio|weiΟüherbst|thurgau/.test(n)) return "πüçΖ –ê–Μ–Κ–Ψ–≥–Ψ–Μ―¨";
  if (/param|blue|tabak|―²–Α–±–Α–Κ/.test(n)) return "πüö§ –Δ–Α–±–Α–Κ";
  if (/ministicks|―¹―²–Β–Ι–Κ|nacken|―à–Β―è|hackfleisch|―³–Α―Ä―à/.test(n)) return "πüΞ© –€―è―¹–Ψ, –Λ–Α―Ä―à";
  if (/erdbeeren|–Κ–Μ―É–±–Ϋ–Η–Κ–Α|bananen|–±–Α–Ϋ–Α–Ϋ―΄|lauch|–Μ―É–Κ|dill|―É–Κ―Ä–Ψ–Ω|gurken|–Ψ–≥―É―Ä―Ü―΄|ΟΛpfel|―è–±–Μ–Ψ–Κ–Η|kohl|–Κ–Α–Ω―É―¹―²–Α/.test(n)) return "πüΞ½ –û–≤–Ψ―â–Η / –Λ―Ä―É–Κ―²―΄";
  if (/bacon|–±–Β–Κ–Ψ–Ϋ|frikadellen|–Κ–Ψ–Μ–±–Α―¹|salami|―¹–Α–Μ―è–Φ–Η|speck|―à–Ω–Η–Κ|leberwurst|lyoner/.test(n)) return "πü¨≠ –ö–Ψ–Μ–±–Α―¹―΄";
  if (/nudeln|–Φ–Α–Κ–Α―Ä–Ψ–Ϋ―΄/.test(n)) return "πüç€ –€–Α–Κ–Α―Ä–Ψ–Ϋ―΄";
  if (/mineralwasser|–≤–Ψ–¥–Α|trinken|–Ϋ–Α–Ω–Η―²–Ψ–Κ|saft/.test(n)) return "πüßÉ –ù–Α–Ω–Η―²–Κ–Η";
  return "";
}

function drawBalance() {
const r = parseFloat(document.getElementById('baseRate').value)||51.2828;
let total = 0;
const grid = document.getElementById('walletsGrid');
grid.innerHTML = "";
ORDER.forEach(m => {
const v = walletData[m]||{uah:0,eur:0};
const curr = getWalletCurrency(m);
const eq = curr === 'EUR' ? v.eur : v.uah/r;
total += eq;
grid.innerHTML += `<div class="bg-slate-50 p-1 rounded-lg border flex flex-col items-center">
<div class="text-[5.5px] text-slate-400 text-center leading-tight h-[14px] flex items-center">${m}</div>
<div class="text-[8px] font-black ${m==='πüèΠ SPARKASSE' && v.eur < 10 ? 'text-rose-500' : ''}">${curr==='UAH'?'β²¥'+Math.round(v.uah):'β²§'+v.eur.toFixed(2)}</div></div>`;
});
document.getElementById('mainBalance').innerText = 'β²§ ' + total.toLocaleString('de-DE',{minimumFractionDigits:2});
}

function draw(data) {
if(!data||!data.rows) return;¬†
walletData = {};¬†
const hist = document.getElementById('history'); hist.innerHTML = "";
data.rows.forEach((row, i) => {
if(i === 0) return;
let cellF = String(row[5] || "").trim();
if(!ORDER.includes(cellF)) return;
if(!walletData[cellF]) walletData[cellF]={uah:0,eur:0};
walletData[cellF].eur += parseFloat(String(row[8]||"0").replace(',','.'))||0;
walletData[cellF].uah += parseFloat(String(row[10]||"0").replace(',','.'))||0;
});
data.rows.slice(1,15).forEach(r => {
let cellF = String(r[5]||"").trim();
const curr = getWalletCurrency(cellF);
const val = curr === 'UAH' ? parseFloat(r[10])||0 : parseFloat(r[8])||0;
if(val === 0) return;
hist.innerHTML += `<div class="bg-white p-2 rounded-xl flex justify-between items-center border border-slate-50 mb-1 shadow-sm">
<div><p class="text-[9px] text-slate-700 font-black uppercase">${r[4]||r[2]}</p><p class="text-[5px] opacity-30 font-black">${cellF}</p></div>
<div class="${val>0?'text-emerald-500':'text-rose-500'} text-[10px] font-black italic">${val>0?'+':''}${Math.abs(val).toFixed(curr==='UAH'?0:2)}${curr==='UAH'?'β²¥':'β²§'}</div></div>`;
});
drawBalance();
}

async function save(event) {
if (event) event.preventDefault();
const btn = document.getElementById('saveBtn');
if (btn.disabled) return;

const t = document.getElementById('txType').value;
const r = parseFloat(document.getElementById('customRate').value);
const commonData = {
date: document.getElementById('date').value,
rate: r,
merchant: document.getElementById('merchant').value,
action: t
};

btn.disabled = true; btn.innerText = "...";

if (t === 'expense') {
const rows = document.querySelectorAll('.item-row');
for (let row of rows) {
let p = {...commonData};
p.account = document.getElementById('acc').value;
p.category = document.getElementById('cat').value;
p.nameRU = row.querySelector('.nameRU').value;
p.qty = parseFloat(row.querySelector('.qty').value) || 1;
p.priceUnit = parseFloat(row.querySelector('.priceUnit').value) || 0;
p.totalUah = parseFloat(row.querySelector('.totalUah').value) || 0;
// –ê–£–Δ–û–½–ê–ü–û–¦–ù–ï–ù–‰–ï –û–Δ–î–ï–¦–ê
p.dept = getDept(p.nameRU);
if (p.priceUnit || p.totalUah) {
await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
}
}
} else if (t === 'transfer') {
let p = {...commonData};
p.from = document.getElementById('tFrom').value;
p.to = document.getElementById('tTo').value;
p.eur = parseFloat(document.getElementById('trEur').value) || 0;
p.uah = parseFloat(document.getElementById('trUah').value) || 0;
if (p.eur || p.uah) await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
} else if (t === 'income') {
let p = {...commonData};
p.account = document.getElementById('acc').value;
p.category = "πü£Α –î–Ψ―Ö–Ψ–¥";
p.priceUnit = parseFloat(document.getElementById('valEur').value) || 0;
p.totalUah = parseFloat(document.getElementById('valUah').value) || 0;
if (p.priceUnit || p.totalUah) await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
}

setTimeout(() => { location.reload(); }, 600);
}

function openModal(t){
document.getElementById('txType').value=t;
document.getElementById('modal').classList.remove('hidden');
document.getElementById('customRate').value = localStorage.getItem('wallet_base_rate') || "51.2828";
['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id=>document.getElementById(id).classList.add('hidden'));
const selects=document.querySelectorAll('.wallet-select');
selects.forEach(s=>{ s.innerHTML=""; ORDER.forEach(m=>{ s.innerHTML+=`<option value="${m}">${m}</option>`; }); });
if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); document.getElementById('itemsList').innerHTML=""; addItemRow(); }
else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); }
else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
document.getElementById('date').valueAsDate=new Date();
}

function addItemRow() {
document.getElementById('itemsList').insertAdjacentHTML('beforeend', `<div class="item-row bg-slate-50 p-2 rounded-lg border mb-1 relative">
<div class="grid grid-cols-2 gap-1 mb-1"><input type="text" placeholder="–Δ–Ψ–≤–Α―Ä" class="nameRU bg-white p-1 rounded text-[8px] font-black italic"><input type="number" value="1" class="qty bg-white p-1 rounded text-[8px] text-center font-black" oninput="calcRow(this,'eur')"></div>
<div class="grid grid-cols-2 gap-1"><input type="number" step="0.01" placeholder="β²§" class="priceUnit bg-white p-1 rounded text-[8px] font-black" oninput="calcRow(this,'eur')"><input type="number" step="0.01" placeholder="β²¥" class="totalUah bg-blue-50 p-1 rounded text-[8px] text-blue-600 font-black" oninput="calcRow(this,'uah')"></div></div>`);
}

function calcRow(el,s){
const row=el.closest('.item-row'), r=parseFloat(document.getElementById('customRate').value), q=parseFloat(row.querySelector('.qty').value)||1, pu=row.querySelector('.priceUnit'), tu=row.querySelector('.totalUah');
if(s==='eur') tu.value=((parseFloat(pu.value)||0)*q*r).toFixed(0); else pu.value=((parseFloat(tu.value)||0)/r/q).toFixed(2);
}

function calcSimple(s){
const r=parseFloat(document.getElementById('customRate').value);
if(s==='UAH') document.getElementById('valEur').value=(document.getElementById('valUah').value/r).toFixed(2);
else document.getElementById('valUah').value=(document.getElementById('valEur').value*r).toFixed(0);
}

function closeModal(){ document.getElementById('modal').classList.add('hidden'); }

window.onload=()=>{
const r=localStorage.getItem('wallet_base_rate')||"51.2828";
document.getElementById('baseRate').value=r;
const s=document.createElement('script');
s.src=API_URL+"?callback=draw&_t="+Date.now();
document.body.appendChild(s);
};
</script>
