<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartWallet v44.9</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head><body class="bg-slate-50 text-slate-900 p-2 pb-10 italic font-bold">
<button onclick="location.reload()" class="fixed top-3 right-3 z-50 bg-white/80 w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center shadow-sm">
<i class="fa-solid fa-rotate text-blue-500 text-[10px]"></i>
</button><div class="bg-white p-3 rounded-[25px] border border-slate-100 mb-2 shadow-lg text-center">
<div class="flex justify-between items-center mb-1 text-[7px] opacity-40 uppercase font-black">
<span>–Ъ—Г—А—Б: <input type="number" id="baseRate" step="0.01" oninput="syncRate(this.value)" class="w-10 bg-slate-50 rounded px-1 text-blue-600 outline-none"></span>
<span class="opacity-100 text-blue-500">v44.9</span>
</div><h1 id="mainBalance" class="text-2xl mb-1 tracking-tighter text-slate-800">–Ч–Р–У–†–£–Ч–Ъ–Р...</h1>
<div id="walletsGrid" class="grid grid-cols-3 gap-1 text-[7px] uppercase font-black italic"></div>
</div><div class="flex gap-1 mb-2 font-black">
<button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-3 rounded-xl text-[9px] text-white uppercase shadow-sm">–†–∞—Б—Е–Њ–і</button>
<button onclick="openModal('transfer')" class="flex-1 bg-slate-100 py-3 rounded-xl text-[9px] text-slate-600 uppercase shadow-sm">–Я–µ—А–µ–≤–Њ–і</button>
<button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-3 rounded-xl text-[9px] text-white uppercase shadow-sm">–Ф–Њ—Е–Њ–і</button>
</div><div class="mb-2">
<input type="text" id="searchInput" oninput="filterHistory()" placeholder="–Я–Ю–Ш–°–Ъ..." class="w-full bg-white border py-2 px-3 rounded-xl text-[9px] outline-none uppercase italic font-bold shadow-sm">
</div><div id="history" class="space-y-1 text-xs font-black"></div>
<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-3 z-50 font-bold">
<div class="bg-white w-full max-w-sm rounded-[30px] p-4 shadow-2xl overflow-y-auto max-h-[90vh]">
<h2 id="modalTitle" class="text-sm text-slate-800 mb-3 uppercase text-center font-black">–Ч–Р–Я–Ш–°–ђ</h2>
<form onsubmit="save(event)" class="space-y-2">
<input type="hidden" id="txType"><input type="hidden" id="editRowId">
<div class="grid grid-cols-2 gap-2"><input type="date" id="date" class="bg-slate-50 p-2 rounded-lg border text-[9px] font-black"><input type="number" id="customRate" step="0.01" oninput="syncRate(this.value)" class="bg-blue-50 p-2 rounded-lg border text-[9px] text-blue-600 font-black"></div>
<input type="text" id="merchant" oninput="liveClassify(this.value)" placeholder="–Ю–њ–Є—Б–∞–љ–Є–µ / –Ь–∞–≥–∞–Ј–Є–љ" class="w-full bg-slate-50 p-2 rounded-lg border text-[10px] uppercase italic font-black">
<div id="subCatPreview" class="hidden text-[7px] text-blue-500 ml-2 uppercase">–Ю—В–і–µ–ї: ...</div>
<div id="expenseSection" class="hidden space-y-2"><div id="itemsList" class="space-y-1"></div><button type="button" onclick="addItemRow()" class="w-full py-1.5 border-2 border-dashed border-rose-100 rounded-lg text-rose-300 text-[7px] uppercase font-black">+ –Ґ–Ю–Т–Р–†</button></div>
<div id="incomeSection" class="hidden bg-emerald-50 p-2 rounded-xl grid grid-cols-2 gap-2 text-center"><div><label class="text-[5px] block font-black">вВі</label><input type="number" id="valUah" step="0.01" oninput="calcSimple('UAH')" class="w-full bg-transparent text-sm text-emerald-600 text-center font-black"></div><div><label class="text-[5px] block font-black">вВђ</label><input type="number" id="valEur" step="0.01" oninput="calcSimple('EUR')" class="w-full bg-transparent text-sm text-center font-black"></div></div>
<div id="transferSection" class="hidden space-y-2"><div class="grid grid-cols-2 gap-1 text-[8px] font-black"><select id="tFrom" class="wallet-select bg-slate-50 p-2 rounded-lg border uppercase italic"></select><select id="tTo" class="wallet-select bg-slate-50 p-2 rounded-lg border uppercase text-blue-600 italic"></select></div><div class="bg-blue-50 p-2 rounded-xl grid grid-cols-2 gap-2 text-center"><input type="number" id="trEur" placeholder="вВђ" step="0.01" class="bg-transparent text-xs font-black"><input type="number" id="trUah" placeholder="вВі" step="0.01" class="bg-transparent text-blue-600 text-xs font-black"></div></div>
<div id="accCatGroup" class="grid grid-cols-2 gap-1 text-[8px] font-black italic"><select id="acc" class="wallet-select bg-slate-50 p-2 rounded-lg border uppercase"></select><select id="cat" class="bg-slate-50 p-2 rounded-lg border uppercase"><option>рЯНО –Я—А–Њ–і—Г–Ї—В—Л / –С—Л—В</option><option>рЯП† –Ц–Є–ї—М–µ / –°–≤—П–Ј—М</option><option>рЯЪђ –Ґ–∞–±–∞–Ї</option><option>рЯНЈ –Р–ї–Ї–Њ–≥–Њ–ї—М</option><option>вШХпЄП –Ъ–∞—Д–µ / –Ю—В–і—Л—Е</option><option>рЯТК –Ч–і–Њ—А–Њ–≤—М–µ / –Ъ—А–∞—Б–Њ—В–∞</option><option>рЯЪЧ –Ґ—А–∞–љ—Б–њ–Њ—А—В</option><option>рЯП¶ –С–∞–љ–Ї / –Ъ–Њ–Љ–Є—Б—Б–Є–Є</option><option>рЯЩЗвАНвЩАпЄП –£—З–µ–±–∞</option><option>рЯЫН –Ю—Б—В–∞–ї—М–љ–Њ–µ / –®–Њ–њ–Є–љ–≥</option><option>рЯПЦпЄП –†–∞–Ј–≤–ї–µ—З–µ–љ–Є—П</option><option>рЯНѓ –Ъ–Ю–Я–Ш–Ы–Ъ–Р</option><option>рЯТ∞ –Ф–Њ—Е–Њ–і</option></select></div>
<div class="flex gap-2 pt-1"><button type="button" onclick="closeModal()" class="flex-1 bg-slate-50 py-2 rounded-lg uppercase text-[8px] text-slate-300">–Ю–Ґ–Ь–Х–Э–Р</button><button id="saveBtn" class="flex-[2] bg-blue-600 text-white py-2 rounded-lg uppercase text-[8px] shadow-md font-black italic">–Ч–Р–Я–Ш–°–Р–Ґ–ђ</button></div></form></div></div><script>
const API_URL = "https://script.google.com/macros/s/AKfycby9LmGMq1aLDx-Eh87mSYBJsqRWUIV5kfaFWDlfYcO3FUojZz3IZCg5Fpo1URkNbEe4/exec";
const ACC_EMOJIS = { "SPARKASSE": "рЯП¶ SPARKASSE", "SPARKASSE –Т–Р–Ы–Х–†–Р": "рЯП¶рЯС§ SPARKASSE –Т–Р–Ы–Х–†–Р", "–Я–†–Ш–Т–Р–Ґ –Ю–Ы–ѓ": "рЯЗЇрЯЗ¶рЯТГ –Я–†–Ш–Т–Р–Ґ –Ю–Ы–ѓ", "–Т–Р–Ы–Х–†–Р": "рЯС§ –Т–Р–Ы–Х–†–Р", "–Э–Р–Ы–Ш–І–Э–Ђ–Х": "рЯТµ –Э–Р–Ы–Ш–І–Э–Ђ–Х", "–°–Т–Ш–Э–Ъ–Р": "рЯРЈ –°–Т–Ш–Э–Ъ–Р", "–Ъ–Ю–Я–Ш–Ы–Ъ–Р": "рЯНѓ –Ъ–Ю–Я–Ш–Ы–Ъ–Р", "–Ъ–Ю–Э–Т–Х–†–Ґ": "вЬЙпЄП –Ъ–Ю–Э–Т–Х–†–Ґ", "–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Ю–Ы–ѓ": "рЯТ≥рЯОА –Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Ю–Ы–ѓ", "–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Т–Р–Ы–Х–†–Р": "рЯТ≥рЯС§ –Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Т–Р–Ы–Х–†–Р" };
const ORDER = ['SPARKASSE', 'SPARKASSE –Т–Р–Ы–Х–†–Р', '–Э–Р–Ы–Ш–І–Э–Ђ–Х', '–Я–†–Ш–Т–Р–Ґ –Ю–Ы–ѓ', '–Т–Р–Ы–Х–†–Р', '–Ъ–Ю–Я–Ш–Ы–Ъ–Р', '–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Ю–Ы–ѓ', '–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Т–Р–Ы–Х–†–Р', '–°–Т–Ш–Э–Ъ–Р', '–Ъ–Ю–Э–Т–Х–†–Ґ'];
const UAH_WALLETS = ['–Я–†–Ш–Т–Р–Ґ', '–Т–Р–Ы–Х–†–Р', '–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р', '–°–Т–Ш–Э–Ъ–Р', '–Ъ–Ю–Э–Т–Х–†–Ґ'];
const OPERATIVE = ['–Я–†–Ш–Т–Р–Ґ', '–Т–Р–Ы–Х–†–Р', 'SPARKASSE', '–Э–Р–Ы–Ш–І–Э–Ђ–Х', '–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р', '–°–Т–Ш–Э–Ъ–Р', '–Ъ–Ю–Э–Т–Х–†–Ґ'];

// –С–∞–Ј–∞ —Б–Њ–Њ—В–≤–µ—В—Б—В–≤–Є–є (–Ю—В–і–µ–ї—Л –Є–Ј –Ї–Њ–ї–Њ–љ–Ї–Є N)
const KNOWLEDGE_BASE = [
    { key: /funk|internet|t-mobile|icloud|scribd/i, dept: "–°–≤—П–Ј—М –Є IT рЯМР" },
    { key: /pfand|leergut/i, dept: "–Ч–∞–ї–Њ–≥ (Pfand) вЩїпЄП" },
    { key: /bier|wein|vodka|spritz|pils|koelsch/i, dept: "–Р–ї–Ї–Њ–≥–Њ–ї—М рЯНЈ" },
    { key: /tabak|paramount|—Б–Є–≥–∞—А–µ—В/i, dept: "–Ґ–∞–±–∞–Ї рЯЪђ" },
    { key: /rabatt|preisvorteil|—Б–Ї–Є–і–Ї–∞/i, dept: "–°–Ї–Є–і–Ї–∞ рЯПЈпЄП" },
    { key: /g&g|herz|bio e|landl|oetk/i, dept: "–С–∞–Ї–∞–ї–µ—П –Є –Ъ–Њ–љ—Б–µ—А–≤—Л рЯ•Ђ" },
    { key: /frikadellen|salami|wurst|fleisch/i, dept: "–Ъ–Њ–ї–±–∞—Б—Л / –§—А–Є–Ї–∞–і–µ–ї–Є рЯМ≠" },
    { key: /joghurt|skyr|quark|brie|cheese|kaese|edamer|chedd|milch/i, dept: "–Ь–Њ–ї–Њ—З–Ї–∞ –Є –°—Л—А—Л рЯІА" },
    { key: /brot|buns|broetchen|toast|gugelhupf/i, dept: "–•–ї–µ–±–Њ–±—Г–ї–Њ—З–љ—Л–µ рЯ•Ц" },
    { key: /piccolinis|pizza|gemuese|iglo/i, dept: "–Ч–∞–Љ–Њ—А–Њ–Ј–Ї–∞ рЯІК" },
    { key: /deo|shampoo|duschgel|loreal|niv|elvital|watte|zahne/i, dept: "–У–Є–≥–Є–µ–љ–∞ рЯЫА" },
    { key: /mandel|erdnue|schoko|sweets|—Б–ї–∞–і–Њ—Б—В–Є|keks/i, dept: "–°–ї–∞–і–Њ—Б—В–Є рЯНЂ" },
    { key: /sauerkraut|erdbeeren|apfel|gurken|salat|zwiebeln|paprika/i, dept: "–Ю–≤–Њ—Й–Є –Є –§—А—Г–Ї—В—Л рЯ•Ч" },
    { key: /benzin|bensin|park/i, dept: "–Р–≤—В–Њ рЯЪЧ" },
    { key: /union|kranken|b12|pill/i, dept: "–Ч–і–Њ—А–Њ–≤—М–µ рЯТК" },
    { key: /–љ–∞ –Ї–∞—А—В—Г|—Б –Ї–∞—А—В—Л|—Б–≤–Є–љ–Ї|–Ї–Њ–љ–≤–µ—А—В|–њ–µ—А–µ–≤–Њ–і/i, dept: "–§–Є–љ–∞–љ—Б—Л рЯП¶" }
];

let walletData = {}, allRows = [];
function isUah(m) { const n = m.toUpperCase(); return UAH_WALLETS.some(k => n.includes(k)) && !n.includes('–Ъ–Ю–Я–Ш–Ы–Ъ–Р'); }
function getMarker(name) { if(!name) return "–Ю–°–Ґ–Р–Ы–ђ–Э–Ю–Х"; let n = name.toUpperCase(); for (let key in ACC_EMOJIS) { if (n.includes(key)) return key; } return n; }

function syncRate(val) { if (!val) return; localStorage.setItem('wallet_base_rate', val); document.getElementById('baseRate').value = val; document.getElementById('customRate').value = val; drawBalance(); }

function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55; let totalOpEur = 0;
    const grid = document.getElementById('walletsGrid'); grid.innerHTML = "";
    ORDER.forEach(m => {
        const val = walletData[m] || { uah: 0, eur: 0 }, isU = isUah(m);
        const eqEur = m === '–Ъ–Ю–Я–Ш–Ы–Ъ–Р' ? val.eur : (isU ? (val.uah / r) : val.eur);
        if (OPERATIVE.some(k => m.includes(k))) totalOpEur += eqEur;
        grid.innerHTML += `<div class="bg-slate-50 p-1 rounded-lg border border-slate-100 flex flex-col items-center">
        <div class="text-[7px] text-slate-400 leading-tight mb-0.5 text-center">${ACC_EMOJIS[m].split(' ')[0]} ${m}</div>
        <div class="text-[8px] font-black">${isU ? 'вВі'+Math.round(val.uah) : 'вВђ'+val.eur.toFixed(0)}</div>
        ${isU ? `<div class="text-[5px] text-blue-500">вВђ${Math.round(eqEur)}</div>` : ''}</div>`;
    }); document.getElementById('mainBalance').innerText = 'вВђ ' + totalOpEur.toLocaleString('de-DE', {minimumFractionDigits: 1});
}

function draw(data) {
    if (!data || !data.rows) return; allRows = data.rows; walletData = {};
    const query = (document.getElementById('searchInput').value || "").toUpperCase();
    const hist = document.getElementById('history'); hist.innerHTML = ""; let lastDateStr = "";
    allRows.forEach((row, i) => {
        if (i === 0 || !row[5]) return;
        const m = getMarker(row[5]), valE = parseFloat(row[8]) || 0, valU = parseFloat(row[10]) || 0;
        if (!walletData[m]) walletData[m] = { uah: 0, eur: 0 };
        walletData[m].eur += valE; walletData[m].uah += valU;
    });
    allRows.slice(1, 100).forEach(r => {
        const m = getMarker(r[5]), nRU = String(r[4] || "").toUpperCase();
        if (query && !m.includes(query) && !nRU.includes(query)) return;
        const valU = parseFloat(r[10]) || 0, valE = parseFloat(r[8]) || 0, id = r[r.length-1]; if (valU === 0 && valE === 0) return;
        const rd = new Date(r[0]); let ds = rd.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        if (ds !== lastDateStr) { hist.innerHTML += `<div class="text-[6px] text-slate-300 mt-2 mb-1 ml-2 uppercase">${ds}</div>`; lastDateStr = ds; }
        const isU_row = isUah(m), amt = isU_row ? valU : valE;
        hist.innerHTML += `<div class="bg-white p-2 rounded-xl flex justify-between items-center border border-slate-50 mb-1">
        <div class="flex items-center gap-2"><div><button onclick="deleteRow(${id})" class="text-rose-200 text-[8px]">вЬХ</button></div>
        <div class="truncate"><p class="text-[9px] text-slate-700 truncate leading-tight font-black uppercase">${r[4]||r[2]}</p>
        <p class="text-[5px] opacity-30 font-black">${ACC_EMOJIS[m] || m} вАҐ ${r[13] || '–†–Р–Ч–Э–Ю–Х'}</p></div></div>
        <div class="${amt>0?'text-emerald-500':'text-rose-500'} text-[10px] pl-2 font-black italic">${amt>0?'+':''}${Math.abs(amt).toFixed(isU_row?0:1)}${isU_row?'вВі':'вВђ'}</div></div>`;
    }); drawBalance();
}

function initSelects() {
    const selects = document.querySelectorAll('.wallet-select');
    selects.forEach(s => { s.innerHTML = ""; ORDER.forEach(m => { s.innerHTML += `<option value="${m}">${ACC_EMOJIS[m]}</option>`; }); });
}

function addItemRow() {
    const id = Date.now();
    document.getElementById('itemsList').insertAdjacentHTML('beforeend', `<div id="item-${id}" class="item-row bg-slate-50 p-2 rounded-lg relative mb-1 border border-slate-100"><button type="button" onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white text-rose-500 w-3 h-3 rounded-full flex items-center justify-center text-[6px] border shadow-sm font-black">X</button><div class="grid grid-cols-2 gap-1 mb-1"><input type="text" placeholder="–Ґ–Њ–≤–∞—А" class="nameRU bg-white p-1 rounded text-[8px] font-black italic"><input type="number" value="1" class="qty bg-white p-1 rounded text-[8px] font-black text-center" oninput="calcRow(this, 'eur')"></div><div class="grid grid-cols-2 gap-1"><input type="number" step="0.01" placeholder="вВђ" class="priceUnit bg-white p-1 rounded text-[8px] font-black" oninput="calcRow(this, 'eur')"><input type="number" step="0.01" placeholder="вВі" class="totalUah bg-blue-50 p-1 rounded text-[8px] text-blue-600 font-black" oninput="calcRow(this, 'uah')"></div></div>`);
}
function calcRow(el, s) { const row = el.closest('.item-row'), r = parseFloat(document.getElementById('customRate').value) || 51.55, q = parseFloat(row.querySelector('.qty').value) || 1, pu = row.querySelector('.priceUnit'), tu = row.querySelector('.totalUah'); if (s === 'eur') tu.value = ((parseFloat(pu.value) || 0) * q * r).toFixed(0); else pu.value = ((parseFloat(tu.value) || 0) / r / q).toFixed(2); }
function calcSimple(s) { const r = parseFloat(document.getElementById('customRate').value) || 51.55; if(s === 'UAH') document.getElementById('valEur').value = (document.getElementById('valUah').value / r).toFixed(2); else document.getElementById('valUah').value = (document.getElementById('valEur').value * r).toFixed(0); }

async function save(event) {
    event.preventDefault(); const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "...";
    const t = document.getElementById('txType').value, r = parseFloat(document.getElementById('customRate').value), rowId = document.getElementById('editRowId').value;
    const deptText = document.getElementById('subCatPreview').innerText.replace("–Ю—В–і–µ–ї: ", "");
    let p = { date: document.getElementById('date').value, rate: r, merchant: document.getElementById('merchant').value, rowId: rowId, action: t, dept: deptText };
    if(t === 'expense') {
        p.account = document.getElementById('acc').value; p.category = document.getElementById('cat').value; const rows = document.querySelectorAll('.item-row');
        if (!rowId && rows.length > 1) p.items = Array.from(rows).map(row => ({ nameRU: row.querySelector('.nameRU').value, qty: parseFloat(row.querySelector('.qty').value)||1, priceUnit: parseFloat(row.querySelector('.priceUnit').value)||0, totalUah: parseFloat(row.querySelector('.totalUah').value)||0 }));
        else { const f = rows[0]; p.nameRU = f.querySelector('.nameRU').value; p.qty = parseFloat(f.querySelector('.qty').value)||1; p.priceUnit = parseFloat(f.querySelector('.priceUnit').value)||0; p.totalUah = parseFloat(f.querySelector('.totalUah').value)||0; }
    } else if (t === 'transfer') { p.from = document.getElementById('tFrom').value; p.to = document.getElementById('tTo').value; p.eur = parseFloat(document.getElementById('trEur').value)||0; p.uah = parseFloat(document.getElementById('trUah').value)||0; }
    else if (t === 'income') { p.account = document.getElementById('acc').value; p.category = "рЯТ∞ –Ф–Њ—Е–Њ–і"; p.totalEur = parseFloat(document.getElementById('valEur').value)||0; p.totalUah = parseFloat(document.getElementById('valUah').value)||0; }
    try { await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) }); location.reload(); } catch(err) { alert("–Ю—И–Є–±–Ї–∞!"); btn.disabled = false; btn.innerText = "–Ч–Р–Я–Ш–°–Р–Ґ–ђ"; }
}

function liveClassify(text) {
    const preview = document.getElementById('subCatPreview'); if (!text || text.length < 2) { preview.classList.add('hidden'); return; }
    let low = text.toLowerCase(); let sc = "–†–Р–Ч–Э–Ю–Х";
    for (let item of KNOWLEDGE_BASE) { if (item.key.test(low)) { sc = item.dept; break; } }
    preview.innerText = "–Ю—В–і–µ–ї: " + sc; preview.classList.remove('hidden');
}

function filterHistory() { draw({ rows: allRows }); }
function openModal(t) {
    document.getElementById('txType').value = t; document.getElementById('editRowId').value = ""; document.getElementById('modal').classList.remove('hidden');
    ['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id => document.getElementById(id).classList.add('hidden'));
    initSelects();
    if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); document.getElementById('itemsList').innerHTML = ""; addItemRow(); }
    else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); }
    else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
    document.getElementById('customRate').value = document.getElementById('baseRate').value;
    document.getElementById('date').valueAsDate = new Date();
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('–£–і–∞–ї–Є—В—М?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }

window.onload = () => {
    const savedRate = localStorage.getItem('wallet_base_rate') || "51.55";
    document.getElementById('baseRate').value = savedRate; document.getElementById('customRate').value = savedRate;
    initSelects();
    const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + Date.now(); document.body.appendChild(s);
};
</script></body></html>
