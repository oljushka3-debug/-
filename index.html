<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet Pro v20.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-4 pb-10 italic">

<button onclick="location.reload()" class="fixed top-6 right-6 z-50 bg-white w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center shadow-lg active:scale-90 transition-all">
    <i class="fa-solid fa-rotate text-blue-500"></i>
</button>

<div class="bg-white p-6 rounded-[35px] border border-slate-100 mb-4 shadow-xl text-center">
    <div class="flex justify-between items-center mb-4 text-[10px] font-black opacity-40 uppercase">
        <span>Курс НБУ: <input type="number" id="baseRate" value="51.55" step="0.01" oninput="drawBalance()" class="w-14 bg-slate-50 rounded px-1 text-blue-600 outline-none font-bold"></span>
        <span>ФЕВРАЛЬ 2026</span>
    </div>
    <h1 id="mainBalance" class="text-4xl font-black italic mb-6 tracking-tighter text-slate-800">€ 0.00</h1>
    <div id="walletsGrid" class="grid grid-cols-2 gap-3 text-[9px] font-bold uppercase italic text-center">
        </div>
</div>

<div class="flex gap-2 mb-8 font-black">
    <button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-rose-700 shadow-lg active:translate-y-1">Расход</button>
    <button onclick="openModal('transfer')" class="flex-1 bg-slate-200 py-5 rounded-3xl text-[10px] text-slate-700 uppercase border-b-4 border-slate-400 shadow-md active:translate-y-1">Перевод</button>
    <button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-emerald-700 shadow-lg active:translate-y-1">Доход</button>
</div>

<div id="history" class="space-y-2"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-sm rounded-[45px] p-6 shadow-2xl border border-white overflow-y-auto max-h-[95vh]">
        <h2 id="modalTitle" class="text-xl font-black text-slate-800 mb-6 italic uppercase text-center underline decoration-blue-500 decoration-4 underline-offset-8">ЗАПИСЬ</h2>
        
        <form onsubmit="save(event)" class="space-y-4">
            <input type="hidden" id="txType">
            
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="date" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 font-bold text-xs outline-none">
                <input type="number" id="customRate" step="0.01" placeholder="Курс" class="bg-blue-50 p-3 rounded-2xl border border-blue-100 font-bold text-xs text-blue-600 outline-none">
            </div>

            <input type="text" id="merchant" placeholder="Магазин / Описание" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 font-bold outline-none italic">

            <div id="expenseSection" class="hidden space-y-3">
                <div id="itemsList" class="space-y-4"></div>
                <button type="button" onclick="addItemRow()" class="w-full py-2 border-2 border-dashed border-rose-200 rounded-xl text-rose-400 text-[10px] font-black uppercase">+ Товар / Скидка</button>
            </div>

            <div id="incomeSection" class="hidden bg-emerald-50 p-4 rounded-3xl border border-emerald-100">
                 <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="incEur" placeholder="€ Евро" step="0.01" class="bg-transparent text-xl font-black outline-none border-b border-emerald-200">
                    <input type="number" id="incUah" placeholder="₴ Грн" step="0.01" class="bg-transparent text-xl font-black outline-none border-b border-emerald-200 text-right text-emerald-600">
                 </div>
            </div>

            <div id="transferSection" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <select id="tFrom" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase">
                        <option value="ПРИВАТ">ИЗ ПРИВАТ</option><option value="ВАЛЕРА">ИЗ ВАЛЕРА</option><option value="НАЛИЧНЫЕ EUR">ИЗ НАЛ €</option><option value="Sparkasse">ИЗ Sparkasse</option>
                    </select>
                    <select id="tTo" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase text-blue-600">
                        <option value="НАЛИЧНЫЕ EUR">В НАЛ €</option><option value="КОПИЛКА">В КОПИЛКУ</option><option value="СВИНКА">В СВИНКУ</option><option value="ПРИВАТ">В ПРИВАТ</option>
                    </select>
                </div>
                <div class="bg-blue-50 p-4 rounded-3xl border border-blue-100 grid grid-cols-2 gap-2">
                    <input type="number" id="trEur" placeholder="€ Получено" step="0.01" class="bg-transparent font-black outline-none">
                    <input type="number" id="trUah" placeholder="₴ Отдано" step="0.01" class="bg-transparent font-black outline-none text-right text-blue-600">
                </div>
            </div>

            <div id="accCatGroup" class="grid grid-cols-2 gap-2">
                <select id="acc" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase outline-none">
                    <option value="Sparkasse">Sparkasse</option><option value="ПРИВАТ">ПРИВАТ</option><option value="ВАЛЕРА">ВАЛЕРА</option><option value="НАЛИЧНЫЕ EUR">НАЛ €</option><option value="СВИНКА">СВИНКА</option><option value="КОПИЛКА">КОПИЛКА</option>
                </select>
                <select id="cat" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase outline-none"><option>🍎 Продукты</option><option>🏠 Жилье</option><option>🚗 Транспорт</option><option>💊 Здоровье</option><option>🛍 Остальное</option></select>
            </div>

            <div class="flex gap-2 pt-4">
                <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-black uppercase text-[10px] text-slate-400">Отмена</button>
                <button id="saveBtn" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg shadow-blue-200">Записать</button>
            </div>
        </form>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxXa1SXMXJZ1R1g931CV8P2ILPXuewrpc3CoDcz5TWAWE8kFfX4v4Dj3CRdh-iZxVzu/exec";
let walletData = {};

const UAH_WALLETS = ['ПРИВАТ', 'ВАЛЕРА', 'СВИНКА', 'КОНВЕРТ'];
function isUah(name) { return UAH_WALLETS.some(w => name.toUpperCase().includes(w)); }

function addItemRow() {
    const id = Date.now();
    const html = `
    <div id="item-${id}" class="item-row bg-slate-50 p-3 rounded-2xl border border-slate-200 relative">
        <button type="button" onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white text-rose-500 shadow-sm border border-rose-100 w-5 h-5 rounded-full flex items-center justify-center text-[8px]"><i class="fa-solid fa-x"></i></button>
        <div class="grid grid-cols-2 gap-2 mb-2">
            <input type="text" placeholder="RU / DE" class="nameRU bg-white p-2 rounded-xl text-[10px] font-bold border-none outline-none">
            <input type="number" step="0.01" placeholder="Цена €" class="priceUnit bg-white p-2 rounded-xl text-[10px] font-black outline-none text-right">
        </div>
        <div class="flex justify-between px-2 text-[7px] font-black uppercase text-slate-400">
            <span>Кол-во: <input type="number" value="1" class="qty w-8 bg-transparent outline-none"></span>
            <span class="text-blue-500">₴ <span class="totalUahLabel">0.00</span></span>
        </div>
    </div>`;
    document.getElementById('itemsList').insertAdjacentHTML('beforeend', html);
}

function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55;
    let totalEur = 0;
    const grid = document.getElementById('walletsGrid'); grid.innerHTML = "";
    
    Object.keys(walletData).forEach(k => {
        const val = walletData[k];
        const isU = isUah(k);
        totalEur += isU ? (val / r) : val;
        
        grid.innerHTML += `
            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-slate-400 block">${k}</span>
                <span class="text-slate-800 text-[10px] font-black italic">
                    ${isU ? '₴' : '€'} ${val.toLocaleString('de-DE', {minimumFractionDigits: 2})}
                    ${isU ? `<br><span class="text-[7px] text-blue-500 font-normal">€ ${(val/r).toFixed(2)}</span>` : ''}
                </span>
            </div>`;
    });
    document.getElementById('mainBalance').innerText = '€ ' + totalEur.toLocaleString('de-DE', {minimumFractionDigits: 2});
}

function draw(data) {
    if (!data || !data.rows) return;
    const hist = document.getElementById('history'); hist.innerHTML = "";
    walletData = {};
    data.rows.forEach((r, i) => {
        if (i === 0 || !r[5]) return;
        const acc = String(r[5]).trim();
        if (!walletData[acc]) walletData[acc] = 0;
        walletData[acc] += isUah(acc) ? Number(r[10] || 0) : Number(r[8] || 0);
    });
    data.rows.slice(1, 15).forEach(r => {
        const acc = r[5], isU = isUah(acc), amt = Math.abs(isU ? r[10] : r[8]), isInc = (isU ? r[10] : r[8]) > 0;
        hist.innerHTML += `<div class="bg-white p-4 rounded-[25px] flex justify-between items-center border border-slate-100 mb-2 shadow-sm italic text-[10px] font-bold"><div class="flex items-center gap-2 truncate"><button onclick="deleteRow(${r[r.length-1]})" class="text-slate-200"><i class="fa-solid fa-trash-can"></i></button><div><p class="text-[7px] text-slate-300">${acc}</p><p>${r[4] || r[3] || r[2]}</p></div></div><div class="${isInc?'text-emerald-500':'text-rose-500'}">${isInc?'+':''}${amt.toFixed(2)} ${isU?'₴':'€'}</div></div>`;
    });
    drawBalance();
}

async function save(e) {
    e.preventDefault(); document.getElementById('saveBtn').disabled = true;
    const type = document.getElementById('txType').value, rate = parseFloat(document.getElementById('customRate').value);
    let payload = { action: 'add', date: document.getElementById('date').value, rate: rate, merchant: document.getElementById('merchant').value };

    if(type === 'expense') {
        payload.account = document.getElementById('acc').value;
        payload.category = document.getElementById('cat').value;
        payload.items = Array.from(document.querySelectorAll('.item-row')).map(row => {
            const eur = parseFloat(row.querySelector('.priceUnit').value) * parseFloat(row.querySelector('.qty').value);
            return {
                nameRU: row.querySelector('.nameRU').value,
                qty: row.querySelector('.qty').value, priceUnit: row.querySelector('.priceUnit').value,
                totalEur: -eur, totalUah: -(eur * rate)
            };
        });
    } else if (type === 'transfer') {
        payload.action = 'transfer';
        payload.from = document.getElementById('tFrom').value;
        payload.to = document.getElementById('tTo').value;
        payload.eur = parseFloat(document.getElementById('trEur').value);
        payload.uah = parseFloat(document.getElementById('trUah').value);
    } else {
        payload.account = document.getElementById('acc').value;
        payload.category = "💎 Доход";
        payload.totalEur = parseFloat(document.getElementById('incEur').value) || 0;
        payload.totalUah = parseFloat(document.getElementById('incUah').value) || 0;
    }
    
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
    location.reload();
}

function openModal(type) {
    document.getElementById('txType').value = type; document.getElementById('modal').classList.remove('hidden');
    document.getElementById('expenseSection').classList.toggle('hidden', type !== 'expense');
    document.getElementById('incomeSection').classList.toggle('hidden', type !== 'income');
    document.getElementById('transferSection').classList.toggle('hidden', type !== 'transfer');
    document.getElementById('accCatGroup').classList.toggle('hidden', type === 'transfer');
    document.getElementById('itemsList').innerHTML = ""; if(type === 'expense') addItemRow();
    document.getElementById('customRate').value = document.getElementById('baseRate').value;
    document.getElementById('date').valueAsDate = new Date();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('Удалить?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }
window.onload = () => { const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + Date.now(); document.body.appendChild(s); };
</script>
</body>
</html>
