    else if (/—Е–ї–µ–±|–±—Г–ї–Њ—З–Ї|—З–Є–∞–±–∞—В—В|–±—Г—А–µ–Ї|–±–∞–љ–∞–љ|—П–±–ї–Њ–Ї|–Ї–∞—А—В–Њ—Д|–ї—Г–Ї|–Љ–Њ—А–Ї–Њ–≤|–њ–Њ–Љ–Є–і–Њ—А|–Љ–∞–љ–і–∞—А–Є–љ|–∞—А—В–Є—И–Њ–Ї|–Ј–µ–ї–µ–љ—М|–≥—А–Є–±—Л|—И–∞–Љ–њ–Є–љ—М–Њ–љ|brotr|br√ґtchen|obst|gem√Љse/.test(low)) subCat = "рЯ•Ц –•–ї–µ–± –Є –°–≤–µ–ґ–µ–µ";
    else if (/—И–Њ–Ї–Њ–ї–∞–і|–Ї–Њ–љ—Д–µ—В|–Љ–∞—А–Љ–µ–ї–∞–і|–Ї–µ–Ї—Б|–≤–∞—Д–ї–Є|—И–Њ–≥–µ—В—В–µ–љ|—А–∞—Д—Д–∞—Н–ї–ї–Њ|—В–Њ—Д—Д–Є—Д–Є|–∞—А–∞—Е–Є—Б|—З–Є–њ—Б—Л|–±–∞—В–Њ–љ—З–Є–Ї|–і–µ—Б–µ—А—В|–Ї–Њ—Д–µ|—З–∞–є|–≤–Њ–і–∞|—Б–Њ–Ї|–ї–Є–Љ–Њ–љ–∞–і|—И–Њ—А–ї–µ|–Љ–∞–Ї–Ї–Є–∞—В–Њ|–ї–∞—В—В–µ|eis|–Љ–Њ—А–Њ–ґ–µ–љ–Њ–µ|s√Љ√Яigkeiten|wasser|kaffee/.test(low)) subCat = "рЯНЂ –°–ї–∞–і–Њ—Б—В–Є –Є –Э–∞–њ–Є—В–Ї–Є";
    else if (/–Љ—Л–ї–Њ|–і–µ–Ј–Њ–і–Њ—А–∞–љ—В|–Љ–Њ—О—Й–µ–µ|–њ–∞–Ї–µ—В|—Б–∞–ї—Д–µ—В–Ї|—В—Г–∞–ї–µ—В–љ–∞—П|—Г–љ–Є—В–∞–Ј|–≥–µ–ї—М-–і—Г—И|–Ї–Њ–љ—Ж–µ–љ—В—А–∞—В|–њ–∞—В—З–Є|–њ–Њ–і—Г—И–µ—З–Ї–Є|–њ—А–Њ–Ї–ї–∞–і–Ї–Є|—Б–Ї–Њ–≤–Њ—А–Њ–і–Ї|—Ж–≤–µ—В—Л|—В—О–ї—М–њ–∞–љ|–Ї–∞–Љ–µ–ї–Є|–Ї—А—О—З–Ї–Є|–Ї–Њ—А–Њ–±–Њ—З–Ї–Є|–њ–Њ–і—Б—В–∞–≤–Ї–Є|–±–Њ—В–Є–љ–Ї–Є|—Д–Њ–ї—М–≥–∞|–≥—Г–±–Ї–Є|sp√Љlmittel|seife/.test(low)) subCat = "рЯП† –Ф–Њ–Љ –Є –С—Л—В";
    else if (/–Є–љ—В–µ—А–љ–µ—В|icloud|google one|—Б–≤—П–Ј—М|–њ–Њ–і–њ–Є—Б–Ї/.test(low)) subCat = "рЯМР –°–≤—П–Ј—М –Є IT";
    else if (/–Ї–Њ–Љ–Є—Б—Б–Є|–Ї—А–µ–і–Є—В|–њ–µ—А–µ–≤–Њ–і|—Б—Л–љ—Г|–Љ—Г–ґ—Г|–±–∞–љ–Ї/.test(low)) subCat = "рЯП¶ –§–Є–љ–∞–љ—Б—Л";
    else if (/–±–µ–љ–Ј–Є–љ|–њ–∞—А–Ї–Њ–≤–Ї|–∞–≤—В–Њ|tanken/.test(low)) subCat = "рЯЪЧ –Р–≤—В–Њ";
    else if (/—Б—В—А–Є–ґ–Ї|–≤—А–∞—З|–∞–њ—В–µ–Ї|–Љ–µ–і–Є—Ж–Є–љ|—Б—В—А–∞—Е–Њ–≤–Ї/.test(low)) subCat = "рЯІЊ –£—Б–ї—Г–≥–Є –Є –Ч–і–Њ—А–Њ–≤—М–µ";
    if (subCat) { preview.innerText = "–Ю—В–і–µ–ї: " + subCat; preview.classList.remove('hidden'); }
    else { preview.innerText = "–Ю—В–і–µ–ї: –†–∞–Ј–љ–Њ–µ"; preview.classList.remove('hidden'); }
}

function getMarker(name) {
    if(!name) return "–Ю–°–Ґ–Р–Ы–ђ–Э–Ю–Х"; 
    const n = name.toUpperCase();
    if(n.includes('–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Т–Р–Ы–Х–†–Р')) return '–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Т–Р–Ы–Х–†–Р'; if(n.includes('–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Ю–Ы–ѓ')) return '–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Ю–Ы–ѓ'; if(n.includes('–Я–†–Ш–Т–Р–Ґ')) return '–Я–†–Ш–Т–Р–Ґ'; if(n.includes('–Т–Р–Ы–Х–†–Р')) return '–Т–Р–Ы–Х–†–Р'; if(n.includes('SPARKASSE')) return 'SPARKASSE'; if(n.includes('–Э–Р–Ы–Ш–І–Э–Ђ–Х')) return '–Э–Р–Ы–Ш–І–Э–Ђ–Х'; if(n.includes('–Ъ–Ю–Я–Ш–Ы–Ъ–Р')) return '–Ъ–Ю–Я–Ш–Ы–Ъ–Р'; if(n.includes('–°–Т–Ш–Э–Ъ–Р')) return '–°–Т–Ш–Э–Ъ–Р'; if(n.includes('–Ъ–Ю–Э–Т–Х–†–Ґ')) return '–Ъ–Ю–Э–Т–Х–†–Ґ';
    return n;
}

function isUahMarker(marker) { 
    const m = marker.toUpperCase();
    if (m.includes('–Ъ–Ю–Я–Ш–Ы–Ъ–Р')) return false; 
    return MARKERS.UAH.some(key => m.includes(key)); 
}

function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55;
    let totalOpEur = 0;
    const leftCol = document.getElementById('leftColumn'), rightCol = document.getElementById('rightColumn');
    leftCol.innerHTML = ""; rightCol.innerHTML = "";
    function createWalletHTML(marker) {
        const val = walletData[marker] || { uah: 0, eur: 0 }, isU = isUahMarker(marker);
        const eqEur = marker === '–Ъ–Ю–Я–Ш–Ы–Ъ–Р' ? val.eur : (isU ? (val.uah / r) : val.eur);
        if (MARKERS.OPERATIVE.includes(marker)) totalOpEur += eqEur;
        const isLow = (marker === 'SPARKASSE' || marker === '–Э–Р–Ы–Ш–І–Э–Ђ–Х') && eqEur < 10;
        return `<div class="${isLow ? 'bg-rose-50' : 'bg-white'} p-2 rounded-xl border text-center shadow-sm"><span class="text-slate-400 block text-[6px] uppercase font-black italic tracking-tighter">${marker}</span><span class="${isLow ? 'text-rose-600 animate-pulse' : 'text-slate-800'} text-[9px] font-black italic leading-none">${isU ? 'вВі ' + val.uah.toFixed(0) : 'вВђ ' + val.eur.toFixed(2)}${isU ? `<br><span class="text-[7px] text-blue-700 font-bold block mt-0.5">вВђ ${eqEur.toFixed(1)}</span>` : ''}</span></div>`;
    }
    LEFT_ORDER.forEach(m => leftCol.innerHTML += createWalletHTML(m));
    RIGHT_ORDER.forEach(m => rightCol.innerHTML += createWalletHTML(m));
    document.getElementById('mainBalance').innerText = 'вВђ ' + totalOpEur.toLocaleString('de-DE', {minimumFractionDigits: 2});
    let totalRemaining = 0;
    Object.keys(LIMITS).forEach(cat => { totalRemaining += (LIMITS[cat] - Math.abs(categorySpent[cat] || 0)); });
    const cycle = getCycleDates(), today = new Date(); today.setHours(0,0,0,0);
    const daysLeft = Math.max(1, Math.ceil((cycle.end.getTime() - today.getTime()) / (1000*60*60*24)) + 1);
    document.getElementById('dailyLimitValue').innerText = 'вВђ ' + Math.max(0, totalRemaining / daysLeft).toFixed(2);
    document.getElementById('currentPeriodLabel').innerText = daysLeft + " –і–љ. –Њ—Б—В–∞–ї–Њ—Б—М";
    drawLimits();
}

function drawLimits() {
    const container = document.getElementById('limitsGrid'); container.innerHTML = "";
    Object.keys(LIMITS).forEach(cat => {
        const limit = LIMITS[cat], spent = Math.abs(categorySpent[cat] || 0), perc = Math.min((spent / limit) * 100, 100);
        let color = perc > 80 ? (perc >= 100 ? "bg-rose-500" : "bg-amber-500") : "bg-blue-500";
        container.innerHTML += `<div class="bg-slate-50 p-1.5 rounded-xl text-center relative overflow-hidden shadow-sm"><div class="text-base">${cat.split(' ')[0]}</div><div class="text-[8px] font-black italic">${spent.toFixed(0)}вВђ</div><div class="absolute bottom-0 left-0 h-0.5 w-full bg-slate-200"><div class="h-full ${color}" style="width:${perc}%"></div></div></div>`;
    });
}

function filterHistory() { draw({ rows: allRows }); }

function draw(data) {
    if (!data || !data.rows) return;
    const query = document.getElementById('searchInput') ? document.getElementById('searchInput').value.toUpperCase() : "";
    if (allRows.length === 0) allRows = data.rows; 
    const hist = document.getElementById('history'); hist.innerHTML = ""; 
    walletData = {}; categorySpent = {};
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55;
    let lastDateStr = "";

    allRows.forEach((row, i) => { 
        if (i === 0 || !row[5]) return; 
        const marker = getMarker(row[5]), cat = row[1], valE = parseFloat(row[8]) || 0, valU = parseFloat(row[10]) || 0, date = new Date(row[0]);
        if (!walletData[marker]) walletData[marker] = { uah: 0, eur: 0 };
        walletData[marker].eur += valE; walletData[marker].uah += valU;
        const cycle = getCycleDates();
        Object.keys(LIMITS).forEach(lCat => {
            if (cat && cat.includes(lCat.substring(2)) && date >= cycle.start && date <= cycle.end) {
                categorySpent[lCat] = (categorySpent[lCat] || 0) + (valE !== 0 ? valE : (valU / r));
            }
        });
    });

    allRows.slice(1, 501).forEach(r => { 
        const marker = getMarker(r[5]), merchant = String(r[2] || "").toUpperCase(), nameRU = String(r[4] || "").toUpperCase(), subCat = String(r[13] || "").toUpperCase();
        if (query && !marker.includes(query) && !merchant.includes(query) && !nameRU.includes(query) && !subCat.includes(query)) return;
        const valU = parseFloat(r[10]) || 0, valE = parseFloat(r[8]) || 0, id = r[r.length-1];
        if (valU === 0 && valE === 0) return;
        const rowDate = new Date(r[0]);
        let dateStr = rowDate.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
        if (dateStr !== lastDateStr) {
            hist.innerHTML += `<div class="text-[7px] font-black uppercase text-slate-400 mt-5 mb-1.5 ml-3 tracking-widest italic border-l-2 border-slate-200 pl-2">${dateStr}</div>`;
            lastDateStr = dateStr;
        }
        const isU = isUahMarker(marker), amt = isU ? valU : valE, isInc = amt > 0;
        
        hist.innerHTML += `
        <div class="bg-white p-3.5 rounded-[22px] flex justify-between items-center border border-slate-50 mb-1.5 shadow-sm active:scale-[0.98] transition-transform">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="flex flex-col gap-1">
                    <button onclick="deleteRow(${id})" class="text-rose-100 hover:text-rose-300 text-[10px]"><i class="fa-solid fa-trash-can"></i></button>
                    <button onclick="editRow(${id})" class="text-blue-100 hover:text-blue-300 text-[10px]"><i class="fa-solid fa-pen"></i></button>
                </div>
                <div class="truncate">
                    <p class="text-[11px] font-black uppercase italic text-slate-700 leading-tight truncate">${r[4]||r[2]}</p>
                    <p class="text-[7px] font-bold uppercase italic tracking-tighter mt-1">
                        <span class="text-slate-400/80">${marker}</span> вАҐ <span class="text-blue-400/80">${r[13] || '–†–∞–Ј–љ–Њ–µ'}</span>
                    </p>
                </div>
            </div>
            <div class="${isInc?'text-emerald-500':'text-rose-500'} font-black italic text-[12px] whitespace-nowrap pl-2">
                ${isInc?'+':''}${Math.abs(amt).toLocaleString('de-DE', {minimumFractionDigits: 2})} ${isU?'вВі':'вВђ'}
            </div>
        </div>`; 
    });
    drawBalance();
}

function addItemRow() {
    const id = Date.now();
    const html = `<div id="item-${id}" class="item-row bg-slate-50 p-2 rounded-xl border border-slate-200 relative mb-2 italic">
        <button type="button" onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white text-rose-500 w-4 h-4 rounded-full flex items-center justify-center text-[6px] border shadow-sm"><i class="fa-solid fa-x"></i></button>
        <div class="grid grid-cols-2 gap-2 mb-1"><input type="text" placeholder="–Ґ–Њ–≤–∞—А RU / DE" class="nameRU bg-white p-1.5 rounded-lg text-[10px] font-bold outline-none italic"><input type="number" value="1" class="qty bg-white p-1.5 rounded-lg text-[10px] font-black outline-none text-center italic" oninput="calcRow(this, 'eur')"></div>
        <div class="grid grid-cols-2 gap-2"><input type="number" step="0.01" placeholder="–¶–µ–љ–∞ вВђ" class="priceUnit bg-white p-1.5 rounded-lg text-[10px] font-black outline-none italic" oninput="calcRow(this, 'eur')"><input type="number" step="0.01" placeholder="–Ш—В–Њ–≥–Њ вВі" class="totalUah bg-blue-50 p-1.5 rounded-lg text-[10px] font-black outline-none text-blue-600 italic" oninput="calcRow(this, 'uah')"></div>
    </div>`;
    document.getElementById('itemsList').insertAdjacentHTML('beforeend', html);
}

function calcRow(el, source) {
    const row = el.closest('.item-row'), r = parseFloat(document.getElementById('customRate').value) || 51.55;
    const qty = parseFloat(row.querySelector('.qty').value) || 1, pUnit = row.querySelector('.priceUnit'), tUah = row.querySelector('.totalUah');
    if (source === 'eur') tUah.value = ((parseFloat(pUnit.value) || 0) * qty * r).toFixed(2); 
    else pUnit.value = ((parseFloat(tUah.value) || 0) / r / qty).toFixed(4);
}

function editRow(id) {
    const row = allRows.find(r => r[r.length-1] == id); if (!row) return;
    const cat = String(row[1] || ""); 
    let type = cat.includes('–Ф–Њ—Е–Њ–і') ? 'income' : (cat.includes('–Я–µ—А–µ–≤–Њ–і') ? 'transfer' : 'expense');
    openModal(type); document.getElementById('editRowId').value = id; 
    try { const rawDate = new Date(row[0]); document.getElementById('date').value = rawDate.toISOString().split('T')[0]; } catch(e) {}
    document.getElementById('merchant').value = row[2] || ""; 
    document.getElementById('customRate').value = row[12] || document.getElementById('baseRate').value; 
    document.getElementById('acc').value = row[5].replace(/^([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF])+\s*/, ""); 
    document.getElementById('cat').value = row[1];
    if (type === 'income') { document.getElementById('valEur').value = Math.abs(parseFloat(row[8])) || 0; document.getElementById('valUah').value = Math.abs(parseFloat(row[10])) || 0; }
    else if (type === 'expense') {
        document.getElementById('itemsList').innerHTML = ""; addItemRow(); 
        const f = document.querySelector('.item-row'); f.querySelector('.nameRU').value = row[4] || ""; f.querySelector('.qty').value = parseFloat(row[6]) || 1; 
        f.querySelector('.priceUnit').value = Math.abs(parseFloat(row[7])) || 0; f.querySelector('.totalUah').value = Math.abs(parseFloat(row[10])) || 0;
        document.getElementById('addItemBtn').classList.add('hidden'); 
    } else { document.getElementById('trEur').value = Math.abs(parseFloat(row[8])) || 0; document.getElementById('trUah').value = Math.abs(parseFloat(row[10])) || 0; }
}

function calcSimple(s) { const r = parseFloat(document.getElementById('customRate').value) || 51.55; if(s === 'UAH') document.getElementById('valEur').value = (document.getElementById('valUah').value / r).toFixed(2); else document.getElementById('valUah').value = (document.getElementById('valEur').value * r).toFixed(2); }
function updateAllItems() { document.querySelectorAll('.item-row').forEach(r => calcRow(r.querySelector('.priceUnit'), 'eur')); if(document.getElementById('txType').value === 'transfer') document.getElementById('trEur').oninput(); }

async function save(event) {
    event.preventDefault(); const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "–°–Ю–•–†–Р–Э–ѓ–Ѓ...";
    const t = document.getElementById('txType').value, r = parseFloat(document.getElementById('customRate').value), rowId = document.getElementById('editRowId').value;
    let p = { date: document.getElementById('date').value, rate: r, merchant: document.getElementById('merchant').value, rowId: rowId };
    if(t === 'expense') { 
        p.account = document.getElementById('acc').value; p.category = document.getElementById('cat').value; 
        const rows = document.querySelectorAll('.item-row');
        if (!rowId && rows.length > 1) {
            p.items = Array.from(rows).map(row => ({ nameRU: row.querySelector('.nameRU').value, qty: parseFloat(row.querySelector('.qty').value)||1, priceUnit: parseFloat(row.querySelector('.priceUnit').value)||0, totalEur: (parseFloat(row.querySelector('.qty').value)||1) * (parseFloat(row.querySelector('.priceUnit').value)||0), totalUah: parseFloat(row.querySelector('.totalUah').value)||0 })); 
        } else {
            const first = rows[0]; p.nameRU = first.querySelector('.nameRU').value; p.qty = parseFloat(first.querySelector('.qty').value)||1; p.priceUnit = parseFloat(first.querySelector('.priceUnit').value)||0; p.totalEur = p.qty * p.priceUnit; p.totalUah = parseFloat(first.querySelector('.totalUah').value)||0;
        }
    } else if (t === 'transfer') { p.action = 'transfer'; p.from = document.getElementById('tFrom').value; p.to = document.getElementById('tTo').value; p.eur = parseFloat(document.getElementById('trEur').value)||0; p.uah = parseFloat(document.getElementById('trUah').value)||0; }
    else { p.account = document.getElementById('acc').value; p.category = "рЯТ∞ –Ф–Њ—Е–Њ–і"; p.totalEur = parseFloat(document.getElementById('valEur').value)||0; p.totalUah = parseFloat(document.getElementById('valUah').value)||0; }
    try { await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) }); location.reload(); } catch(err) { alert("–Ю—И–Є–±–Ї–∞!"); btn.disabled = false; btn.innerText = "–Ч–Р–Я–Ш–°–Р–Ґ–ђ"; }
}

function openModal(t) {
    document.getElementById('txType').value = t; document.getElementById('editRowId').value = ""; document.getElementById('modal').classList.remove('hidden'); document.getElementById('addItemBtn').classList.remove('hidden');
    document.getElementById('subCatPreview').classList.add('hidden');
    ['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id => document.getElementById(id).classList.add('hidden'));
    if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); document.getElementById('itemsList').innerHTML = ""; addItemRow(); }
    else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); }
    else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
    document.getElementById('customRate').value = document.getElementById('baseRate').value; document.getElementById('date').valueAsDate = new Date();
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('–£–і–∞–ї–Є—В—М?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }
window.onload = () => { const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + Date.now(); document.body.appendChild(s); };
</script>
