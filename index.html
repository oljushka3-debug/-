<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet Pro v27.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-4 pb-10 italic">

<button onclick="location.reload()" class="fixed top-6 right-6 z-50 bg-white w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center shadow-lg active:scale-90 transition-all">
    <i class="fa-solid fa-rotate text-blue-500"></i>
</button>

<div class="bg-white p-6 rounded-[35px] border border-slate-100 mb-4 shadow-xl text-center">
    <div class="flex justify-between items-center mb-4 text-[10px] font-black opacity-40 uppercase italic">
        <span>Курс: <input type="number" id="baseRate" value="51.55" step="0.01" oninput="drawBalance()" class="w-14 bg-slate-50 rounded px-1 text-blue-600 outline-none font-bold"></span>
        <span>ФЕВРАЛЬ 2026</span>
    </div>
    <h1 id="mainBalance" class="text-4xl font-black italic mb-6 tracking-tighter text-slate-800">€ 0.00</h1>
    <div id="walletsGrid" class="grid grid-cols-2 gap-3 text-[9px] font-bold uppercase italic text-center"></div>
</div>

<div class="flex gap-2 mb-8 font-black italic">
    <button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-rose-700 shadow-lg active:translate-y-1">Расход</button>
    <button onclick="openModal('transfer')" class="flex-1 bg-slate-200 py-5 rounded-3xl text-[10px] text-slate-700 uppercase border-b-4 border-slate-400 shadow-md active:translate-y-1">Перевод</button>
    <button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-emerald-700 shadow-lg active:translate-y-1">Доход</button>
</div>

<div id="history" class="space-y-2"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-sm rounded-[45px] p-6 shadow-2xl border border-white overflow-y-auto max-h-[95vh]">
        <h2 id="modalTitle" class="text-xl font-black text-slate-800 mb-6 italic uppercase text-center underline italic decoration-blue-500 decoration-4 underline-offset-8">ЗАПИСЬ</h2>
        <form onsubmit="save(event)" class="space-y-4">
            <input type="hidden" id="txType">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="date" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 font-bold text-xs outline-none">
                <input type="number" id="customRate" step="0.01" placeholder="Курс" class="bg-blue-50 p-3 rounded-2xl border border-blue-100 font-bold text-xs text-blue-600 outline-none">
            </div>
            <input type="text" id="merchant" placeholder="Описание / Магазин" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 font-bold outline-none">

            <div id="expenseSection" class="hidden space-y-3">
                <div id="itemsList" class="space-y-4"></div>
                <button type="button" onclick="addItemRow()" class="w-full py-2 border-2 border-dashed border-rose-200 rounded-xl text-rose-400 text-[10px] font-black uppercase italic">+ Добавить строку</button>
            </div>

            <div id="incomeSection" class="hidden bg-emerald-50 p-4 rounded-3xl border border-emerald-100 space-y-3 text-center italic">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[7px] text-emerald-600 font-black uppercase block">Гривны (₴)</label><input type="number" id="valUah" step="0.01" oninput="calcSimple('UAH')" class="w-full bg-transparent text-xl font-black outline-none text-emerald-600 text-center"></div>
                    <div><label class="text-[7px] text-slate-400 font-black uppercase block">Евро (€)</label><input type="number" id="valEur" step="0.01" oninput="calcSimple('EUR')" class="w-full bg-transparent text-xl font-black outline-none text-center"></div>
                </div>
            </div>

            <div id="transferSection" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2 font-black italic">
                    <select id="tFrom" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] uppercase">
                        <option value="ПРИВАТ">ПРИВАТ</option><option value="ВАЛЕРА">ВАЛЕРА</option><option value="НАЛИЧНЫЕ">НАЛИЧНЫЕ</option><option value="Sparkasse">Sparkasse</option>
                    </select>
                    <select id="tTo" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] uppercase text-blue-600">
                        <option value="НАЛИЧНЫЕ">НАЛИЧНЫЕ</option><option value="КОПИЛКА">КОПИЛКА</option><option value="СВИНКА">СВИНКА</option><option value="КОНВЕРТ">КОНВЕРТ</option><option value="ПРИВАТ">ПРИВАТ</option>
                    </select>
                </div>
                <div class="bg-blue-50 p-4 rounded-3xl border border-blue-100 grid grid-cols-2 gap-2 text-center font-black italic">
                    <input type="number" id="trEur" placeholder="€ Евро" step="0.01" class="bg-transparent outline-none">
                    <input type="number" id="trUah" placeholder="₴ Гривны" step="0.01" class="bg-transparent outline-none text-blue-600">
                </div>
            </div>

            <div id="accCatGroup" class="grid grid-cols-2 gap-2 italic font-black">
                <select id="acc" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] uppercase outline-none">
                    <option value="Sparkasse">Sparkasse</option><option value="ПРИВАТ">ПРИВАТ</option><option value="ВАЛЕРА">ВАЛЕРА</option><option value="НАЛИЧНЫЕ">НАЛИЧНЫЕ</option><option value="СВИНКА">СВИНКА</option><option value="КОПИЛКА">КОПИЛКА</option><option value="КОНВЕРТ">КОНВЕРТ</option><option value="КРЕДИТКА">КРЕДИТКА</option>
                </select>
                <select id="cat" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] uppercase outline-none italic"><option>🍎 Продукты</option><option>🏠 Жилье</option><option>🚗 Транспорт</option><option>🛍 Остальное</option></select>
            </div>
            <div class="flex gap-2 pt-4"><button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-black uppercase text-[10px] text-slate-400 italic">Отмена</button><button id="saveBtn" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg italic">Записать</button></div>
        </form>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwo7xzVWKxMp6hTVBeNolvoAFozZUnKfSqR4yPRX4fy5Z7BECSOUfa-Dpps-_dDyRNW/exec";

let walletData = {}; 
const MARKERS = {
    // ВСЕ ГРИВНЕВЫЕ КОШЕЛЬКИ С ДВОЙНЫМ ОТОБРАЖЕНИЕМ
    UAH: ['ПРИВАТ', 'ВАЛЕРА', 'КРЕДИТКА', 'ПОГАСИТЬ', 'КОПИЛКА', 'СВИНКА', 'КОНВЕРТ'], 
    OPERATIVE: ['ПРИВАТ', 'ВАЛЕРА', 'SPARKASSE', 'НАЛИЧНЫЕ']
};

function getMarker(name) {
    if(!name) return "ОСТАЛЬНОЕ";
    const n = name.toUpperCase();
    if(n.indexOf('ПОГАСИТЬ') !== -1) return 'ПОГАСИТЬ КРЕДИТ';
    if(n.indexOf('ПРИВАТ') !== -1) return 'ПРИВАТ';
    if(n.indexOf('ВАЛЕРА') !== -1) return 'ВАЛЕРА';
    if(n.indexOf('SPARKASSE') !== -1) return 'SPARKASSE';
    if(n.indexOf('НАЛИЧНЫЕ') !== -1 || n.indexOf('НАЛ') !== -1) return 'НАЛИЧНЫЕ';
    if(n.indexOf('КОПИЛКА') !== -1) return 'КОПИЛКА';
    if(n.indexOf('СВИНКА') !== -1) return 'СВИНКА';
    if(n.indexOf('КОНВЕРТ') !== -1) return 'КОНВЕРТ';
    if(n.indexOf('КРЕДИТКА') !== -1) return 'КРЕДИТКА';
    if(n.indexOf('ПЛАНАХ') !== -1) return 'В ПЛАНАХ';
    return n;
}

function isUahMarker(marker) { return MARKERS.UAH.includes(marker); }

function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55;
    let totalOpEur = 0; const grid = document.getElementById('walletsGrid'); grid.innerHTML = "";
    
    Object.keys(walletData).forEach(marker => {
        const val = walletData[marker], isU = isUahMarker(marker), eq = isU ? (val / r) : val;
        if (MARKERS.OPERATIVE.includes(marker)) totalOpEur += eq;
        
        grid.innerHTML += `
            <div class="bg-white p-3 rounded-2xl border border-slate-50 shadow-sm transition-all active:scale-95">
                <span class="text-slate-400 block text-[8px] uppercase font-black tracking-tighter">${marker}</span>
                <span class="text-slate-800 text-[10px] font-black italic">
                    ${isU ? '₴' : '€'} ${val.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                    ${isU ? `<br><span class="text-[7px] text-blue-500 font-normal">€ ${eq.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>` : ''}
                </span>
            </div>`;
    });
    document.getElementById('mainBalance').innerText = '€ ' + totalOpEur.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function draw(data) {
    if (!data || !data.rows) return;
    const hist = document.getElementById('history'); hist.innerHTML = ""; walletData = {};
    data.rows.forEach((r, i) => { 
        if (i === 0 || !r[5]) return; 
        const marker = getMarker(r[5]);
        if (!walletData[marker]) walletData[marker] = 0;
        const val = isUahMarker(marker) ? Number(r[10] || 0) : Number(r[8] || 0);
        walletData[marker] += val;
    });
    data.rows.slice(1, 20).forEach(r => { 
        const marker = getMarker(r[5]), isU = isUahMarker(marker), amt = Math.abs(isU ? Number(r[10] || 0) : Number(r[8] || 0)), isInc = (isU ? Number(r[10]) : Number(r[8])) > 0;
        hist.innerHTML += `<div class="bg-white p-4 rounded-[25px] flex justify-between items-center border border-slate-100 mb-2 shadow-sm italic text-[10px] font-bold"><div class="flex items-center gap-2 truncate"><button onclick="deleteRow(${r[r.length-1]})" class="text-slate-200"><i class="fa-solid fa-trash-can"></i></button><div><p class="text-[7px] text-slate-300 uppercase">${marker}</p><p class="truncate uppercase">${r[4]||r[3]||r[2]}</p></div></div><div class="${isInc?'text-emerald-500':'text-rose-500'} font-black">${isInc?'+':''}${amt.toLocaleString('de-DE',{minimumFractionDigits:2})} ${isU?'₴':'€'}</div></div>`; 
    });
    drawBalance();
}

// Вспомогательные функции
function addItemRow() {
    const id = Date.now();
    const html = `<div id="item-${id}" class="item-row bg-slate-50 p-3 rounded-2xl border border-slate-200 relative mb-2 italic">
        <button type="button" onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white text-rose-500 shadow-sm border border-rose-100 w-5 h-5 rounded-full flex items-center justify-center text-[8px]"><i class="fa-solid fa-x"></i></button>
        <div class="grid grid-cols-2 gap-2 mb-2"><input type="text" placeholder="RU / DE" class="nameRU bg-white p-2 rounded-xl text-[10px] font-bold outline-none"><input type="number" step="0.01" placeholder="€" class="priceUnit bg-white p-2 rounded-xl text-[10px] font-black outline-none text-right"></div>
        <div class="flex justify-between px-2 text-[7px] font-black uppercase text-slate-400"><span>Кол-во: <input type="number" value="1" class="qty w-8 bg-transparent outline-none font-bold"></span></div>
    </div>`;
    document.getElementById('itemsList').insertAdjacentHTML('beforeend', html);
}

function calcSimple(source) {
    const rate = parseFloat(document.getElementById('customRate').value) || 51.55;
    if(source === 'UAH') document.getElementById('valEur').value = (document.getElementById('valUah').value / rate).toFixed(2);
    else document.getElementById('valUah').value = (document.getElementById('valEur').value * rate).toFixed(2);
}

async function save(e) {
    e.preventDefault(); document.getElementById('saveBtn').disabled = true;
    const type = document.getElementById('txType').value, rate = parseFloat(document.getElementById('customRate').value);
    let p = { date: document.getElementById('date').value, rate: rate, merchant: document.getElementById('merchant').value };
    if(type === 'expense') {
        p.account = document.getElementById('acc').value; p.category = "Расход";
        p.items = Array.from(document.querySelectorAll('.item-row')).map(row => {
            const eur = (parseFloat(row.querySelector('.priceUnit').value)||0) * (parseFloat(row.querySelector('.qty').value)||1);
            return { nameRU: row.querySelector('.nameRU').value, qty: row.querySelector('.qty').value, priceUnit: row.querySelector('.priceUnit').value, totalEur: -eur, totalUah: -(eur * rate) };
        });
    } else if (type === 'transfer') {
        p.action = 'transfer'; p.from = document.getElementById('tFrom').value; p.to = document.getElementById('tTo').value; p.eur = parseFloat(document.getElementById('trEur').value)||0; p.uah = parseFloat(document.getElementById('trUah').value)||0; p.rate = rate;
    } else {
        p.account = document.getElementById('acc').value; p.category = "💎 Доход"; p.totalEur = parseFloat(document.getElementById('valEur').value)||0; p.totalUah = parseFloat(document.getElementById('valUah').value)||0; p.rate = rate;
    }
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) }); location.reload();
}

function openModal(t) {
    document.getElementById('txType').value = t; document.getElementById('modal').classList.remove('hidden');
    ['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id => document.getElementById(id).classList.add('hidden'));
    if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); addItemRow(); }
    else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); }
    else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
    document.getElementById('customRate').value = document.getElementById('baseRate').value; document.getElementById('date').valueAsDate = new Date();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('Удалить?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }
window.onload = () => { const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + Date.now(); document.body.appendChild(s); };
</script>
</body>
</html>
