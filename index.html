<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWallet v105.3</title>
    <style>
        body { font-family: 'Google Sans', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 25px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .rate { font-size: 13px; color: #5f6368; text-align: left; margin-bottom: 15px; font-weight: bold; background: #e8f0fe; padding: 5px 10px; border-radius: 5px; display: inline-block; }
        .total-balance { font-size: 18px; color: #70757a; margin-bottom: 5px; }
        .liquid-balance { font-size: 38px; color: #202124; font-weight: bold; margin-bottom: 20px; }
        .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #9aa0a6; margin-bottom: 4px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; font-size: 14px; transition: opacity 0.2s; }
        .btn-expense { background-color: #db4437; }
        .btn-transfer { background-color: #70757a; }
        .btn-income { background-color: #0f9d58; }
        .btn:hover { opacity: 0.9; }
        .wallet-list { list-style: none; padding: 0; margin: 0; }
        .wallet-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f3f4; }
        .wallet-name { font-size: 15px; color: #3c4043; font-weight: 500; }
        .wallet-val-container { text-align: right; }
        .wallet-val { font-size: 15px; font-weight: bold; color: #202124; }
        .wallet-val-uah { font-size: 11px; color: #80868b; display: block; }
    </style>
</head>
<body>

<div class="card">
    <div id="rate-display" class="rate">КУРС: ...</div>
    
    <div class="header">
        <div class="label">Общий баланс</div>
        <div class="total-balance" id="total-balance">0.00 €</div>
        <div class="label">Ликвидный (Доступно)</div>
        <div class="liquid-balance" id="liquid-balance">0.00 €</div>
    </div>

    <div class="btn-group">
        <a href="https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec">РАСХОД</a>
        <a href="https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec">ПЕРЕВОД</a>
        <a href="https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec">ДОХОД</a>
    </div>

    <div id="wallets" class="wallet-list"></div>
</div>

<script>
    // Вставьте сюда вашу актуальную ссылку из Google Apps Script
    const API_URL = 'https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec';

    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            document.getElementById('rate-display').innerText = `КУРС: ${data.rate}`;
            document.getElementById('liquid-balance').innerText = `${data.liquid} €`;
            
            const totalWallets = ["💳👤 ВАЛЕРА", "💃 ПРИВАТ ОЛЯ", "🏦👤 SPARKASSE ВАЛЕРА", "🏦 SPARKASSE ОЛЯ", "💵 НАЛИЧНЫЕ"];
            let totalSum = 0;
            const container = document.getElementById('wallets');
            container.innerHTML = '';

            data.wallets.forEach(w => {
                const item = document.createElement('div');
                item.className = 'wallet-item';
                
                let uahPart = w.valUah ? `<span class="wallet-val-uah">${w.valUah}</span>` : '';
                
                item.innerHTML = `
                    <span class="wallet-name">${w.name}</span>
                    <div class="wallet-val-container">
                        <span class="wallet-val">${w.val}</span>
                        ${uahPart}
                    </div>
                `;
                container.appendChild(item);

                if (totalWallets.some(name => w.name.includes(name))) {
                    let cleanVal = parseFloat(w.val.replace(/[^-0-9,]/g, '').replace(',', '.'));
                    if (!isNaN(cleanVal)) totalSum += cleanVal;
                }
            });

            document.getElementById('total-balance').innerText = totalSum.toLocaleString('de-DE', {minimumFractionDigits: 2}) + " €";

        } catch (e) {
            console.error(e);
            document.getElementById('liquid-balance').innerText = "Ошибка сети";
        }
    }
    loadData();
</script>
</body>
</html>
