<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet v43.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-2 pb-10 italic font-bold">

<button onclick="location.reload()" class="fixed top-3 right-3 z-50 bg-white/80 w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center shadow-sm">
    <i class="fa-solid fa-rotate text-blue-500 text-[10px]"></i>
</button>

<div class="bg-white p-3 rounded-[25px] border border-slate-100 mb-2 shadow-lg text-center">
    <div class="flex justify-between items-center mb-1 text-[7px] opacity-40 uppercase font-black">
        <span>Курс: <input type="number" id="baseRate" value="51.55" step="0.01" oninput="drawBalance()" class="w-10 bg-slate-50 rounded px-1 text-blue-600 outline-none"></span>
        <span id="currentPeriodLabel">...</span>
    </div>
    <h1 id="mainBalance" class="text-2xl mb-0 tracking-tighter text-slate-800">€ 0.00</h1>
    <div id="dailyLimitValue" class="text-[10px] text-emerald-500 mb-2">€ 0.00</div>
    
    <div id="walletsGrid" class="grid grid-cols-3 gap-1 text-[7px] uppercase font-black italic"></div>
</div>

<div class="bg-white p-2 rounded-[20px] border border-slate-100 mb-2 shadow-sm">
    <div id="limitsGrid" class="grid grid-cols-5 gap-1 text-[8px]"></div>
</div>

<div class="flex gap-1 mb-3 font-black">
    <button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-3 rounded-xl text-[9px] text-white uppercase">Расход</button>
    <button onclick="openModal('transfer')" class="flex-1 bg-slate-100 py-3 rounded-xl text-[9px] text-slate-600 uppercase">Перевод</button>
    <button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-3 rounded-xl text-[9px] text-white uppercase">Доход</button>
</div>

<div class="mb-3">
    <div class="relative w-full">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-[10px]"></i>
        <input type="text" id="searchInput" oninput="filterHistory()" placeholder="НАЙТИ В ИСТОРИИ..." class="w-full bg-white border py-2.5 pl-9 pr-3 rounded-xl text-[9px] outline-none uppercase italic font-bold shadow-sm">
    </div>
</div>

<div id="history" class="space-y-1 text-xs font-black"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-3 z-50 font-bold">
    <div class="bg-white w-full max-w-sm rounded-[30px] p-4 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 id="modalTitle" class="text-sm text-slate-800 mb-3 uppercase text-center font-black">ЗАПИСЬ</h2>
        <form onsubmit="save(event)" class="space-y-2">
            <input type="hidden" id="txType"><input type="hidden" id="editRowId">
            <div class="grid grid-cols-2 gap-2"><input type="date" id="date" class="bg-slate-50 p-2 rounded-lg border text-[9px] font-black"><input type="number" id="customRate" step="0.01" class="bg-blue-50 p-2 rounded-lg border text-[9px] text-blue-600 font-black"></div>
            <input type="text" id="merchant" oninput="liveClassify(this.value)" placeholder="Описание" class="w-full bg-slate-50 p-2 rounded-lg border text-[10px] uppercase italic font-black">
            <div id="expenseSection" class="hidden space-y-2"><div id="itemsList" class="space-y-1"></div><button type="button" onclick="addItemRow()" class="w-full py-1.5 border-2 border-dashed border-rose-100 rounded-lg text-rose-300 text-[7px] uppercase font-black">+ ТОВАР</button></div>
            <div id="incomeSection" class="hidden bg-emerald-50 p-2 rounded-xl grid grid-cols-2 gap-2 text-center font-black"><div><label class="text-[5px] block font-black">₴</label><input type="number" id="valUah" step="0.01" oninput="calcSimple('UAH')" class="w-full bg-transparent text-sm text-emerald-600 text-center font-black"></div><div><label class="text-[5px] block font-black">€</label><input type="number" id="valEur" step="0.01" oninput="calcSimple('EUR')" class="w-full bg-transparent text-sm text-center font-black"></div></div>
            <div id="transferSection" class="hidden space-y-2"><div class="grid grid-cols-2 gap-1 text-[8px] font-black"><select id="tFrom" class="bg-slate-50 p-2 rounded-lg border uppercase italic"><option value="Sparkasse">🏦 Sparkasse</option><option value="Sparkasse ВАЛЕРА">🏦👤 Sparkasse ВАЛЕРА</option><option value="КОПИЛКА">🍯 КОПИЛКА</option><option value="ПРИВАТ ОЛЯ">🇺🇦💃 ПРИВАТ ОЛЯ</option><option value="ВАЛЕРА">👤 ВАЛЕРА</option><option value="НАЛИЧНЫЕ">💵 НАЛИЧНЫЕ</option></select><select id="tTo" class="bg-slate-50 p-2 rounded-lg border uppercase text-blue-600 italic"><option value="НАЛИЧНЫЕ">💵 НАЛИЧНЫЕ</option><option value="Sparkasse">🏦 Sparkasse</option><option value="Sparkasse ВАЛЕРА">🏦👤 Sparkasse ВАЛЕРА</option><option value="КОПИЛКА">🍯 КОПИЛКУ</option><option value="СВИНКА">🐷 СВИНКУ</option><option value="КОНВЕРТ">✉️ КОНВЕРТ</option><option value="ПРИВАТ ОЛЯ">🇺🇦💃 ПРИВАТ ОЛЯ</option></select></div><div class="bg-blue-50 p-2 rounded-xl grid grid-cols-2 gap-2 text-center"><input type="number" id="trEur" placeholder="€" step="0.01" class="bg-transparent text-xs font-black"><input type="number" id="trUah" placeholder="₴" step="0.01" class="bg-transparent text-blue-600 text-xs font-black"></div></div>
            <div id="accCatGroup" class="grid grid-cols-2 gap-1 text-[8px] font-black italic"><select id="acc" class="bg-slate-50 p-2 rounded-lg border uppercase"><option value="Sparkasse">🏦 Sparkasse</option><option value="Sparkasse ВАЛЕРА">🏦👤 Sparkasse ВАЛЕРА</option><option value="ПРИВАТ ОЛЯ">🇺🇦💃 ПРИВАТ ОЛЯ</option><option value="ВАЛЕРА">👤 ВАЛЕРА</option><option value="НАЛИЧНЫЕ">💵 НАЛИЧНЫЕ</option><option value="КРЕДИТКА ОЛЯ">💳🎀 КРЕДИТКА ОЛЯ</option><option value="КРЕДИТКА ВАЛЕРА">💳👤 КРЕДИТКА ВАЛЕРА</option><option value="СВИНКА">🐷 СВИНКА</option><option value="КОПИЛКА">🍯 КОПИЛКА</option></select><select id="cat" class="bg-slate-50 p-2 rounded-lg border uppercase"><option>🍎 Продукты</option><option>🏠 Жилье</option><option>🚬 Табак</option><option>🍷 Алкоголь</option><option>☕️ Отдых</option><option>💊 Здоровье</option><option>🚗 Авто</option><option>🏦 Банк</option><option>💰 Доход</option></select></div>
            <div class="flex gap-2 pt-1"><button type="button" onclick="closeModal()" class="flex-1 bg-slate-50 py-2 rounded-lg uppercase text-[8px] text-slate-300">ОТМЕНА</button><button id="saveBtn" class="flex-[2] bg-blue-600 text-white py-2 rounded-lg uppercase text-[8px] shadow-md font-black italic">ЗАПИСАТЬ</button></div>
        </form>
    </div>
</div>

<script>
// !!! ВСТАВЬ СВОЮ ССЫЛКУ НИЖЕ !!!
const API_URL = "https://script.google.com/macros/s/AKfycbx_ip8r-xJ21b3-sIvqYLTtOTZyN_mnYfGWtIieBDO4Skvi9crR9TWNhjWsbq1PrEq0/exec";

const LIMITS = { "🍎 Продукты": 330, "🏠 Жилье": 50, "🚬 Табак": 30, "🍷 Алкоголь": 30, "☕️ Отдых": 10, "💊 Здоровье": 105, "🚗 Авто": 77, "🏦 Банк": 10, "💰 Доход": 250 };
let walletData = {}, categorySpent = {}, allRows = [];
const ACC_EMOJIS = { "SPARKASSE ВАЛЕРА": "🏦👤", "SPARKASSE": "🏦", "ПРИВАТ ОЛЯ": "🇺🇦💃", "ВАЛЕРА": "👤", "НАЛИЧНЫЕ": "💵", "СВИНКА": "🐷", "КОПИЛКА": "🍯", "КОНВЕРТ": "✉️", "КРЕДИТКА ОЛЯ": "💳🎀", "КРЕДИТКА ВАЛЕРА": "💳👤" };
const LEFT_ORDER = ['SPARKASSE', 'SPARKASSE ВАЛЕРА', 'НАЛИЧНЫЕ'];
const RIGHT_ORDER = ['ПРИВАТ ОЛЯ', 'ВАЛЕРА', 'КОПИЛКА', 'КРЕДИТКА ОЛЯ', 'КРЕДИТКА ВАЛЕРА', 'СВИНКА'];
const MARKERS = { UAH: ['ПРИВАТ', 'ВАЛЕРА', 'КРЕДИТКА', 'СВИНКА', 'КОНВЕРТ'], OPERATIVE: ['ПРИВАТ', 'ВАЛЕРА', 'SPARKASSE', 'НАЛИЧНЫЕ', 'КРЕДИТКА ОЛЯ', 'КРЕДИТКА ВАЛЕРА'] };

function isUahMarker(m) { const n = String(m || "").toUpperCase(); return MARKERS.UAH.some(key => n.includes(key)) && !n.includes('КОПИЛКА'); }
function getMarker(name) {
    if(!name) return "ОСТАЛЬНОЕ"; let n = name.toUpperCase();
    if(n.includes('КОПИЛКА')) return 'КОПИЛКА'; if(n.includes('КРЕДИТКА ОЛЯ')) return 'КРЕДИТКА ОЛЯ'; if(n.includes('КРЕДИТКА ВАЛЕРА')) return 'КРЕДИТКА ВАЛЕРА'; if(n.includes('ПРИВАТ')) return 'ПРИВАТ ОЛЯ'; if(n.includes('ВАЛЕРА') && n.includes('SPARKASSE')) return 'SPARKASSE ВАЛЕРА'; if(n.includes('SPARKASSE')) return 'SPARKASSE'; if(n.includes('ВАЛЕРА')) return 'ВАЛЕРА'; if(n.includes('НАЛИЧНЫЕ')) return 'НАЛИЧНЫЕ'; if(n.includes('СВИНКА')) return 'СВИНКА'; if(n.includes('КОНВЕРТ')) return 'КОНВЕРТ';
    return n;
}

function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55; let totalOpEur = 0;
    const grid = document.getElementById('walletsGrid'); grid.innerHTML = "";
    [...LEFT_ORDER, ...RIGHT_ORDER].forEach(m => {
        const val = walletData[m] || { uah: 0, eur: 0 }, isU = isUahMarker(m);
        const eqEur = m === 'КОПИЛКА' ? val.eur : (isU ? (val.uah / r) : val.eur);
        if (MARKERS.OPERATIVE.includes(m) || m.includes('ПРИВАТ')) totalOpEur += eqEur;
        grid.innerHTML += `<div class="bg-slate-50 p-1 rounded-lg border border-slate-100 flex flex-col items-center">
            <div class="text-[9px] mb-0.5">${ACC_EMOJIS[m]||"💰"}</div>
            <div class="text-[5px] text-slate-400 leading-tight mb-0.5">${m}</div>
            <div class="text-[8px] font-black">${isU ? '₴'+Math.round(val.uah) : '€'+val.eur.toFixed(0)}</div>
            ${isU ? `<div class="text-[5px] text-blue-500">€${Math.round(eqEur)}</div>` : ''}
        </div>`;
    });
    document.getElementById('mainBalance').innerText = '€ ' + totalOpEur.toLocaleString('de-DE', {minimumFractionDigits: 1});
    const lGrid = document.getElementById('limitsGrid'); lGrid.innerHTML = "";
    Object.keys(LIMITS).forEach(cat => {
        const spent = Math.abs(categorySpent[cat] || 0), p = Math.min((spent / LIMITS[cat]) * 100, 100);
        lGrid.innerHTML += `<div class="relative p-0.5 rounded bg-white border border-slate-50 overflow-hidden">
            <div class="text-[9px]">${cat.split(' ')[0]}</div>
            <div class="text-[6px] text-slate-400">${Math.round(spent)}€</div>
            <div class="absolute bottom-0 left-0 h-0.5 w-full bg-slate-50"><div class="h-full ${p>90?'bg-rose-500':'bg-blue-500'}" style="width:${p}%"></div></div>
        </div>`;
    });
}

function draw(data) {
    if (!data || !data.rows) return; allRows = data.rows; walletData = {}; categorySpent = {};
    const query = (document.getElementById('searchInput').value || "").toUpperCase();
    const hist = document.getElementById('history'); hist.innerHTML = ""; let lastDateStr = "";
    allRows.forEach((row, i) => { 
        if (i === 0 || !row[5]) return; 
        const m = getMarker(row[5]), cat = row[1], valE = parseFloat(row[8]) || 0, valU = parseFloat(row[10]) || 0, date = new Date(row[0]);
        if (!walletData[m]) walletData[m] = { uah: 0, eur: 0 }; 
        walletData[m].eur += valE; walletData[m].uah += valU;
        const now = new Date(); let start = new Date(now.getFullYear(), now.getMonth(), 20); if (now.getDate() < 20) start = new Date(now.getFullYear(), now.getMonth() - 1, 20);
        if (date >= start) Object.keys(LIMITS).forEach(lCat => { if (cat && cat.includes(lCat.substring(2))) categorySpent[lCat] = (categorySpent[lCat] || 0) + Math.abs(valE); });
    });
    allRows.slice(1, 100).forEach(r => { 
        const m = getMarker(r[5]), nRU = String(r[4] || "").toUpperCase();
        if (query && !m.includes(query) && !nRU.includes(query)) return;
        const valU = parseFloat(r[10]) || 0, valE = parseFloat(r[8]) || 0, id = r[r.length-1]; if (valU === 0 && valE === 0) return;
        const rd = new Date(r[0]); let ds = rd.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        if (ds !== lastDateStr) { hist.innerHTML += `<div class="text-[6px] text-slate-300 mt-2 mb-1 ml-2 uppercase">${ds}</div>`; lastDateStr = ds; }
        const isU = isUahMarker(m), amt = isU ? valU : valE;
        hist.innerHTML += `<div class="bg-white p-2 rounded-xl flex justify-between items-center border border-slate-50 mb-1">
            <div class="flex items-center gap-2"><div class="flex flex-col"><button onclick="deleteRow(${id})" class="text-rose-200 text-[8px] mb-1">✕</button></div>
            <div class="truncate"><p class="text-[9px] text-slate-700 truncate leading-tight font-black uppercase">${r[4]||r[2]}</p>
            <p class="text-[5px] opacity-30 font-black">${m} • ${r[13] || 'РАЗНОЕ'}</p></div></div>
            <div class="${amt>0?'text-emerald-500':'text-rose-500'} text-[10px] pl-2 font-black italic">${amt>0?'+':''}${Math.abs(amt).toFixed(isU?0:1)}${isU?'₴':'€'}</div>
        </div>`; 
    });
    drawBalance();
}

function addItemRow() {
    const id = Date.now();
    document.getElementById('itemsList').insertAdjacentHTML('beforeend', `<div id="item-${id}" class="item-row bg-slate-50 p-2 rounded-lg relative mb-1 border border-slate-100"><button type="button" onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white text-rose-500 w-3 h-3 rounded-full flex items-center justify-center text-[6px] border shadow-sm font-black italic">X</button><div class="grid grid-cols-2 gap-1 mb-1 font-black"><input type="text" placeholder="Товар" class="nameRU bg-white p-1 rounded text-[8px] font-black italic"><input type="number" value="1" class="qty bg-white p-1 rounded text-[8px] font-black text-center font-black" oninput="calcRow(this, 'eur')"></div><div class="grid grid-cols-2 gap-1 font-black"><input type="number" step="0.01" placeholder="€" class="priceUnit bg-white p-1 rounded text-[8px] font-black" oninput="calcRow(this, 'eur')"><input type="number" step="0.01" placeholder="₴" class="totalUah bg-blue-50 p-1 rounded text-[8px] font-black text-blue-600 font-black" oninput="calcRow(this, 'uah')"></div></div>`);
}

function calcRow(el, s) { const row = el.closest('.item-row'), r = parseFloat(document.getElementById('customRate').value) || 51.55, q = parseFloat(row.querySelector('.qty').value) || 1, pu = row.querySelector('.priceUnit'), tu = row.querySelector('.totalUah'); if (s === 'eur') tu.value = ((parseFloat(pu.value) || 0) * q * r).toFixed(0); else pu.value = ((parseFloat(tu.value) || 0) / r / q).toFixed(2); }
function calcSimple(s) { const r = parseFloat(document.getElementById('customRate').value) || 51.55; if(s === 'UAH') document.getElementById('valEur').value = (document.getElementById('valUah').value / r).toFixed(2); else document.getElementById('valUah').value = (document.getElementById('valEur').value * r).toFixed(0); }

async function save(event) {
    event.preventDefault(); const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "...";
    const t = document.getElementById('txType').value, r = parseFloat(document.getElementById('customRate').value), rowId = document.getElementById('editRowId').value;
    let p = { date: document.getElementById('date').value, rate: r, merchant: document.getElementById('merchant').value, rowId: rowId, action: t };
    if(t === 'expense') { 
        p.account = document.getElementById('acc').value; p.category = document.getElementById('cat').value; const rows = document.querySelectorAll('.item-row');
        if (!rowId && rows.length > 1) p.items = Array.from(rows).map(row => ({ nameRU: row.querySelector('.nameRU').value, qty: parseFloat(row.querySelector('.qty').value)||1, priceUnit: parseFloat(row.querySelector('.priceUnit').value)||0, totalUah: parseFloat(row.querySelector('.totalUah').value)||0 }));
        else { const f = rows[0]; p.nameRU = f.querySelector('.nameRU').value; p.qty = parseFloat(f.querySelector('.qty').value)||1; p.priceUnit = parseFloat(f.querySelector('.priceUnit').value)||0; p.totalUah = parseFloat(f.querySelector('.totalUah').value)||0; }
    } else if (t === 'transfer') { p.from = document.getElementById('tFrom').value; p.to = document.getElementById('tTo').value; p.eur = parseFloat(document.getElementById('trEur').value)||0; p.uah = parseFloat(document.getElementById('trUah').value)||0; }
    else if (t === 'income') { p.account = document.getElementById('acc').value; p.category = "💰 Доход"; p.totalEur = parseFloat(document.getElementById('valEur').value)||0; p.totalUah = parseFloat(document.getElementById('valUah').value)||0; }
    try { await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) }); location.reload(); } catch(err) { alert("Ошибка!"); btn.disabled = false; btn.innerText = "ЗАПИСАТЬ"; }
}

function liveClassify(text) {
    const preview = document.getElementById('subCatPreview'); if (!text || text.length < 2) return;
    let low = text.toLowerCase(); let subCat = "";
    if (/залог|pfand|leergut/.test(low)) subCat = "♻️ Залог (Pfand)"; else if (/вино|пиво|vodka|bier|wein/.test(low)) subCat = "🍷 Алкоголь"; else if (/табак|сигарет|tabak/.test(low)) subCat = "🚬 Табак"; else if (/сливочное масло|butter/.test(low)) subCat = "🧀 Молочка и Сыры"; else if (/масло|уксус|essig|öl/.test(low)) subCat = "🥫 Бакалея и Консервы"; else if (/сыр|йогурт|milch|käсе/.test(low)) subCat = "🧀 Молочка и Сыры"; else if (/мясо|фарш|куриц|hackfleisch|wurst/.test(low)) subCat = "🥩 Мясо и Заморозка"; else if (/хлеб|банан|obst|gemüse/.test(low)) subCat = "🥖 Хлеб и Свежее";
}

function filterHistory() { draw({ rows: allRows }); }
function openModal(t) {
    document.getElementById('txType').value = t; document.getElementById('editRowId').value = ""; document.getElementById('modal').classList.remove('hidden');
    ['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id => document.getElementById(id).classList.add('hidden'));
    if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); document.getElementById('itemsList').innerHTML = ""; addItemRow(); }
    else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); }
    else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
    document.getElementById('customRate').value = document.getElementById('baseRate').value; document.getElementById('date').valueAsDate = new Date();
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('Удалить?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }
window.onload = () => { const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + Date.now(); document.body.appendChild(s); };
</script>
</body>
</html>
