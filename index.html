<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet v39.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-3 pb-10 italic selection:bg-blue-100 font-bold">

<button onclick="location.reload()" class="fixed top-4 right-4 z-50 bg-white/80 backdrop-blur w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center shadow-md active:scale-90 transition-all">
    <i class="fa-solid fa-rotate text-blue-500 text-xs"></i>
</button>

<div class="bg-white p-5 rounded-[30px] border border-slate-100 mb-3 shadow-lg text-center font-black italic">
    <div class="flex justify-between items-center mb-1 text-[8px] opacity-40 uppercase tracking-tighter">
        <span>Курс: <input type="number" id="baseRate" value="51.55" step="0.01" oninput="drawBalance()" class="w-12 bg-slate-50 rounded px-1 text-blue-600 outline-none"></span>
        <span id="currentPeriodLabel">...</span>
    </div>
    <h1 id="mainBalance" class="text-3xl mb-1 tracking-tighter text-slate-800 font-black italic">€ 0.00</h1>
    <div id="dailyLimitValue" class="text-sm text-emerald-500 font-black italic">€ 0.00</div>
    <div id="walletsGrid" class="grid grid-cols-2 gap-2 text-[8px] uppercase mt-3 font-black italic">
        <div id="leftColumn" class="space-y-2"></div>
        <div id="rightColumn" class="space-y-2"></div>
    </div>
</div>

<div class="bg-white p-3 rounded-[25px] border border-slate-100 mb-3 shadow-md font-black italic">
    <div id="limitsGrid" class="grid grid-cols-4 gap-1.5 text-[9px]"></div>
</div>

<div class="flex gap-1.5 mb-4 font-black italic">
    <button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-4 rounded-2xl text-[10px] text-white uppercase border-b-4 border-rose-700 active:translate-y-0.5 transition-all italic">Расход</button>
    <button onclick="openModal('transfer')" class="flex-1 bg-slate-200 py-4 rounded-2xl text-[10px] text-slate-700 uppercase border-b-4 border-slate-400 active:translate-y-0.5 transition-all italic">Перевод</button>
    <button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-4 rounded-2xl text-[10px] text-white uppercase border-b-4 border-emerald-700 active:translate-y-0.5 transition-all italic">Доход</button>
</div>

<div class="flex gap-2 mb-3">
    <div class="relative flex-[3]">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[10px]"></i>
        <input type="text" id="searchInput" oninput="filterHistory()" placeholder="ПОИСК..." class="w-full bg-white border border-slate-100 py-3 pl-10 pr-4 rounded-2xl text-[9px] font-black outline-none shadow-sm uppercase italic">
    </div>
    <button onclick="toggleAnalysis()" class="flex-1 bg-blue-600 text-white rounded-2xl text-[8px] font-black uppercase shadow-md active:scale-95 italic font-black">Анализ</button>
</div>

<div id="analysisPanel" class="hidden bg-slate-900 text-white p-5 rounded-[30px] mb-4 shadow-xl italic font-black">
    <div id="analysisContent" class="space-y-3 font-black"></div>
</div>

<div id="history" class="space-y-2 text-xs font-black italic"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50 font-black italic">
    <div class="bg-white w-full max-w-sm rounded-[40px] p-5 shadow-2xl border border-white overflow-y-auto max-h-[90vh]">
        <h2 id="modalTitle" class="text-lg text-slate-800 mb-4 uppercase text-center font-black italic">ЗАПИСЬ</h2>
        <form onsubmit="save(event)" class="space-y-3 font-black italic">
            <input type="hidden" id="txType"><input type="hidden" id="editRowId">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="date" class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 text-[10px] font-black">
                <input type="number" id="customRate" step="0.01" placeholder="Курс" oninput="updateAllItems()" class="bg-blue-50 p-2.5 rounded-xl border border-blue-100 text-[10px] text-blue-600 font-black italic">
            </div>
            <div class="space-y-1 font-black">
                <input type="text" id="merchant" oninput="liveClassify(this.value)" placeholder="Магазин / Описание" class="w-full bg-slate-50 p-3 rounded-xl border border-slate-100 text-xs uppercase italic font-black">
                <div id="subCatPreview" class="text-[7px] uppercase text-blue-500 ml-2 hidden font-black"></div>
            </div>
            <div id="expenseSection" class="hidden space-y-2"><div id="itemsList" class="space-y-2"></div><button type="button" onclick="addItemRow()" class="w-full py-2 border-2 border-dashed border-rose-200 rounded-xl text-rose-400 text-[8px] uppercase font-black italic">+ Добавить товар</button></div>
            <div id="incomeSection" class="hidden bg-emerald-50 p-3 rounded-2xl border border-emerald-100 space-y-2 text-center">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[6px] text-emerald-600 uppercase block font-black">₴ Гривны</label><input type="number" id="valUah" step="0.01" oninput="calcSimple('UAH')" class="w-full bg-transparent text-lg text-emerald-600 text-center font-black italic"></div>
                    <div><label class="text-[6px] text-slate-400 uppercase block font-black">€ Евро</label><input type="number" id="valEur" step="0.01" oninput="calcSimple('EUR')" class="w-full bg-transparent text-lg text-center font-black italic"></div>
                </div>
            </div>
            <div id="transferSection" class="hidden space-y-3">
                <div class="grid grid-cols-2 gap-2 text-[9px]">
                    <select id="tFrom" class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 uppercase italic font-black">
                        <option value="Sparkasse">🏦 Sparkasse</option><option value="Sparkasse ВАЛЕРА">🏦👤 Sparkasse ВАЛЕРА</option><option value="КОПИЛКА">🍯 КОПИЛКА</option><option value="ПРИВАТ ОЛЯ">🇺🇦💃 ПРИВАТ ОЛЯ</option><option value="ВАЛЕРА">👤 ВАЛЕРА</option><option value="НАЛИЧНЫЕ">💵 НАЛИЧНЫЕ</option>
                    </select>
                    <select id="tTo" class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 uppercase text-blue-600 italic font-black">
                        <option value="НАЛИЧНЫЕ">💵 НАЛИЧНЫЕ</option><option value="Sparkasse">🏦 Sparkasse</option><option value="Sparkasse ВАЛЕРА">🏦👤 Sparkasse ВАЛЕРА</option><option value="КОПИЛКА">🍯 КОПИЛКУ</option><option value="СВИНКА">🐷 СВИНКУ</option><option value="КОНВЕРТ">✉️ КОНВЕРТ</option><option value="ПРИВАТ ОЛЯ">🇺🇦💃 ПРИВАТ ОЛЯ</option>
                    </select>
                </div>
                <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100 grid grid-cols-2 gap-2 text-center font-black">
                    <input type="number" id="trEur" placeholder="€ Евро" step="0.01" oninput="document.getElementById('trUah').value = (this.value * (document.getElementById('customRate').value || 51.55)).toFixed(2)" class="bg-transparent outline-none italic font-black text-sm"><input type="number" id="trUah" placeholder="₴ Гривны" step="0.01" class="bg-transparent outline-none text-blue-600 font-black text-sm italic">
                </div>
            </div>
            <div id="accCatGroup" class="grid grid-cols-2 gap-2 text-[9px] font-black italic">
                <select id="acc" class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 uppercase font-black italic">
                    <option value="Sparkasse">🏦 Sparkasse</option><option value="Sparkasse ВАЛЕРА">🏦👤 Sparkasse ВАЛЕРА</option><option value="ПРИВАТ ОЛЯ">🇺🇦💃 ПРИВАТ ОЛЯ</option><option value="ВАЛЕРА">👤 ВАЛЕРА</option><option value="НАЛИЧНЫЕ">💵 НАЛИЧНЫЕ</option><option value="КРЕДИТКА ОЛЯ">💳🎀 КРЕДИТКА ОЛЯ</option><option value="КРЕДИТКА ВАЛЕРА">💳👤 КРЕДИТКА ВАЛЕРА</option><option value="СВИНКА">🐷 СВИНКА</option><option value="КОПИЛКА">🍯 КОПИЛКА</option>
                </select>
                <select id="cat" class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 uppercase font-black italic">
                    <option>🍎 Продукты / Быт</option><option>🏠 Жилье / Связь</option><option>🚬 Табак</option><option>🍷 Алкоголь</option><option>☕️ Кафе / Отдых</option><option>💊 Здоровье / Красота</option><option>🚗 Транспорт</option><option>🏦 Банк / Комиссии</option><option>💰 Доход</option>
                </select>
            </div>
            <div class="flex gap-2 pt-2 font-black italic"><button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 py-3 rounded-xl uppercase text-[9px] text-slate-400 font-black">Отмена</button><button id="saveBtn" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl uppercase text-[9px] shadow-lg font-black">Записать</button></div>
        </form>
    </div>
</div>

<script>
// !!! ВСТАВЬ ССЫЛКУ НИЖЕ !!!
const API_URL = "https://script.google.com/macros/s/AKfycbx_ip8r-xJ21b3-sIvqYLTtOTZyN_mnYfGWtIieBDO4Skvi9crR9TWNhjWsbq1PrEq0/exec";

const LIMITS = { "🍎 Продукты / Быт": 330, "🏠 Жилье / Связь": 50, "🚬 Табак": 30, "🍷 Алкоголь": 30, "☕️ Кафе / Отдых": 10, "💊 Здоровье / Красота": 105, "🚗 Транспорт": 77, "🏦 Банк / Комиссии": 10, "💰 Доход": 250 };
let walletData = {}, categorySpent = {}, subCatStats = {}, allRows = [];
const ACC_EMOJIS = { "SPARKASSE ВАЛЕРА": "🏦👤", "SPARKASSE": "🏦", "ПРИВАТ ОЛЯ": "🇺🇦💃", "ВАЛЕРА": "👤", "НАЛИЧНЫЕ": "💵", "СВИНКА": "🐷", "КОПИЛКА": "🍯", "КОНВЕРТ": "✉️", "КРЕДИТКА ОЛЯ": "💳🎀", "КРЕДИТКА ВАЛЕРА": "💳👤" };
const MARKERS = { UAH: ['ПРИВАТ', 'ВАЛЕРА', 'КРЕДИТКА', 'СВИНКА', 'КОНВЕРТ'], OPERATIVE: ['ПРИВАТ', 'ВАЛЕРА', 'SPARKASSE', 'НАЛИЧНЫЕ', 'КРЕДИТКА ОЛЯ', 'КРЕДИТКА ВАЛЕРА'] };
const LEFT_ORDER = ['SPARKASSE', 'SPARKASSE ВАЛЕРА', 'НАЛИЧНЫЕ', 'ПРИВАТ ОЛЯ', 'ВАЛЕРА', 'КОПИЛКА'];
const RIGHT_ORDER = ['КРЕДИТКА ОЛЯ', 'КРЕДИТКА ВАЛЕРА', 'КОНВЕРТ', 'СВИНКА'];

function getCycleDates() {
    const now = new Date(); let start = new Date(now.getFullYear(), now.getMonth(), 20), end = new Date(now.getFullYear(), now.getMonth() + 1, 19);
    if (now.getDate() < 20) { start = new Date(now.getFullYear(), now.getMonth() - 1, 20); end = new Date(now.getFullYear(), now.getMonth(), 19); }
    return { start, end };
}
function isUahMarker(m) { const n = String(m || "").toUpperCase(); return MARKERS.UAH.some(key => n.includes(key)) && !n.includes('КОПИЛКА'); }
function getMarker(name) {
    if(!name) return "ОСТАЛЬНОЕ"; let n = name.toUpperCase();
    if(n.includes('КОПИЛКА')) return 'КОПИЛКА'; if(n.includes('КРЕДИТКА ОЛЯ')) return 'КРЕДИТКА ОЛЯ'; if(n.includes('КРЕДИТКА ВАЛЕРА')) return 'КРЕДИТКА ВАЛЕРА'; if(n.includes('ПРИВАТ')) return 'ПРИВАТ ОЛЯ'; if(n.includes('ВАЛЕРА') && n.includes('SPARKASSE')) return 'SPARKASSE ВАЛЕРА'; if(n.includes('SPARKASSE')) return 'SPARKASSE'; if(n.includes('ВАЛЕРА')) return 'ВАЛЕРА'; if(n.includes('НАЛИЧНЫЕ')) return 'НАЛИЧНЫЕ'; if(n.includes('СВИНКА')) return 'СВИНКА'; if(n.includes('КОНВЕРТ')) return 'КОНВЕРТ';
    return n;
}
function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 51.55; let totalOpEur = 0;
    const leftCol = document.getElementById('leftColumn'), rightCol = document.getElementById('rightColumn');
    leftCol.innerHTML = ""; rightCol.innerHTML = "";
    function createWalletHTML(m) {
        const val = walletData[m] || { uah: 0, eur: 0 }, isU = isUahMarker(m);
        const eqEur = m === 'КОПИЛКА' ? val.eur : (isU ? (val.uah / r) : val.eur);
        if (MARKERS.OPERATIVE.includes(m) || m === 'SPARKASSE ВАЛЕРА' || m.includes('ПРИВАТ')) totalOpEur += eqEur;
        return `<div class="bg-white p-2 rounded-xl border text-center shadow-sm font-black italic"><div class="text-[12px] mb-0.5">${ACC_EMOJIS[m]||"💰"}</div><span class="text-slate-400 block text-[6px] uppercase font-black">${m}</span><span class="text-slate-800 text-[9px] font-black leading-none">${isU ? '₴ ' + val.uah.toFixed(0) : '€ ' + val.eur.toFixed(2)}${isU ? `<br><span class="text-[7px] text-blue-700 block mt-0.5 font-black">€ ${eqEur.toFixed(1)}</span>` : ''}</span></div>`;
    }
    LEFT_ORDER.forEach(m => leftCol.innerHTML += createWalletHTML(m));
    RIGHT_ORDER.forEach(m => rightCol.innerHTML += createWalletHTML(m));
    document.getElementById('mainBalance').innerText = '€ ' + totalOpEur.toLocaleString('de-DE', {minimumFractionDigits: 2});
    let tr = 0; Object.keys(LIMITS).forEach(cat => { tr += (LIMITS[cat] - Math.abs(categorySpent[cat] || 0)); });
    const dl = Math.max(1, Math.ceil((getCycleDates().end.getTime() - new Date().setHours(0,0,0,0)) / (1000*60*60*24)) + 1);
    document.getElementById('dailyLimitValue').innerText = '€ ' + Math.max(0, tr / dl).toFixed(2);
    document.getElementById('currentPeriodLabel').innerText = dl + " дн. осталось";
    drawLimits();
}
function drawLimits() {
    const c = document.getElementById('limitsGrid'); c.innerHTML = "";
    Object.keys(LIMITS).forEach(cat => {
        const limit = LIMITS[cat], spent = Math.abs(categorySpent[cat] || 0), p = Math.min((spent / limit) * 100, 100);
        let color = p > 80 ? (p >= 100 ? "bg-rose-500" : "bg-amber-500") : "bg-blue-500";
        c.innerHTML += `<div class="bg-slate-50 p-1.5 rounded-xl text-center relative overflow-hidden shadow-sm font-black italic"><div class="text-[9px] font-black">${cat.split(' ')[0]}</div><div class="text-[8px] font-black">${spent.toFixed(0)}€</div><div class="absolute bottom-0 left-0 h-0.5 w-full bg-slate-200"><div class="h-full ${color}" style="width:${p}%"></div></div></div>`;
    });
}
function filterHistory() { draw({ rows: allRows }); }
function draw(data) {
    if (!data || !data.rows) return; const query = (document.getElementById('searchInput').value || "").toUpperCase();
    allRows = data.rows; hist = document.getElementById('history'); hist.innerHTML = ""; walletData = {}; categorySpent = {}; subCatStats = {}; const r = parseFloat(document.getElementById('baseRate').value) || 51.55; let lastDateStr = "";
    allRows.forEach((row, i) => { 
        if (i === 0 || !row[5]) return; const m = getMarker(row[5]), cat = row[1], sc = row[13] || "Разное", valE = parseFloat(row[8]) || 0, valU = parseFloat(row[10]) || 0, date = new Date(row[0]);
        if (!walletData[m]) walletData[m] = { uah: 0, eur: 0 }; walletData[m].eur += valE; walletData[m].uah += valU;
        const cycle = getCycleDates(); if (date >= cycle.start && date <= cycle.end) { Object.keys(LIMITS).forEach(lCat => { if (cat && cat.includes(lCat.substring(2))) categorySpent[lCat] = (categorySpent[lCat] || 0) + Math.abs(valE); }); if (valE < 0) subCatStats[sc] = (subCatStats[sc] || 0) + Math.abs(valE); }
    });
    allRows.slice(1, 501).forEach(r => { 
        const m = getMarker(r[5]), nRU = String(r[4] || "").toUpperCase(), sc = String(r[13] || "").toUpperCase();
        if (query && !m.includes(query) && !nRU.includes(query) && !sc.includes(query)) return;
        const valU = parseFloat(r[10]) || 0, valE = parseFloat(r[8]) || 0, id = r[r.length-1]; if (valU === 0 && valE === 0) return;
        const rd = new Date(r[0]); let ds = rd.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
        if (ds !== lastDateStr) { hist.innerHTML += `<div class="text-[7px] font-black uppercase text-slate-400 mt-5 mb-1.5 ml-3 font-black">${ds}</div>`; lastDateStr = ds; }
        const isU = isUahMarker(m), amt = isU ? valU : valE, isInc = amt > 0;
        hist.innerHTML += `<div class="bg-white p-3.5 rounded-[22px] flex justify-between items-center border border-slate-50 mb-1.5 shadow-sm font-black italic active:scale-[0.98] transition-all font-black"><div class="flex items-center gap-3 font-black"><div class="flex flex-col gap-1 font-black"><button onclick="deleteRow(${id})" class="text-rose-100 text-[10px]"><i class="fa-solid fa-trash-can"></i></button><button onclick="editRow(${id})" class="text-blue-100 text-[10px]"><i class="fa-solid fa-pen"></i></button></div><div class="truncate font-black"><p class="text-[11px] uppercase italic text-slate-700 truncate font-black font-black italic">${r[4]||r[2]}</p><p class="text-[7px] uppercase mt-1 font-black"><span class="text-slate-400/80 font-black italic">${m}</span> • <span class="text-blue-400/80 font-black italic">${r[13] || 'Разное'}</span></p></div></div><div class="${isInc?'text-emerald-500':'text-rose-500'} font-black text-[12px] whitespace-nowrap pl-2 font-black italic">${isInc?'+':''}${Math.abs(amt).toLocaleString('de-DE', {minimumFractionDigits: 2})} ${isU?'₴':'€'}</div></div>`; 
    });
    drawBalance();
}
function addItemRow() {
    const id = Date.now(); const html = `<div id="item-${id}" class="item-row bg-slate-50 p-2 rounded-xl border border-slate-200 relative mb-2 italic font-black"><button type="button" onclick="this.parentElement.remove()" class="absolute -top-1 -right-1 bg-white text-rose-500 w-4 h-4 rounded-full flex items-center justify-center text-[6px] border shadow-sm font-black italic font-black italic font-black">X</button><div class="grid grid-cols-2 gap-2 mb-1 font-black"><input type="text" placeholder="Товар" class="nameRU bg-white p-1.5 rounded-lg text-[10px] font-black font-black font-black italic"><input type="number" value="1" class="qty bg-white p-1.5 rounded-lg text-[10px] font-black text-center font-black" oninput="calcRow(this, 'eur')"></div><div class="grid grid-cols-2 gap-2 font-black"><input type="number" step="0.01" placeholder="Цена €" class="priceUnit bg-white p-1.5 rounded-lg text-[10px] font-black" oninput="calcRow(this, 'eur')"><input type="number" step="0.01" placeholder="Итого ₴" class="totalUah bg-blue-50 p-1.5 rounded-lg text-[10px] font-black text-blue-600 font-black" oninput="calcRow(this, 'uah')"></div></div>`;
    document.getElementById('itemsList').insertAdjacentHTML('beforeend', html);
}
function calcRow(el, s) { const row = el.closest('.item-row'), r = parseFloat(document.getElementById('customRate').value) || 51.55, q = parseFloat(row.querySelector('.qty').value) || 1, pu = row.querySelector('.priceUnit'), tu = row.querySelector('.totalUah'); if (s === 'eur') tu.value = ((parseFloat(pu.value) || 0) * q * r).toFixed(2); else pu.value = ((parseFloat(tu.value) || 0) / r / q).toFixed(4); }
function calcSimple(s) { const r = parseFloat(document.getElementById('customRate').value) || 51.55; if(s === 'UAH') document.getElementById('valEur').value = (document.getElementById('valUah').value / r).toFixed(2); else document.getElementById('valUah').value = (document.getElementById('valEur').value * r).toFixed(2); }
async function save(event) {
    event.preventDefault(); const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText = "СОХРАНЯЮ..."; const t = document.getElementById('txType').value, r = parseFloat(document.getElementById('customRate').value), rowId = document.getElementById('editRowId').value;
    let p = { date: document.getElementById('date').value, rate: r, merchant: document.getElementById('merchant').value, rowId: rowId, action: t };
    if(t === 'expense') { p.account = document.getElementById('acc').value; p.category = document.getElementById('cat').value; const rows = document.querySelectorAll('.item-row'); if (!rowId && rows.length > 1) { p.items = Array.from(rows).map(row => ({ nameRU: row.querySelector('.nameRU').value, qty: parseFloat(row.querySelector('.qty').value)||1, priceUnit: parseFloat(row.querySelector('.priceUnit').value)||0, totalUah: parseFloat(row.querySelector('.totalUah').value)||0 })); } else { const f = rows[0]; p.nameRU = f.querySelector('.nameRU').value; p.qty = parseFloat(f.querySelector('.qty').value)||1; p.priceUnit = parseFloat(f.querySelector('.priceUnit').value)||0; p.totalUah = parseFloat(f.querySelector('.totalUah').value)||0; } } else if (t === 'transfer') { p.from = document.getElementById('tFrom').value; p.to = document.getElementById('tTo').value; p.eur = parseFloat(document.getElementById('trEur').value)||0; p.uah = parseFloat(document.getElementById('trUah').value)||0; } else if (t === 'income') { p.account = document.getElementById('acc').value; p.category = "💰 Доход"; p.totalEur = parseFloat(document.getElementById('valEur').value)||0; p.totalUah = parseFloat(document.getElementById('valUah').value)||0; }
    try { await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) }); location.reload(); } catch(err) { alert("Ошибка!"); btn.disabled = false; btn.innerText = "ЗАПИСАТЬ"; }
}
function liveClassify(text) {
    const preview = document.getElementById('subCatPreview'); if (!text || text.length < 2) { preview.classList.add('hidden'); return; }
    let low = text.toLowerCase(); let subCat = "";
    if (/залог|pfand|leergut/.test(low)) subCat = "♻️ Залог (Pfand)"; else if (/вино|пиво|vodka|bier|wein/.test(low)) subCat = "🍷 Алкоголь"; else if (/табак|сигарет|tabak/.test(low)) subCat = "🚬 Табак"; else if (/сливочное масло|butter/.test(low)) subCat = "🧀 Молочка и Сыры"; else if (/масло|уксус|essig|öl/.test(low)) subCat = "🥫 Бакалея и Консервы"; else if (/сыр|йогурт|milch|käse/.test(low)) subCat = "🧀 Молочка и Сыры"; else if (/мясо|фарш|куриц|hackfleisch|wurst/.test(low)) subCat = "🥩 Мясо и Заморозка"; else if (/хлеб|банан|obst|gemüse/.test(low)) subCat = "🥖 Хлеб и Свежее";
    if (subCat) { preview.innerText = "Группа: " + subCat; preview.classList.remove('hidden'); } else { preview.innerText = "Группа: Разное"; preview.classList.remove('hidden'); }
}
function openModal(t) {
    document.getElementById('txType').value = t; document.getElementById('editRowId').value = ""; document.getElementById('modal').classList.remove('hidden'); ['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id => document.getElementById(id).classList.add('hidden'));
    if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); document.getElementById('itemsList').innerHTML = ""; addItemRow(); } else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); } else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
    document.getElementById('customRate').value = document.getElementById('baseRate').value; document.getElementById('date').valueAsDate = new Date();
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('Удалить?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }
window.onload = () => { const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + Date.now(); document.body.appendChild(s); };
function toggleAnalysis() { const panel = document.getElementById('analysisPanel'); panel.classList.toggle('hidden'); if (!panel.classList.contains('hidden')) renderAnalysis(); }
function renderAnalysis() { const container = document.getElementById('analysisContent'); container.innerHTML = ""; const sorted = Object.entries(subCatStats).sort((a, b) => b[1] - a[1]); const total = sorted.reduce((sum, el) => sum + el[1], 0); sorted.forEach(([name, val]) => { if (val <= 0) return; const perc = ((val / total) * 100).toFixed(0); container.innerHTML += `<div class="relative pt-1 font-black"><div class="flex justify-between items-center mb-1 text-[9px] uppercase font-black font-black italic"><span>${name}</span><span>€ ${val.toFixed(2)}</span></div><div class="overflow-hidden h-1 rounded bg-slate-800 font-black"><div style="width:${perc}%" class="bg-blue-500 h-full"></div></div></div>`; }); }
</script>
