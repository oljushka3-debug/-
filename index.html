<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWallet v104.1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .rate { color: #888; font-size: 0.9em; text-align: left; margin-bottom: 10px; }
        .balance-main { font-size: 3em; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        .btn-group { display: flex; justify-content: space-between; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
        .btn-red { background-color: #e74c3c; }
        .btn-gray { background-color: #95a5a6; }
        .btn-green { background-color: #2ecc71; }
        button:hover { opacity: 0.8; }
        .wallet-list { margin-top: 30px; text-align: left; }
        .wallet-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="rate-display" class="rate">КУРС: загрузка...</div>
    <div id="balance-display" class="balance-main">0.00</div>
    
    <div class="btn-group">
        <button class="btn-red" onclick="window.open('https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec')">РАСХОД</button>
        <button class="btn-gray" onclick="window.open('https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec')">ПЕРЕВОД</button>
        <button class="btn-green" onclick="window.open('https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec')">ДОХОД</button>
    </div>

    <div id="loader" class="loader"></div>

    <div class="wallet-list" id="wallet-container">
        </div>
</div>

<script>
    // ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШУ ИЗ APPS SCRIPT
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxju5ngg1YSTEHyL2Ms6633h3Rmrm8XWsFqgkU0dha05boKZ3KghcuQPLTFLDKqFu3r/exec";

    async function fetchData() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        try {
            const response = await fetch(scriptUrl + "?action=getData");
            const data = await response.json();
            
            document.getElementById('rate-display').innerText = "КУРС: " + data.rate;
            document.getElementById('balance-display').innerText = data.liquid;
            
            const container = document.getElementById('wallet-container');
            container.innerHTML = "";
            
            data.wallets.forEach(wallet => {
                const item = document.createElement('div');
                item.className = 'wallet-item';
                item.innerHTML = `<span>${wallet.name}</span><strong>${wallet.val}</strong>`;
                container.appendChild(item);
            });
        } catch (error) {
            console.error("Ошибка загрузки данных:", error);
            document.getElementById('balance-display').innerText = "Ошибка";
        } finally {
            loader.style.display = 'none';
        }
    }

    // Загрузка данных при открытии страницы
    fetchData();
</script>

</body>
</html>
