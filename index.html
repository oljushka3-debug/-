<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartWallet Pro v17.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-4 pb-10">

<button onclick="location.reload()" class="fixed top-6 right-6 z-50 bg-white w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center shadow-lg active:scale-90 transition-all">
    <i class="fa-solid fa-rotate text-blue-500"></i>
</button>

<div class="bg-white p-6 rounded-[35px] border border-slate-100 mb-4 shadow-xl">
    <div class="flex justify-between items-center mb-4 text-[10px] font-black opacity-40 uppercase italic">
        <span>Курс НБУ: <input type="number" id="baseRate" value="50.76" step="0.01" oninput="drawBalance()" class="w-12 bg-slate-50 rounded px-1 text-blue-600 outline-none"></span>
        <span id="currentMonth">ФЕВРАЛЬ 2026</span>
    </div>
    <h1 id="mainBalance" class="text-center text-4xl font-black italic mb-6 tracking-tighter text-slate-800">€ 0.00</h1>
    <div id="walletsGrid" class="grid grid-cols-2 gap-3 text-[9px] font-bold uppercase italic text-center">
        </div>
</div>

<div class="flex gap-2 mb-8 font-black italic">
    <button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-rose-700 shadow-lg active:translate-y-1">Расход</button>
    <button onclick="openModal('transfer')" class="flex-1 bg-slate-200 py-5 rounded-3xl text-[10px] text-slate-700 uppercase border-b-4 border-slate-400 shadow-md active:translate-y-1">Перевод</button>
    <button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-5 rounded-3xl text-[10px] text-white uppercase border-b-4 border-emerald-700 shadow-lg active:translate-y-1">Доход</button>
</div>

<div id="history" class="space-y-2"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-sm rounded-[45px] p-6 shadow-2xl border border-white overflow-y-auto max-h-[95vh]">
        <h2 id="modalTitle" class="text-xl font-black text-slate-800 mb-6 italic uppercase text-center underline decoration-blue-500 decoration-4 underline-offset-8 italic">ЗАПИСЬ</h2>
        
        <form onsubmit="save(event)" class="space-y-4">
            <input type="hidden" id="txType">
            <input type="hidden" id="editRowId">
            
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="date" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 font-bold text-xs outline-none">
                <input type="number" id="customRate" step="0.01" placeholder="Курс" class="bg-blue-50 p-3 rounded-2xl border border-blue-100 font-bold text-xs text-blue-600 outline-none">
            </div>

            <input type="text" id="merchant" placeholder="Описание / Магазин" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 font-bold outline-none italic">

            <div id="expenseFields" class="hidden space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="nameRU" placeholder="Товар (RU)" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-xs font-bold">
                    <input type="text" id="nameDE" placeholder="Ware (DE)" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-xs font-bold">
                </div>
                <div class="grid grid-cols-2 gap-2 bg-rose-50 p-4 rounded-3xl border border-rose-100">
                    <div><label class="text-[7px] text-rose-400 font-black uppercase block ml-1">Сумма ₴</label><input type="number" id="amtUahExp" oninput="calcExp('UAH')" class="w-full bg-transparent text-xl font-black outline-none"></div>
                    <div class="text-right border-l border-rose-200 pl-2"><label class="text-[7px] text-rose-400 font-black uppercase block mr-1">Сумма €</label><input type="number" id="amtEurExp" oninput="calcExp('EUR')" class="w-full bg-transparent text-xl font-black outline-none text-right text-slate-800"></div>
                </div>
            </div>

            <div id="currencyCalc" class="hidden space-y-3 bg-blue-50 p-4 rounded-3xl border border-blue-100">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[7px] text-blue-400 font-black uppercase block ml-1 mb-1">Гривны (₴)</label><input type="number" id="valUah" oninput="calcCur('UAH')" placeholder="0.00" class="w-full bg-transparent text-xl font-black outline-none text-blue-600"></div>
                    <div class="text-right border-l border-blue-200 pl-2"><label class="text-[7px] text-blue-400 font-black uppercase block mr-1 mb-1">Евро (€)</label><input type="number" id="valEur" oninput="calcCur('EUR')" placeholder="0.00" class="w-full bg-transparent text-xl font-black outline-none text-right text-slate-800"></div>
                </div>
            </div>

            <div id="transferSelects" class="hidden grid grid-cols-2 gap-2">
                <select id="tFrom" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase"><option value="ПРИВАТ">ИЗ ПРИВАТ</option><option value="ВАЛЕРА">ИЗ ВАЛЕРА</option><option value="Sparkasse">ИЗ Sparkasse</option><option value="НАЛИЧНЫЕ">ИЗ НАЛ</option><option value="КОПИЛКА">ИЗ КОПИЛКИ</option></select>
                <select id="tTo" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase text-blue-600"><option value="НАЛИЧНЫЕ">В НАЛ</option><option value="КОПИЛКА">В КОПИЛКУ</option><option value="ПРИВАТ">В ПРИВАТ</option><option value="СВИНКА">В СВИНКУ</option></select>
            </div>

            <div id="accCatGroup" class="grid grid-cols-2 gap-2">
                <select id="acc" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase outline-none"><option value="Sparkasse">Sparkasse</option><option value="ПРИВАТ">ПРИВАТ</option><option value="ВАЛЕРА">ВАЛЕРА</option><option value="НАЛИЧНЫЕ">НАЛИЧНЫЕ</option><option value="КОПИЛКА">КОПИЛКА</option><option value="СВИНКА">СВИНКА</option><option value="КОНВЕРТ">КОНВЕРТ</option></select>
                <select id="cat" class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-[10px] font-black uppercase outline-none"><option>🍎 Продукты</option><option>🏠 Жилье</option><option>🚗 Транспорт</option><option>💊 Здоровье</option><option>🛍 Остальное</option><option>💎 ДОХОД</option></select>
            </div>

            <div class="flex gap-2 pt-4">
                <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-black uppercase text-[10px] text-slate-400 italic">Отмена</button>
                <button id="saveBtn" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg italic">Записать</button>
            </div>
        </form>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxXa1SXMXJZ1R1g931CV8P2ILPXuewrpc3CoDcz5TWAWE8kFfX4v4Dj3CRdh-iZxVzu/exec";
let walletData = {};
let allRows = [];

// СТРОГИЙ СПИСОК ГРИВНЕВЫХ КОШЕЛЬКОВ
function isUah(name) {
    if(!name) return false;
    const n = name.toLowerCase();
    const uahWallets = ['приват', 'валера', 'копилка', 'свинка', 'конверт', 'uah', 'грн'];
    return uahWallets.some(w => n.includes(w)) || (n.includes('наличные') && n.includes('₴'));
}

function calcCur(source) {
    const rate = parseFloat(document.getElementById('customRate').value) || 50.76;
    if(source === 'UAH') document.getElementById('valEur').value = (document.getElementById('valUah').value / rate).toFixed(2);
    else document.getElementById('valUah').value = (document.getElementById('valEur').value * rate).toFixed(2);
}

function calcExp(source) {
    const rate = parseFloat(document.getElementById('customRate').value) || 50.76;
    if(source === 'UAH') document.getElementById('amtEurExp').value = (document.getElementById('amtUahExp').value / rate).toFixed(2);
    else document.getElementById('amtUahExp').value = (document.getElementById('amtEurExp').value * rate).toFixed(2);
}

function drawBalance() {
    const r = parseFloat(document.getElementById('baseRate').value) || 50.76;
    let totalEur = 0;
    const grid = document.getElementById('walletsGrid'); grid.innerHTML = "";
    Object.keys(walletData).sort((a,b) => isUah(a)-isUah(b)).forEach(k => {
        const val = walletData[k];
        const isU = isUah(k);
        totalEur += isU ? (val / r) : val;
        grid.innerHTML += `<div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 shadow-sm"><span class="text-slate-400 block">${k}</span><span class="text-slate-800 text-[10px] font-black">${isU?'₴':'€'} ${val.toLocaleString('de-DE', {minimumFractionDigits: 2})}</span></div>`;
    });
    document.getElementById('mainBalance').innerText = '€ ' + totalEur.toLocaleString('de-DE', {minimumFractionDigits: 2});
}

function draw(data) {
    if (!data || !data.rows) return;
    allRows = data.rows; 
    const hist = document.getElementById('history'); hist.innerHTML = "";
    walletData = {};
    data.rows.forEach((r, i) => {
        if (i === 0 || !r[5]) return;
        const acc = String(r[5]).trim();
        if (!walletData[acc]) walletData[acc] = 0;
        // ЖЕСТКОЕ ПРАВИЛО КОЛОНКИ К
        walletData[acc] += isUah(acc) ? Number(r[10] || 0) : Number(r[8] || 0);
    });
    data.rows.slice().reverse().slice(0, 20).forEach(r => {
        if (!r[1] || r[1].includes("Категория")) return;
        const acc = r[5], isU = isUah(acc), amt = Math.abs(isU ? r[10] : r[8]), isInc = (isU ? r[10] : r[8]) > 0;
        hist.innerHTML += `<div class="bg-white p-4 rounded-[25px] flex justify-between items-center border border-slate-100 mb-2 shadow-sm"><div class="flex items-center gap-2 overflow-hidden"><button onclick="deleteRow(${r[r.length-1]})" class="text-slate-200"><i class="fa-solid fa-trash-can text-xs"></i></button><button onclick="editRow(${r[r.length-1]})" class="text-slate-200"><i class="fa-solid fa-pen text-xs"></i></button><div class="truncate"><p class="text-[7px] text-slate-400 font-bold uppercase italic">${String(r[0]).split('T')[0].substring(5)} | ${acc}</p><p class="text-slate-800 text-[10px] font-black truncate">${r[4] || r[2] || '...'}</p></div></div><div class="text-right ml-2 font-black text-xs ${isInc?'text-emerald-500':'text-rose-500'} italic">${isInc?'+':''}${amt.toFixed(2)} ${isU?'₴':'€'}</div></div>`;
    });
    drawBalance();
}

async function save(e) {
    e.preventDefault(); document.getElementById('saveBtn').disabled = true;
    const type = document.getElementById('txType').value, rate = parseFloat(document.getElementById('customRate').value);
    const editId = document.getElementById('editRowId').value;
    let payload = { action: editId ? 'edit' : 'add', rowId: editId, date: document.getElementById('date').value, rate: rate, merchant: document.getElementById('merchant').value };

    if(type === 'expense') {
        payload.category = document.getElementById('cat').value; payload.account = document.getElementById('acc').value;
        payload.nameRU = document.getElementById('nameRU').value; payload.nameDE = document.getElementById('nameDE').value;
        const uah = parseFloat(document.getElementById('amtUahExp').value) || 0;
        const eur = parseFloat(document.getElementById('amtEurExp').value) || 0;
        payload.totalTran = -eur; payload.totalCard = -uah;
    } else {
        const uah = parseFloat(document.getElementById('valUah').value) || 0;
        const eur = parseFloat(document.getElementById('valEur').value) || 0;
        payload.category = type === 'income' ? "💎 ДОХОД" : "🔄 ПЕРЕВОД";
        payload.account = type === 'transfer' ? document.getElementById('tFrom').value : document.getElementById('acc').value;
        payload.totalTran = (type === 'income' ? eur : -eur); 
        payload.totalCard = (type === 'income' ? uah : -uah);
    }
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); location.reload();
}

function openModal(type) {
    document.getElementById('editRowId').value = ""; document.getElementById('txType').value = type;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('expenseFields').classList.toggle('hidden', type !== 'expense');
    document.getElementById('currencyCalc').classList.toggle('hidden', type === 'expense');
    document.getElementById('transferSelects').classList.toggle('hidden', type !== 'transfer');
    document.getElementById('accCatGroup').classList.toggle('hidden', type === 'transfer');
    document.getElementById('customRate').value = document.getElementById('baseRate').value;
    document.getElementById('date').valueAsDate = new Date();
}

function editRow(id) {
    const r = allRows.find(x => x[x.length-1] == id); if(!r) return;
    openModal(r[1].includes('ДОХОД') ? 'income' : (r[1].includes('ПЕРЕВОД') ? 'transfer' : 'expense'));
    document.getElementById('editRowId').value = id;
    document.getElementById('date').value = String(r[0]).split('T')[0];
    document.getElementById('merchant').value = r[2];
    document.getElementById('acc').value = r[5];
    document.getElementById('customRate').value = r[9] || 50.76;
    if(r[1].includes('ДОХОД') || r[1].includes('ПЕРЕВОД')) {
        document.getElementById('valEur').value = Math.abs(r[8]); document.getElementById('valUah').value = Math.abs(r[10]);
    } else {
        document.getElementById('amtEurExp').value = Math.abs(r[8]); document.getElementById('amtUahExp').value = Math.abs(r[10]);
        document.getElementById('nameRU').value = r[4]; document.getElementById('nameDE').value = r[3];
    }
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
async function deleteRow(id) { if(confirm('Удалить?')) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({action: 'delete', rowId: id}) }); location.reload(); } }
window.onload = () => { const t = new Date().getTime(); const s = document.createElement('script'); s.src = API_URL + "?callback=draw&_t=" + t; document.body.appendChild(s); };
</script>
</body>
</html>
