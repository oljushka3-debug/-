<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartWallet v55.4</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-2 pb-10 italic font-bold">

<button onclick="location.reload()" class="fixed top-3 right-3 z-50 bg-white/80 w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center shadow-sm">
<i class="fa-solid fa-rotate text-blue-500 text-[10px]"></i>
</button>

<div class="bg-white p-3 rounded-[25px] border border-slate-100 mb-2 shadow-lg text-center">
<div class="flex justify-between items-center mb-1 text-[7px] opacity-40 uppercase font-black">
<span>–Ъ—Г—А—Б: <input type="number" id="baseRate" step="0.0001" oninput="syncRate(this.value)" class="w-14 bg-slate-50 rounded px-1 text-blue-600 outline-none"></span>
<span class="opacity-100 text-blue-500">v55.4</span>
</div>
<h1 id="mainBalance" class="text-2xl mb-1 tracking-tighter text-slate-800">0.00</h1>
<div id="walletsGrid" class="grid grid-cols-3 gap-1 text-[7px] uppercase font-black italic"></div>
</div>

<div class="flex gap-1 mb-2 font-black">
<button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-3 rounded-xl text-[9px] text-white uppercase shadow-sm">–†–∞—Б—Е–Њ–і</button>
<button onclick="openModal('transfer')" class="flex-1 bg-slate-100 py-3 rounded-xl text-[9px] text-slate-600 uppercase shadow-sm">–Я–µ—А–µ–≤–Њ–і</button>
<button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-3 rounded-xl text-[9px] text-white uppercase shadow-sm">–Ф–Њ—Е–Њ–і</button>
</div>

<div id="history" class="space-y-1 text-xs font-black"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-3 z-50 font-bold">
<div class="bg-white w-full max-w-sm rounded-[30px] p-4 shadow-2xl overflow-y-auto max-h-[90vh]">
<h2 id="modalTitle" class="text-sm text-slate-800 mb-3 uppercase text-center font-black">–Ч–Р–Я–Ш–°–ђ</h2>
<form onsubmit="save(event)" class="space-y-2">
<input type="hidden" id="txType">
<div class="grid grid-cols-2 gap-2">
<input type="date" id="date" class="bg-slate-50 p-2 rounded-lg border text-[9px] font-black">
<input type="number" id="customRate" step="0.0001" oninput="syncRate(this.value)" class="bg-blue-50 p-2 rounded-lg border text-[9px] text-blue-600 font-black">
</div>

<input type="text" id="merchant" list="shopList" placeholder="–Ь–∞–≥–∞–Ј–Є–љ / –Ю–њ–Є—Б–∞–љ–Є–µ" class="w-full bg-slate-50 p-2 rounded-lg border text-[10px] uppercase italic font-black">
<datalist id="shopList">
<option value="Lidl"><option value="Kaufland"><option value="EDEKA"><option value="Netto"><option value="Rossman"><option value="dm">
</datalist>

<div id="expenseSection" class="hidden space-y-2">
<div id="itemsList" class="space-y-1"></div>
<button type="button" onclick="addItemRow()" class="w-full py-1 border-2 border-dashed border-rose-200 rounded-lg text-rose-400 text-[8px] uppercase font-black">+ –Ф–Њ–±–∞–≤–Є—В—М —В–Њ–≤–∞—А</button>
</div>

<div id="incomeSection" class="hidden bg-emerald-50 p-2 rounded-xl grid grid-cols-2 gap-2 text-center">
<div><label class="text-[5px] block font-black">вВі</label><input type="number" id="valUah" step="0.01" oninput="calcSimple('UAH')" class="w-full bg-transparent text-sm text-emerald-600 text-center font-black"></div>
<div><label class="text-[5px] block font-black">вВђ</label><input type="number" id="valEur" step="0.01" oninput="calcSimple('EUR')" class="w-full bg-transparent text-sm text-center font-black"></div>
</div>

<div id="transferSection" class="hidden space-y-2">
<div class="grid grid-cols-2 gap-1 text-[8px] font-black">
<select id="tFrom" class="wallet-select bg-slate-50 p-2 rounded-lg border uppercase italic"></select>
<select id="tTo" class="wallet-select bg-slate-50 p-2 rounded-lg border uppercase text-blue-600 italic"></select>
</div>
<div class="bg-blue-50 p-2 rounded-xl grid grid-cols-2 gap-2 text-center">
<input type="number" id="trEur" placeholder="вВђ" step="0.01" class="bg-transparent text-xs font-black">
<input type="number" id="trUah" placeholder="вВі" step="0.01" class="bg-transparent text-blue-600 text-xs font-black">
</div>
</div>

<div id="accCatGroup" class="grid grid-cols-2 gap-1 text-[8px] font-black italic">
<select id="acc" class="wallet-select bg-slate-50 p-2 rounded-lg border uppercase"></select>
<select id="cat" class="bg-slate-50 p-2 rounded-lg border uppercase">
<option>рЯНО –Я—А–Њ–і—Г–Ї—В—Л / –С—Л—В</option><option>рЯТ∞ –Ф–Њ—Е–Њ–і</option><option>рЯНЈ –Р–ї–Ї–Њ–≥–Њ–ї—М</option><option>рЯЪђ –Ґ–∞–±–∞–Ї</option><option>рЯТК –Ч–і–Њ—А–Њ–≤—М–µ</option><option>рЯЪЧ –Р–≤—В–Њ</option><option>рЯЫН –†–∞–Ј–љ–Њ–µ</option>
</select>
</div>

<div class="flex gap-2 pt-1">
<button type="button" onclick="closeModal()" class="flex-1 bg-slate-50 py-2 rounded-lg uppercase text-[8px] text-slate-300">–Ю–Ґ–Ь–Х–Э–Р</button>
<button type="submit" id="saveBtn" class="flex-[2] bg-blue-600 text-white py-2 rounded-lg uppercase text-[8px] shadow-md font-black italic">–Ч–Р–Я–Ш–°–Р–Ґ–ђ</button>
</div>
</form>
</div>
</div>

<script>
// –Ю–С–Э–Ю–Т–Ы–Х–Э–Э–Ђ–Щ –Р–Ф–†–Х–° –°–Ъ–†–Ш–Я–Ґ–Р
const API_URL = "https://script.google.com/macros/s/AKfycbyZBLdrbTdPZg6r4fPwqXxXdo1rJUTG0cWaZuv0SK_71J5pG7JlnyivTWdN9V8Foggl/exec";
const ORDER = ['рЯП¶ SPARKASSE', 'рЯП¶рЯС§ SPARKASSE –Т–Р–Ы–Х–†–Р', 'рЯТµ –Э–Р–Ы–Ш–І–Э–Ђ–Х', 'рЯЗЇрЯЗ¶рЯТГ –Я–†–Ш–Т–Р–Ґ –Ю–Ы–ѓ', 'рЯС§ –Т–Р–Ы–Х–†–Р', 'рЯНѓ –Ъ–Ю–Я–Ш–Ы–Ъ–Р', 'рЯТ≥рЯОА –Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Ю–Ы–ѓ', 'рЯТ≥рЯС§ –Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р –Т–Р–Ы–Х–†–Р', 'рЯРЈ –°–Т–Ш–Э–Ъ–Р', 'вЬЙпЄП –Ъ–Ю–Э–Т–Х–†–Ґ'];
const UAH_WALLETS = ['–Я–†–Ш–Т–Р–Ґ', 'рЯС§ –Т–Р–Ы–Х–†–Р', '–Ъ–†–Х–Ф–Ш–Ґ–Ъ–Р', '–°–Т–Ш–Э–Ъ–Р', '–Ъ–Ю–Э–Т–Х–†–Ґ'];

let walletData = {};

function syncRate(v) { if(!v) return; localStorage.setItem('wallet_base_rate', v); document.getElementById('baseRate').value = v; drawBalance(); }

function getWalletCurrency(m) {
if (m.includes('–Т–Р–Ы–Х–†–Р') && !m.includes('SPARKASSE')) return 'UAH';
return UAH_WALLETS.some(k => m.includes(k)) ? 'UAH' : 'EUR';
}

function getDept(name) {
  const n = name.toLowerCase();
  if (/f√Љllungen|–њ–ї–Њ–Љ–±—Л|itzehoer|union|vitamin|–≤–Є—В–∞–Љ–Є–љ/.test(n)) return "рЯТК –Ю—В–і–µ–ї–Ч–і–Њ—А–Њ–≤—М–µ";
  if (/internet|funk|brif|apple|–њ–Є—Б—М–Љ–Њ|spiel|–Є–≥—А–∞|icloud|scribd|mobile|abonnement|–њ–Њ–і–њ–Є—Б–Ї–∞/.test(n)) return "рЯМР –°–≤—П–Ј—М –Є IT";
  if (/schlaufentrageta|—Б—Г–Љ–Ї–∞|–Ї–ї—Г–±|kopfh√ґrer|–љ–∞—Г—И–љ–Є–Ї–Є|haken|–Ї—А—О—З–Ї–Є/.test(n)) return "рЯЫН –†–∞–Ј–љ–Њ–µ";
  if (/l√ґffel|teller|–ї–Њ–ґ–Ї–Є|—В–∞—А–µ–ї–Ї–Є|trennwand|—А–∞—Б—Б–µ–Ї–∞—В–µ–ї—М|m√Љlls√§cke|–њ–∞–Ї–µ—В—Л –і–ї—П –Љ—Г—Б–Њ—А–∞|tul–њ–µ–љ|—Ж–≤–µ—В—Л|aufbewahrungs/.test(n)) return "рЯП† –Ф–Њ–Љ –Є –С—Л—В";
  if (/schoko|—И–Њ–Ї–Њ–ї–∞–і|riegel|–±–∞—В–Њ–љ—З–Є–Ї|savoiardi|–њ–µ—З–µ–љ—М–µ|pflaumenm|–Љ—Г—Б—Б|edelzartbitter|–±–µ–ї—Л–є|–Ї–µ–Ї—Б|gugel|fr√Љchte|—Д—А—Г–Ї—В—Л|kokos|–њ–Є—А–Њ–ґ|–Ї–Њ–љ—Д–µ—В|—Б–ї–∞–і–Њ—Б—В–Є/.test(n)) return "рЯНЂ –°–ї–∞–і–Њ—Б—В–Є";
  if (/mandel|–Љ–Є–љ–і–∞–ї—М|erdnue|–∞—А–∞—Е–Є—Б|kraut|–Ї–∞–њ—Г—Б—В–∞|cornichon|–Ї–Њ—А–љ–Є—И–Њ–љ|kartoffelsalat|—Б–∞–ї–∞—В|linsen|—З–µ—З–µ–≤–Є—Ж–∞|sell|—Б–µ–ї—М–і–µ—А–µ–є|schaeltomate|—В–Њ–Љ–∞—В|saft|—Б–Њ–Ї|senf|–≥–Њ—А—З–Є—Ж–∞|sauce|—Б–Њ—Г—Б|zitron|–ї–Є–Љ–Њ–љ|wuerze|–њ—А–Є–њ—А–∞–≤–∞|zwiebel|–ї—Г–Ї|zucker|—Б–∞—Е–∞—А|paprika|–њ–∞–њ—А–Є–Ї–∞|kurkuma|–Ї—Г—А–Ї—Г–Љ–∞|gurken|–Њ–≥—Г—А—Ж—Л|prodomo|–Ї–Њ—Д–µ/.test(n)) return "рЯ•Ђ –С–∞–Ї–∞–ї–µ—П –Є –Ъ–Њ–љ—Б–µ—А–≤—Л";
  if (/pizza|pmzza|–њ–Є—Ж—Ж–∞|–њ–Љ—Ж—Ж–∞|piccolinis|pfannengemuese|frikadellen|—Д—А–Є–Ї–∞–і–µ–ї–Є|asia|iglo|filet|—Д–Є–ї–µ|italien/.test(n)) return "рЯІК –Ч–∞–Љ–Њ—А–Њ–Ј–Ї–∞";
  if (/butter|–Љ–∞—Б–ї–Њ|edamer|—Б—Л—А|joghurt|–є–Њ–≥—Г—А—В|skyr|—Б–Ї–Є—А|quark|—В–≤–Њ—А–Њ–≥|brie|–±—А–Є|fraiche|—Д—А–µ—И|eier|—П–є—Ж–∞|philadelphia|√ґl|milch|–Љ–Њ–ї–Њ–Ї–Њ|chedd|—З–µ–і–і–µ—А|gouda|–≥–∞—Г–і–∞/.test(n)) return "рЯІА –Ь–Њ–ї–Њ—З–Ї–∞ –Є –°—Л—А—Л";
  if (/pfand|–Ј–∞–ї–Њ–≥|leergut|—В–∞—А–∞|–і–µ–њ–Њ–Ј–Є—В/.test(n)) return "вЩїпЄП –Ч–∞–ї–Њ–≥ (Pfand)";
  if (/toilettenpapier|–±—Г–Љ–∞–≥–∞|tat√Љ|—Б–∞–ї—Д–µ—В–Ї–Є|elvital|maske|deo|mint|dontodent|watte|–і–Є—Б–Ї–Є|urea|fussba|–њ–∞–ї–Њ—З–Ї–Є|handtuch|–њ–Њ–ї–Њ—В–µ–љ—Ж–µ|–Ї—А–∞—Б–Ї–∞/.test(n)) return "рЯЫА –У–Є–≥–Є–µ–љ–∞";
  if (/brot|—Е–ї–µ–±|kruste|–±—Г–ї–Њ—З–Ї–Є|weizen|roggen|–Ї–∞—А—В–Њ—Д–µ–ї—М|kartoffel|bauern/.test(n)) return "рЯ•Ц –•–ї–µ–±–Њ–±—Г–ї–Њ—З–љ—Л–µ";
  if (/vorteil|rabatt|—Б–Ї–Є–і–Ї–∞|card|r√Љckgeld|–≤–Њ–Ј–≤—А–∞—В/.test(n)) return "рЯПЈпЄП –°–Ї–Є–і–Ї–∞";
  if (/bensin|–±–µ–љ–Ј–Є–љ|lastschrift|—Б–њ–Є—Б–∞–љ–Є–µ|parken|–њ–∞—А–Ї–Њ–≤–Ї–∞|parkzeit/.test(n)) return "рЯЪЧ –Р–≤—В–Њ";
  if (/wein|–≤–Є–љ–Њ|bier|–њ–Є–≤–Њ|spritz|export|wodka|–≤–Њ–і–Ї–∞|zweigelt|grigio|wei√Яherbst|thurgau/.test(n)) return "рЯНЈ –Р–ї–Ї–Њ–≥–Њ–ї—М";
  if (/param|blue|tabak|—В–∞–±–∞–Ї/.test(n)) return "рЯЪђ –Ґ–∞–±–∞–Ї";
  if (/ministicks|—Б—В–µ–є–Ї|nacken|—И–µ—П|hackfleisch|—Д–∞—А—И/.test(n)) return "рЯ•© –Ь—П—Б–Њ, –§–∞—А—И";
  if (/erdbeeren|–Ї–ї—Г–±–љ–Є–Ї–∞|bananen|–±–∞–љ–∞–љ—Л|lauch|–ї—Г–Ї|dill|—Г–Ї—А–Њ–њ|gurken|–Њ–≥—Г—А—Ж—Л|√§pfel|—П–±–ї–Њ–Ї–Є|kohl|–Ї–∞–њ—Г—Б—В–∞/.test(n)) return "рЯ•Ч –Ю–≤–Њ—Й–Є / –§—А—Г–Ї—В—Л";
  if (/bacon|–±–µ–Ї–Њ–љ|frikadellen|–Ї–Њ–ї–±–∞—Б|salami|—Б–∞–ї—П–Љ–Є|speck|—И–њ–Є–Ї|leberwurst|lyoner/.test(n)) return "рЯМ≠ –Ъ–Њ–ї–±–∞—Б—Л";
  if (/nudeln|–Љ–∞–Ї–∞—А–Њ–љ—Л/.test(n)) return "рЯНЬ –Ь–∞–Ї–∞—А–Њ–љ—Л";
  if (/mineralwasser|–≤–Њ–і–∞|trinken|–љ–∞–њ–Є—В–Њ–Ї|saft/.test(n)) return "рЯІГ –Э–∞–њ–Є—В–Ї–Є";
  return "";
}

function drawBalance() {
const r = parseFloat(document.getElementById('baseRate').value)||51.2828;
let total = 0;
const grid = document.getElementById('walletsGrid');
grid.innerHTML = "";
ORDER.forEach(m => {
const v = walletData[m]||{uah:0,eur:0};
const curr = getWalletCurrency(m);
const eq = curr === 'EUR' ? v.eur : v.uah/r;
total += eq;
grid.innerHTML += `<div class="bg-slate-50 p-1 rounded-lg border flex flex-col items-center">
<div class="text-[5.5px] text-slate-400 text-center leading-tight h-[14px] flex items-center">${m}</div>
<div class="text-[8px] font-black ${m==='рЯП¶ SPARKASSE' && v.eur < 10 ? 'text-rose-500' : ''}">${curr==='UAH'?'вВі'+Math.round(v.uah):'вВђ'+v.eur.toFixed(2)}</div></div>`;
});
document.getElementById('mainBalance').innerText = 'вВђ ' + total.toLocaleString('de-DE',{minimumFractionDigits:2});
}

function draw(data) {
if(!data||!data.rows) return;¬†
walletData = {};¬†
const hist = document.getElementById('history'); hist.innerHTML = "";
data.rows.forEach((row, i) => {
if(i === 0) return;
let cellF = String(row[5] || "").trim();
if(!ORDER.includes(cellF)) return;
if(!walletData[cellF]) walletData[cellF]={uah:0,eur:0};
walletData[cellF].eur += parseFloat(String(row[8]||"0").replace(',','.'))||0;
walletData[cellF].uah += parseFloat(String(row[10]||"0").replace(',','.'))||0;
});
data.rows.slice(1,15).forEach(r => {
let cellF = String(r[5]||"").trim();
const curr = getWalletCurrency(cellF);
const val = curr === 'UAH' ? parseFloat(r[10])||0 : parseFloat(r[8])||0;
if(val === 0) return;
hist.innerHTML += `<div class="bg-white p-2 rounded-xl flex justify-between items-center border border-slate-50 mb-1 shadow-sm">
<div><p class="text-[9px] text-slate-700 font-black uppercase">${r[4]||r[2]}</p><p class="text-[5px] opacity-30 font-black">${cellF}</p></div>
<div class="${val>0?'text-emerald-500':'text-rose-500'} text-[10px] font-black italic">${val>0?'+':''}${Math.abs(val).toFixed(curr==='UAH'?0:2)}${curr==='UAH'?'вВі':'вВђ'}</div></div>`;
});
drawBalance();
}

async function save(event) {
if (event) event.preventDefault();
const btn = document.getElementById('saveBtn');
if (btn.disabled) return;

const t = document.getElementById('txType').value;
const r = parseFloat(document.getElementById('customRate').value);
const commonData = {
date: document.getElementById('date').value,
rate: r,
merchant: document.getElementById('merchant').value,
action: t
};

btn.disabled = true; btn.innerText = "...";

if (t === 'expense') {
const rows = document.querySelectorAll('.item-row');
for (let row of rows) {
let p = {...commonData};
p.account = document.getElementById('acc').value;
p.category = document.getElementById('cat').value;
p.nameRU = row.querySelector('.nameRU').value;
p.qty = parseFloat(row.querySelector('.qty').value) || 1;
p.priceUnit = parseFloat(row.querySelector('.priceUnit').value) || 0;
p.totalUah = parseFloat(row.querySelector('.totalUah').value) || 0;
p.dept = getDept(p.nameRU); // –Р–≤—В–Њ-–Њ—В–і–µ–ї
if (p.priceUnit || p.totalUah) {
await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
}
}
} else if (t === 'transfer') {
let p = {...commonData};
p.from = document.getElementById('tFrom').value;
p.to = document.getElementById('tTo').value;
p.eur = parseFloat(document.getElementById('trEur').value) || 0;
p.uah = parseFloat(document.getElementById('trUah').value) || 0;
if (p.eur || p.uah) await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
} else if (t === 'income') {
let p = {...commonData};
p.account = document.getElementById('acc').value;
p.category = "рЯТ∞ –Ф–Њ—Е–Њ–і";
p.priceUnit = parseFloat(document.getElementById('valEur').value) || 0;
p.totalUah = parseFloat(document.getElementById('valUah').value) || 0;
if (p.priceUnit || p.totalUah) await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
}

setTimeout(() => { location.reload(); }, 600);
}

function openModal(t){
document.getElementById('txType').value=t;
document.getElementById('modal').classList.remove('hidden');
document.getElementById('customRate').value = localStorage.getItem('wallet_base_rate') || "51.2828";
['expenseSection','transferSection','incomeSection','accCatGroup'].forEach(id=>document.getElementById(id).classList.add('hidden'));
const selects=document.querySelectorAll('.wallet-select');
selects.forEach(s=>{ s.innerHTML=""; ORDER.forEach(m=>{ s.innerHTML+=`<option value="${m}">${m}</option>`; }); });
if(t==='expense'){ document.getElementById('expenseSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); document.getElementById('itemsList').innerHTML=""; addItemRow(); }
else if(t==='income'){ document.getElementById('incomeSection').classList.remove('hidden'); document.getElementById('accCatGroup').classList.remove('hidden'); }
else if(t==='transfer'){ document.getElementById('transferSection').classList.remove('hidden'); }
document.getElementById('date').valueAsDate=new Date();
}

function addItemRow() {
document.getElementById('itemsList').insertAdjacentHTML('beforeend', `<div class="item-row bg-slate-50 p-2 rounded-lg border mb-1 relative">
<div class="grid grid-cols-2 gap-1 mb-1"><input type="text" placeholder="–Ґ–Њ–≤–∞—А" class="nameRU bg-white p-1 rounded text-[8px] font-black italic"><input type="number" value="1" class="qty bg-white p-1 rounded text-[8px] text-center font-black" oninput="calcRow(this,'eur')"></div>
<div class="grid grid-cols-2 gap-1"><input type="number" step="0.01" placeholder="вВђ" class="priceUnit bg-white p-1 rounded text-[8px] font-black" oninput="calcRow(this,'eur')"><input type="number" step="0.01" placeholder="вВі" class="totalUah bg-blue-50 p-1 rounded text-[8px] text-blue-600 font-black" oninput="calcRow(this,'uah')"></div></div>`);
}

function calcRow(el,s){
const row=el.closest('.item-row'), r=parseFloat(document.getElementById('customRate').value), q=parseFloat(row.querySelector('.qty').value)||1, pu=row.querySelector('.priceUnit'), tu=row.querySelector('.totalUah');
if(s==='eur') tu.value=((parseFloat(pu.value)||0)*q*r).toFixed(0); else pu.value=((parseFloat(tu.value)||0)/r/q).toFixed(2);
}

function calcSimple(s){
const r=parseFloat(document.getElementById('customRate').value);
if(s==='UAH') document.getElementById('valEur').value=(document.getElementById('valUah').value/r).toFixed(2);
else document.getElementById('valUah').value=(document.getElementById('valEur').value*r).toFixed(0);
}

function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
