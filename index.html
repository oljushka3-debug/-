<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartWallet v55.9</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  input, select { -webkit-appearance: none; border-radius: 8px; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 p-2 pb-10 italic font-bold">

<button onclick="location.reload()" class="fixed top-3 right-3 z-50 bg-white/80 w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center shadow-sm">
<i class="fa-solid fa-rotate text-blue-500 text-[10px]"></i>
</button>

<div class="bg-white p-3 rounded-[25px] border border-slate-100 mb-2 shadow-lg text-center">
<div class="flex justify-between items-center mb-1 text-[7px] opacity-40 uppercase font-black">
<span>Курс: <input type="number" id="baseRate" step="0.1" oninput="syncRate(this.value)" class="w-14 bg-slate-50 rounded px-1 text-blue-600 outline-none"></span>
<span class="opacity-100 text-blue-500">v55.9</span>
</div>
<h1 id="mainBalance" class="text-2xl mb-1 tracking-tighter text-slate-800">0.00</h1>
<div id="walletsGrid" class="grid grid-cols-3 gap-1 text-[7px] uppercase font-black italic"></div>
</div>

<div class="flex gap-1 mb-2 font-black">
<button onclick="openModal('expense')" class="flex-1 bg-rose-500 py-3 rounded-xl text-[9px] text-white uppercase shadow-sm">Расход</button>
<button onclick="openModal('transfer')" class="flex-1 bg-slate-100 py-3 rounded-xl text-[9px] text-slate-600 uppercase shadow-sm">Перевод</button>
<button onclick="openModal('income')" class="flex-1 bg-emerald-500 py-3 rounded-xl text-[9px] text-white uppercase shadow-sm">Доход</button>
</div>

<div id="history" class="space-y-1 text-xs font-black"></div>

<div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-3 z-50 font-bold">
<div class="bg-white w-full max-w-sm rounded-[30px] p-4 shadow-2xl overflow-y-auto max-h-[90vh]">
<h2 id="modalTitle" class="text-sm text-slate-800 mb-3 uppercase text-center font-black">НОВАЯ ЗАПИСЬ</h2>
<form onsubmit="save(event)" class="space-y-2">
<input type="hidden" id="txType">
<div class="grid grid-cols-2 gap-2">
<input type="date" id="date" class="bg-slate-50 p-2 rounded-lg border text-[9px] font-black">
<input type="number" id="customRate" step="0.1" class="bg-blue-50 p-2 rounded-lg border text-[9px] text-blue-600 font-black">
</div>

<input type="text" id="merchant" list="shopList" placeholder="МАГАЗИН" class="w-full bg-slate-50 p-2 rounded-lg border text-[10px] uppercase italic font-black">
<datalist id="shopList">
<option value="LIDL"><option value="KAUFLAND"><option value="EDEKA"><option value="NETTO"><option value="ROSSMANN"><option value="DM">
</datalist>

<div id="itemsList" class="space-y-1"></div>
<button type="button" onclick="addItemRow()" class="w-full py-1 border-2 border-dashed border-rose-200 rounded-lg text-rose-400 text-[8px] uppercase font-black">+ Добавить товар</button>

<div class="grid grid-cols-2 gap-1 text-[8px] font-black italic mt-2">
<select id="acc" class="wallet-select bg-slate-50 p-2 rounded-lg border uppercase"></select>
<select id="cat" class="bg-slate-50 p-2 rounded-lg border uppercase">
<option>🍎 Продукты / Быт</option><option>🍷 Алкоголь</option><option>🚬 Табак</option><option>💊 Здоровье</option><option>🚗 Авто</option><option>🛍 Остальное</option><option>💰 Доход</option>
</select>
</div>

<div class="flex gap-2 pt-2">
<button type="button" onclick="closeModal()" class="flex-1 bg-slate-50 py-2 rounded-lg uppercase text-[8px] text-slate-300">ОТМЕНА</button>
<button type="submit" id="saveBtn" class="flex-[2] bg-blue-600 text-white py-2 rounded-lg uppercase text-[8px] shadow-md font-black italic">ЗАПИСАТЬ</button>
</div>
</form>
</div>
</div>

<script>
// ВАША РАБОЧАЯ ССЫЛКА СКРИПТА
const API_URL = "https://script.google.com/macros/s/AKfycby7VcepAyo3binIsky51KQeCV8mTcNUXlHv79dkinMomzZmb8F1gkO6ldolBhDI8z3U/exec";
const ORDER = ['🏦 SPARKASSE', '🏦👤 SPARKASSE ВАЛЕРА', '💵 НАЛИЧНЫЕ', '🇺🇦💃 ПРИВАТ ОЛЯ', '👤 ВАЛЕРА', '🍯 КОПИЛКА', '💳🎀 КРЕДИТКА ОЛЯ', '💳👤 КРЕДИТКА ВАЛЕРА', '🐷 СВИНКА', '✉️ КОНВЕРТ'];

let walletData = {};

function syncRate(v) { if(!v) return; localStorage.setItem('wallet_base_rate', v); document.getElementById('customRate').value = v; drawBalance(); }

function drawBalance() {
  const r = parseFloat(document.getElementById('baseRate').value) || 50.75;
  let totalEur = 0;
  const grid = document.getElementById('walletsGrid');
  grid.innerHTML = "";
  
  ORDER.forEach(m => {
    const v = walletData[m] || {uah: 0, eur: 0};
    const isUah = (m.includes('ПРИВАТ') || m.includes('ВАЛЕРА') || m.includes('КРЕДИТКА') || m.includes('СВИНКА') || m.includes('КОНВЕРТ')) && !m.includes('SPARKASSE');
    
    const eq = isUah ? v.uah / r : v.eur;
    totalEur += eq;
    
    grid.innerHTML += `<div class="bg-slate-50 p-1 rounded-lg border flex flex-col items-center shadow-sm">
      <div class="text-[5px] text-slate-400 text-center leading-tight h-[12px] overflow-hidden">${m}</div>
      <div class="text-[8px] font-black ${m === '🏦 SPARKASSE' && v.eur < 10 ? 'text-rose-500' : 'text-slate-700'}">
        ${isUah ? '₴' + Math.round(v.uah) : '€' + v.eur.toFixed(2)}
      </div></div>`;
  });
  document.getElementById('mainBalance').innerText = '€ ' + totalEur.toLocaleString('de-DE', {minimumFractionDigits: 2});
}

function draw(data) {
  if(!data || !data.rows) return;
  walletData = {};
  const hist = document.getElementById('history'); hist.innerHTML = "";
  
  data.rows.forEach((row, i) => {
    if(i === 0) return;
    let acc = String(row[5] || "").trim();
    if(!ORDER.includes(acc)) return;
    if(!walletData[acc]) walletData[acc] = {uah: 0, eur: 0};
    walletData[acc].eur += parseFloat(String(row[8]||"0").replace(',','.')) || 0;
    walletData[acc].uah += parseFloat(String(row[10]||"0").replace(',','.')) || 0;
  });

  data.rows.slice(1, 11).forEach(r => {
    const acc = String(r[5]||"").trim();
    const valEur = parseFloat(String(r[8]||"0").replace(',','.'));
    const valUah = parseFloat(String(r[10]||"0").replace(',','.'));
    const displayVal = valEur !== 0 ? valEur : valUah;
    const symbol = valEur !== 0 ? '€' : '₴';
    if(displayVal === 0) return;
    
    hist.innerHTML += `<div class="bg-white p-2 rounded-xl flex justify-between items-center border border-slate-50 mb-1 shadow-sm">
      <div class="leading-tight"><p class="text-[9px] text-slate-700 font-black uppercase">${r[4]||r[2]}</p><p class="text-[5px] opacity-30 font-black">${acc}</p></div>
      <div class="${displayVal < 0 ? 'text-rose-500' : 'text-emerald-500'} text-[10px] font-black italic">
        ${displayVal > 0 ? '+' : ''}${Math.abs(displayVal).toFixed(2)}${symbol}
      </div></div>`;
  });
  drawBalance();
}

async function save(event) {
  event.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.innerText = "ЗАПИСЬ...";
  
  const rows = document.querySelectorAll('.item-row');
  for (let row of rows) {
    const msgText = document.getElementById('cat').value[0].toLowerCase() + " " + 
                    document.getElementById('merchant').value + " " + 
                    row.querySelector('.priceUnit').value + " " + 
                    row.querySelector('.nameRU').value;
                    
    const payload = {
      message: {
        message_id: Date.now(),
        text: msgText,
        chat: { id: 0 }
      }
    };
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
  }
  location.reload();
}

function openModal(t) {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('txType').value = t;
  const selects = document.querySelectorAll('.wallet-select');
  selects.forEach(s => { 
    s.innerHTML = ""; 
    ORDER.forEach(m => { s.innerHTML += `<option value="${m}">${m}</option>`; }); 
  });
  document.getElementById('date').valueAsDate = new Date();
  document.getElementById('customRate').value = localStorage.getItem('wallet_base_rate') || 50.75;
  document.getElementById('itemsList').innerHTML = "";
  addItemRow();
}

function addItemRow() {
  document.getElementById('itemsList').insertAdjacentHTML('beforeend', `<div class="item-row bg-slate-50 p-2 rounded-lg border mb-1">
    <input type="text" placeholder="ТОВАР" class="nameRU w-full mb-1 p-1 rounded text-[9px] uppercase font-black bg-white">
    <div class="grid grid-cols-2 gap-1">
      <input type="number" placeholder="К-ВО" class="qty p-1 rounded text-[9px] font-black bg-white" value="1">
      <input type="number" step="0.01" placeholder="ЦЕНА €" class="priceUnit p-1 rounded text-[9px] font-black bg-white">
    </div></div>`);
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

window.onload = () => {
  const r = localStorage.getItem('wallet_base_rate') || "50.75";
  document.getElementById('baseRate').value = r;
  const s = document.createElement('script');
  s.src = API_URL + "?callback=draw&_t=" + Date.now();
  document.body.appendChild(s);
};
</script>
</body>
</html>
