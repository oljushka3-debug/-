<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWallet v109.0</title>
    <style>
        body { font-family: 'Google Sans', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 25px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .rate { font-size: 13px; color: #5f6368; text-align: left; margin-bottom: 8px; font-weight: bold; background: #e8f0fe; padding: 5px 10px; border-radius: 5px; display: inline-block; }
        .period { font-size: 12px; color: #5f6368; text-align: left; margin-bottom: 15px; }
        .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #9aa0a6; margin-bottom: 4px; }
        .total-balance { font-size: 18px; color: #70757a; margin-bottom: 5px; }
        .liquid-balance { font-size: 38px; color: #202124; font-weight: bold; margin-bottom: 8px; }
        .debts-balance { font-size: 13px; color: #db4437; font-weight: 600; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; font-size: 14px; transition: opacity 0.2s; }
        .btn-expense { background-color: #db4437; }
        .btn-transfer { background-color: #70757a; }
        .btn-income { background-color: #0f9d58; }
        .btn:hover { opacity: 0.9; }
        .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #9aa0a6; margin: 18px 0 4px; padding-top: 10px; border-top: 1px solid #f1f3f4; }
        .wallet-list { list-style: none; padding: 0; margin: 0; }
        .wallet-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f3f4; }
        .wallet-name { font-size: 15px; color: #3c4043; font-weight: 500; }
        .wallet-val-container { text-align: right; }
        .wallet-val { font-size: 15px; font-weight: bold; color: #202124; }
        .wallet-val.debt { color: #db4437; }
        .wallet-val-uah { font-size: 11px; color: #80868b; display: block; }
    </style>
</head>
<body>

<div class="card">
    <div id="rate-display" class="rate">КУРС: Загрузка...</div>
    <div id="period-display" class="period">Период: —</div>

    <div class="header">
        <div class="label">Баланс за период (netto)</div>
        <div class="liquid-balance" id="liquid-balance">0.00 €</div>
        <div class="label">Ликвидный за период</div>
        <div class="total-balance" id="total-balance">0.00 €</div>
        <div class="debts-balance" id="debts-balance">Долги: 0.00 €</div>
    </div>

    <div class="btn-group">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeCyLxCypteUHKKaf1JlcqXEAaOBzd4qedwmw3rjhvS_PMwOQ/viewform" target="_blank" class="btn btn-expense">РАСХОД</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeCyLxCypteUHKKaf1JlcqXEAaOBzd4qedwmw3rjhvS_PMwOQ/viewform" target="_blank" class="btn btn-transfer">ПЕРЕВОД</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeCyLxCypteUHKKaf1JlcqXEAaOBzd4qedwmw3rjhvS_PMwOQ/viewform" target="_blank" class="btn btn-income">ДОХОД</a>
    </div>

    <div id="wallets" class="wallet-list"></div>
    <div id="debts" class="wallet-list"></div>
    <div id="external" class="wallet-list"></div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwKMS4xNWED8KAqRYb4B6p3UUguWqI6KkSuufoyBnBnLeu9_Wd68myOsSx2VsVmTAEL/exec';

    // Точные имена кошельков — никакого substring-поиска, чтобы
    // "КРЕДИТКА ВАЛЕРА" не подхватывалась ключом "ВАЛЕРА" и т.п.
    const LIQUID_WALLETS = ["🏦 SPARKASSE ОЛЯ", "🏦👤 SPARKASSE ВАЛЕРА", "💵 НАЛИЧНЫЕ"];
    const MAIN_WALLETS = ["🏦 SPARKASSE ОЛЯ", "🏦👤 SPARKASSE ВАЛЕРА", "💃 ПРИВАТ ОЛЯ", "💳👤 Валера", "💵 НАЛИЧНЫЕ"];
    const SAVINGS_WALLETS = ["🐷 СВИНКА", "✉️ КОНВЕРТ", "🍯 КОПИЛКА", "📅 В ПЛАНАХ"];
    const DEBT_WALLETS = ["💳🎀 КРЕДИТКА ОЛЯ", "💳👤 КРЕДИТКА ВАЛЕРА"];
    const EXTERNAL_WALLETS = ["👤 Виталя", "🏦👤 SPARKASSE Виталий", "👤👤 Родственники"];
    // Гривневые кошельки (нативная валюта UAH) — показываем и EUR (по курсу), и UAH.
    // Евровые (SPARKASSE*, НАЛИЧНЫЕ, КОПИЛКА, В ПЛАНАХ) — только EUR, без доп.строки.
    const UAH_DISPLAY_WALLETS = [
        "💳👤 Валера", "💃 ПРИВАТ ОЛЯ", "🐷 СВИНКА", "✉️ КОНВЕРТ",
        "💳🎀 КРЕДИТКА ОЛЯ", "💳👤 КРЕДИТКА ВАЛЕРА", "👤 Виталя", "👤👤 Родственники"
    ];

    function fmtEUR(val) {
        return (parseFloat(val) || 0).toLocaleString('de-DE', {minimumFractionDigits: 2}) + " €";
    }

    function renderWalletItem(container, key, value, rate, uahValue) {
        const cleanVal = parseFloat(value) || 0;
        const item = document.createElement('div');
        item.className = 'wallet-item';

        let uahDisplay = "";
        if (UAH_DISPLAY_WALLETS.includes(key) && uahValue !== undefined) {
            uahDisplay = `<span class="wallet-val-uah">${uahValue.toLocaleString('de-DE', {minimumFractionDigits: 0})} UAH</span>`;
        }

        const isDebt = DEBT_WALLETS.includes(key);
        item.innerHTML = `
            <span class="wallet-name">${key}</span>
            <div class="wallet-val-container">
                <span class="wallet-val${isDebt ? ' debt' : ''}">${fmtEUR(cleanVal)}</span>
                ${uahDisplay}
            </div>`;
        container.appendChild(item);
    }

    async function loadData() {
        const walletsContainer = document.getElementById('wallets');
        const debtsContainer = document.getElementById('debts');
        const externalContainer = document.getElementById('external');

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Сетевая ошибка');
            const data = await response.json();
            if (!data.wallets) throw new Error('Данные wallets пусты');

            const exchangeRate = parseFloat(data.exchangeRate) || 0;
            document.getElementById('rate-display').innerText = `КУРС: ${exchangeRate.toFixed(2)}`;
            if (data.periodStart && data.periodEnd) {
                document.getElementById('period-display').innerText = `Период: ${data.periodStart} – ${data.periodEnd}`;
            }

            walletsContainer.innerHTML = '';
            debtsContainer.innerHTML = '<div class="section-label">Долги (не входят в активы)</div>';
            externalContainer.innerHTML = '<div class="section-label">Виталя / Родственники (отдельно)</div>';

            let liquidSum = 0, assetsSum = 0, debtsSum = 0;

            Object.entries(data.wallets).forEach(([key, value]) => {
                const cleanVal = parseFloat(value) || 0;

                if (LIQUID_WALLETS.includes(key)) liquidSum += cleanVal;
                if (MAIN_WALLETS.includes(key)) assetsSum += cleanVal;
                if (DEBT_WALLETS.includes(key)) debtsSum += cleanVal;

                if (MAIN_WALLETS.includes(key) || SAVINGS_WALLETS.includes(key)) {
                    renderWalletItem(walletsContainer, key, cleanVal, exchangeRate, data.walletsUAH ? data.walletsUAH[key] : undefined);
                } else if (DEBT_WALLETS.includes(key)) {
                    renderWalletItem(debtsContainer, key, cleanVal, exchangeRate, data.walletsUAH ? data.walletsUAH[key] : undefined);
                } else if (EXTERNAL_WALLETS.includes(key)) {
                    renderWalletItem(externalContainer, key, cleanVal, exchangeRate, data.walletsUAH ? data.walletsUAH[key] : undefined);
                }
            });

            const netTotal = assetsSum - debtsSum;

            document.getElementById('liquid-balance').innerText = fmtEUR(netTotal);
            document.getElementById('total-balance').innerText = fmtEUR(liquidSum);
            document.getElementById('debts-balance').innerText = `Долги: ${fmtEUR(debtsSum)}`;

        } catch (e) {
            console.error("Ошибка:", e);
            walletsContainer.innerHTML = '<div style="text-align:center; color:red;">Ошибка обновления данных</div>';
        }
    }
    loadData();
</script>
</body>
</html>
